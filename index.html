<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0F2D52">
<title>Visit Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* ── PRIMARY PALETTE ── */
  --blue:       #0F2D52;   /* deep navy */
  --blue-lt:    #EAF0F9;
  --blue-mid:   #B8CEE8;
  --blue-btn:   #1756A6;   /* action blue */

  /* ── ACCENT TEAL ── */
  --teal:       #087B6E;
  --teal-lt:    #E2F4F2;
  --teal-mid:   #7ECFC8;

  /* ── STATUS COLORS ── */
  --green:      #145E38;
  --green-lt:   #E6F4ED;
  --green-mid:  #86CFAA;
  --red:        #A81C1C;
  --red-lt:     #FBECEC;
  --red-mid:    #EFA5A5;
  --amber:      #7A4400;
  --amber-lt:   #FFF4E6;
  --amber-mid:  #FFCA80;
  --purple:     #4A1F8A;
  --purple-lt:  #EDE8FA;

  /* ── NEUTRALS (cool blue-gray) ── */
  --slate-50:   #F5F7FB;
  --slate-100:  #ECF0F7;
  --slate-200:  #D9E2EF;
  --slate-300:  #B8C8DC;
  --slate-400:  #7A94AE;
  --slate-500:  #4F6880;
  --slate-600:  #344D65;
  --slate-700:  #1E354C;
  --slate-800:  #102030;
  --slate-900:  #070E18;
  --white:      #ffffff;

  /* ── GEOMETRY ── */
  --radius-sm:  8px;
  --radius:     12px;
  --radius-lg:  16px;
  --radius-xl:  20px;
  --shadow-sm:  0 1px 3px rgba(10,30,60,.06);
  --shadow:     0 2px 6px rgba(10,30,60,.08), 0 1px 2px rgba(10,30,60,.05);
  --shadow-md:  0 6px 20px rgba(10,30,60,.12);
  --shadow-lg:  0 12px 36px rgba(10,30,60,.16);
}

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--slate-50); background-image: radial-gradient(var(--slate-200) 1px, transparent 1px); background-size: 24px 24px; color: var(--slate-900); min-height: 100dvh; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
img, svg { display: block; }
a { text-decoration: none; color: inherit; }
input, select, textarea, button { font-family: inherit; font-size: inherit; border: none; outline: none; -webkit-appearance: none; appearance: none; background: none; }
button { cursor: pointer; }

/* ── HEADER ── */
.hdr {
  position: sticky; top: 0; z-index: 100;
  background: linear-gradient(135deg, #0F2D52 0%, #1756A6 100%);
  border-bottom: 1px solid rgba(255,255,255,.1);
  box-shadow: 0 2px 12px rgba(10,30,60,.25);
}
.hdr-inner {
  max-width: 960px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; height: 56px;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-mark {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, #087B6E, #0BBCAB);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; box-shadow: 0 2px 10px rgba(8,123,110,.45);
}
.logo-name { font-size: 18px; font-weight: 800; letter-spacing: -.5px; color: #fff; }
.logo-name b { color: #7ECFC8; font-weight: 800; }
.hdr-right { display: flex; align-items: center; gap: 8px; }
.sync-badge { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: rgba(255,255,255,.6); display: none; }
@media(min-width:480px){ .sync-badge { display: block; } }

/* ── TABS ── */
.tabs-wrap {
  position: sticky; top: 56px; z-index: 90;
  background: var(--white);
  border-bottom: 2px solid var(--slate-200);
  box-shadow: 0 2px 8px rgba(10,30,60,.06);
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.tabs-wrap::-webkit-scrollbar { display: none; }
.tabs {
  display: flex; max-width: 960px; margin: 0 auto;
  padding: 0 12px; min-width: max-content;
}
.tab {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 0 14px; height: 48px;
  font-size: 13px; font-weight: 600; color: var(--slate-400);
  border-bottom: 2.5px solid transparent;
  transition: color .15s, border-color .15s;
  white-space: nowrap; cursor: pointer;
}
.tab.on { color: var(--blue-btn); border-bottom-color: var(--blue-btn); }
.tab:hover:not(.on) { color: var(--slate-600); }
.tab-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.tab-n {
  font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace;
  padding: 2px 7px; border-radius: 20px;
  background: var(--slate-100); color: var(--slate-500);
}
.tab.on .tab-n { background: var(--blue-lt); color: var(--blue-btn); }

/* ── SEARCH ── */
.search-wrap { max-width: 960px; margin: 0 auto; padding: 12px 16px 8px; }
.search-row { display: flex; gap: 8px; align-items: center; }
.search-field {
  flex: 1; display: flex; align-items: center; gap: 10px;
  background: var(--white); border: 1.5px solid var(--slate-200);
  border-radius: var(--radius); padding: 0 14px; height: 46px;
  transition: border-color .15s, box-shadow .15s;
}
.search-field:focus-within {
  border-color: var(--blue-btn);
  box-shadow: 0 0 0 3px rgba(23,86,166,.10);
}
.search-field svg { flex-shrink: 0; color: var(--slate-400); }
.search-inp {
  flex: 1; font-size: 15px; color: var(--slate-900);
  background: transparent; min-width: 0;
}
.search-inp::placeholder { color: var(--slate-400); }
.search-x {
  color: var(--slate-400); font-size: 18px; line-height: 1;
  cursor: pointer; padding: 2px; display: none;
}

/* ── MAIN ── */
.main { max-width: 960px; margin: 0 auto; padding: 10px 16px 100px; }
.panel { display: none; }
.panel.on { display: block; }
/* search bar on solid white so dot bg doesn't show through */
.search-wrap { background: var(--white); border-bottom: 1px solid var(--slate-200); }

/* ── SECTION DIVIDER ── */
.date-div {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 0 8px;
}
.date-div-line { flex: 1; height: 1px; background: var(--slate-200); }
.date-div-lbl {
  font-size: 12px; font-weight: 700; color: var(--slate-400);
  text-transform: uppercase; letter-spacing: .8px; white-space: nowrap;
}

/* ── BANNER ── */
.banner {
  display: flex; align-items: flex-start; gap: 10px;
  background: var(--amber-lt); border: 1px solid var(--amber-mid);
  border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px;
  font-size: 14px; color: var(--amber); line-height: 1.5;
}

/* ── CARD ── */
.card {
  background: var(--white); border-radius: var(--radius-lg);
  border: 1px solid var(--slate-200); box-shadow: var(--shadow);
  margin-bottom: 10px; overflow: hidden;
  transition: box-shadow .2s, transform .1s;
}
.card:hover { box-shadow: var(--shadow-md); }
.card:active { transform: scale(.997); }
.card.c-blue   { border-left: 4px solid #1756A6; }
.card.c-green  { border-left: 4px solid #145E38; }
.card.c-red    { border-left: 4px solid #A81C1C; }
.card.c-amber  { border-left: 4px solid #C67800; }
.card.c-gray   { border-left: 4px solid var(--slate-300); opacity: .72; }
.card.c-purple { border-left: 4px solid #4A1F8A; }

/* subtle status tint on card-top */
.card.c-blue  .card-top { background: linear-gradient(100deg,rgba(23,86,166,.035) 0%,transparent 70%); }
.card.c-green .card-top { background: linear-gradient(100deg,rgba(20,94,56,.035) 0%,transparent 70%); }
.card.c-red   .card-top { background: linear-gradient(100deg,rgba(168,28,28,.035) 0%,transparent 70%); }
.card.c-amber .card-top { background: linear-gradient(100deg,rgba(198,120,0,.04) 0%,transparent 70%); }

/* ── PATIENT AVATAR ── */
.pt-avatar {
  width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 800; color: #fff;
  font-family: 'JetBrains Mono', monospace;
  box-shadow: 0 2px 6px rgba(0,0,0,.15);
}

/* ── CARD TOP ── */
.card-top { padding: 12px 14px 0; }
.card-row1 {
  display: flex; align-items: center;
  justify-content: space-between; gap: 10px;
  cursor: pointer;
}
.card-name {
  font-size: 16px; font-weight: 800; color: var(--slate-800);
  line-height: 1.25; letter-spacing: -.3px;
}
.card-meta {
  font-size: 12px; font-family: 'JetBrains Mono', monospace;
  color: var(--slate-400); margin-top: 3px;
}
.card-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }

/* ── BADGE ── */
.bdg {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px;
  font-family: 'JetBrains Mono', monospace; white-space: nowrap;
}
.bdg-blue   { background: var(--blue-lt);   color: var(--blue-btn); }
.bdg-green  { background: var(--green-lt);  color: var(--green); }
.bdg-red    { background: var(--red-lt);    color: var(--red); }
.bdg-amber  { background: var(--amber-lt);  color: var(--amber); }
.bdg-purple { background: var(--purple-lt); color: var(--purple); }
.bdg-teal   { background: var(--teal-lt);   color: var(--teal); }
.bdg-gray   { background: var(--slate-100); color: var(--slate-500); }

/* ── SPECIAL INSTRUCTIONS ── */
.card-special {
  display: flex; align-items: flex-start; gap: 8px;
  background: linear-gradient(135deg,#FFF4E6,#FFF9F0);
  border-left: 3px solid #E07B00;
  border-radius: 0 8px 8px 0; margin: 8px 12px 0;
  padding: 8px 12px; font-size: 13px; font-weight: 600;
  color: #7A4400; line-height: 1.5;
  box-shadow: 0 1px 4px rgba(198,120,0,.12);
}

/* ── PENDING REASON ── */
.card-pend-reason {
  font-size: 13px; color: var(--amber); background: var(--amber-lt);
  border-radius: var(--radius-sm); margin: 8px 16px 0;
  padding: 8px 12px; font-weight: 500;
}

/* ── CARD ACTIONS (collapsed) ── */
.card-actions {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 8px 14px 4px;
}

/* ADDRESS BUTTON */
.addr-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--green-lt); color: var(--green);
  border: 1.5px solid var(--green-mid); border-radius: 8px;
  padding: 7px 12px; font-size: 13px; font-weight: 600;
  text-decoration: none; cursor: pointer;
  transition: background .15s; min-height: 36px;
  max-width: 100%; overflow: hidden;
}
.addr-btn:active { background: #cceedd; }
.addr-btn-txt {
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: min(220px, 55vw);
}

/* PHONE BUTTONS */
.phone-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--blue-lt); color: var(--blue-btn);
  border: 1.5px solid var(--blue-mid); border-radius: 8px;
  padding: 7px 12px; font-size: 13px; font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
  text-decoration: none; white-space: nowrap;
  transition: background .15s; min-height: 36px; cursor: pointer;
}
.phone-btn:active { background: #d4e4f7; }

/* ── PENCIL BUTTON ── */
.pencil-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 26px; height: 26px; border-radius: 6px; flex-shrink: 0;
  background: var(--slate-100); color: var(--slate-400);
  border: none; cursor: pointer; transition: all .15s;
}
.pencil-btn:hover { background: var(--blue-lt); color: var(--blue-btn); }

/* ── EXPAND TOGGLE ── */
.card-expand {
  display: flex; align-items: center; justify-content: center;
  gap: 5px; padding: 7px 14px;
  border-top: 1px solid var(--slate-100); cursor: pointer;
  font-size: 11px; font-weight: 700; color: var(--slate-400);
  letter-spacing: .4px; text-transform: uppercase;
  background: var(--slate-50);
  transition: background .15s, color .15s;
}
.card-expand:hover { background: var(--slate-100); color: var(--slate-600); }
.card.open .card-expand { color: var(--blue-btn); background: var(--blue-lt); }
.chev { transition: transform .2s; display: inline-block; }
.card.open .chev { transform: rotate(180deg); }

/* ── EXPANDED ── */
.card-body { display: none; background: var(--slate-50); border-top: 1px solid var(--slate-100); }
.card.open .card-body { display: block; }

.section { padding: 12px 14px; border-bottom: 1px solid var(--slate-100); }
.section:last-child { border-bottom: none; }
.sec-title {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--slate-400);
  font-family: 'JetBrains Mono', monospace; margin-bottom: 10px;
}
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.grid-2 .full { grid-column: 1 / -1; }
.field { display: flex; flex-direction: column; gap: 3px; }
.field-lbl {
  font-size: 10px; font-weight: 600; color: var(--slate-400);
  text-transform: uppercase; letter-spacing: .5px;
}
.field-val {
  font-size: 14px; font-weight: 500; color: var(--slate-800);
  line-height: 1.4;
}
.field-mono { font-family: 'JetBrains Mono', monospace; font-size: 13px; }

/* ── 2-COLUMN CARD GRID (tablet/desktop) ── */
.cards-grid { display: grid; grid-template-columns: 1fr; }
@media(min-width:720px) {
  .cards-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .cards-grid .banner  { grid-column: 1 / -1; }
  .cards-grid .card    { margin-bottom: 0; }
}
/* queue date-group wrapper keeps date labels full-width */
.date-group { margin-bottom: 4px; }
.date-group .date-div { margin-bottom: 8px; }

/* ── INPUTS ── */
.inp {
  width: 100%; background: var(--white);
  border: 1.5px solid var(--slate-200); border-radius: var(--radius-sm);
  padding: 9px 12px; font-size: 15px; color: var(--slate-900);
  transition: border-color .15s, box-shadow .15s; min-height: 40px;
}
.inp:focus {
  border-color: var(--blue-btn);
  box-shadow: 0 0 0 3px rgba(23,86,166,.10);
}
.inp::placeholder { color: var(--slate-400); }
.inp[type=date], .inp[type=datetime-local] { cursor: pointer; }
.sel {
  width: 100%; background: var(--white);
  border: 1.5px solid var(--slate-200); border-radius: var(--radius-sm);
  padding: 9px 12px; font-size: 15px; color: var(--slate-900);
  min-height: 40px; cursor: pointer;
}
.sel:focus { border-color: var(--blue-btn); }
.ta {
  width: 100%; background: var(--white);
  border: 1.5px solid var(--slate-200); border-radius: var(--radius-sm);
  padding: 9px 12px; font-size: 14px; color: var(--slate-900);
  resize: vertical; min-height: 70px; line-height: 1.6;
}
.ta:focus { border-color: var(--blue-btn); box-shadow: 0 0 0 3px rgba(23,86,166,.10); }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 5px; font-size: 13px; font-weight: 600;
  padding: 7px 13px; border-radius: var(--radius-sm);
  transition: all .15s; white-space: nowrap;
  min-height: 34px; cursor: pointer; line-height: 1;
}
.btn:active { transform: scale(.96); }
.btn.full { width: 100%; }
.btn-blue    { background: var(--blue-btn); color: #fff; }
.btn-blue:hover { background: #0F2D52; box-shadow: 0 4px 14px rgba(23,86,166,.40); }
.btn-green   { background: var(--green); color: #fff; }
.btn-green:hover { background: #0f4d2a; }
.btn-amber   { background: #b86200; color: #fff; }
.btn-amber:hover { background: #924e00; }
.btn-red     { background: var(--red-lt); color: var(--red); border: 1.5px solid var(--red-mid); }
.btn-red:hover { background: #fbd8d8; }
.btn-outline { background: var(--white); color: var(--slate-700); border: 1.5px solid var(--slate-200); }
.btn-outline:hover { background: var(--slate-50); border-color: var(--slate-300); }
.btn-ghost   { background: transparent; color: var(--slate-500); }
.btn-ghost:hover { background: var(--slate-100); }
.btn-sm { padding: 5px 10px; font-size: 12px; min-height: 28px; }

/* ── CONFIRM BOX ── */
.confirm-box {
  background: var(--green-lt); border: 1.5px solid var(--green-mid);
  border-radius: var(--radius); padding: 12px;
}
.confirm-lbl { font-size: 13px; color: var(--slate-600); margin-bottom: 8px; line-height: 1.4; }
.confirm-lbl strong { color: var(--green); }
.confirm-inp {
  width: 100%; background: var(--white);
  border: 1.5px solid var(--slate-200); border-radius: var(--radius-sm);
  padding: 9px 14px; font-family: 'JetBrains Mono', monospace;
  font-size: 17px; letter-spacing: 5px; text-transform: uppercase;
  text-align: center; margin-bottom: 8px; min-height: 42px;
  transition: border-color .15s;
}
.confirm-inp.ok { border-color: var(--green); background: var(--green-lt); }
.confirm-sub { opacity: .4; pointer-events: none; }
.confirm-sub.rdy { opacity: 1; pointer-events: all; background: linear-gradient(135deg,#145E38,#087B6E); }

/* ── ADVERSE BOX ── */
.adverse {
  background: var(--red-lt); border-left: 4px solid #ef4444;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  padding: 12px 14px; font-size: 14px; color: var(--red);
  font-weight: 500; line-height: 1.5;
}

/* ── PENDING FORM ── */
.pend-form {
  background: var(--amber-lt); border: 1.5px solid var(--amber-mid);
  border-radius: var(--radius); padding: 14px; margin-top: 10px; display: none;
}

/* ── NEXT PREVIEW ── */
.next-prev {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--blue-lt); color: var(--blue-btn);
  border-radius: var(--radius-sm); padding: 7px 12px;
  font-size: 13px; font-family: 'JetBrains Mono', monospace;
  margin-top: 10px;
}

/* ── SITE BUTTONS ── */
.site-btns { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
.site-btn {
  padding: 8px 16px; border-radius: 20px;
  border: 1.5px solid var(--slate-200); background: var(--white);
  color: var(--slate-500); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .15s; min-height: 38px;
}
.site-btn:hover { border-color: var(--blue); color: var(--blue); }
.sl { background: var(--blue-lt);   color: var(--blue);   border-color: #93c5fd; }
.sr { background: var(--amber-lt);  color: var(--amber);  border-color: var(--amber-mid); }
.sg { background: var(--green-lt);  color: var(--green);  border-color: var(--green-mid); }

/* ── BTN ROW ── */
.btn-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }

/* ── MODAL ── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200;
  display: none; align-items: flex-end; justify-content: center;
}
.overlay.on { display: flex; }
.sheet {
  background: var(--white); width: 100%; max-width: 960px;
  border-radius: 20px 20px 0 0; max-height: 94dvh; overflow-y: auto;
  -webkit-overflow-scrolling: touch; padding: 6px 0 0;
  animation: slideUp .25s ease;
}
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.sheet-handle {
  width: 36px; height: 4px; background: var(--slate-200);
  border-radius: 2px; margin: 0 auto 16px;
}
.sheet-inner { padding: 0 18px 48px; }
.sheet-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.sheet-title { font-size: 20px; font-weight: 800; color: var(--slate-900); }
.sheet-close {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--slate-100); color: var(--slate-500);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; cursor: pointer;
}
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-grid .full { grid-column: 1 / -1; }
.form-field { display: flex; flex-direction: column; gap: 6px; }
.form-lbl { font-size: 12px; font-weight: 700; color: var(--slate-500); text-transform: uppercase; letter-spacing: .5px; }
@media(max-width:500px){
  .form-grid { grid-template-columns: 1fr; }
  .form-grid .full { grid-column: 1; }
}

/* ── FAB ── */
.fab {
  position: fixed; z-index: 150;
  width: 56px; height: 56px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-lg); cursor: pointer;
  transition: transform .15s, box-shadow .15s; border: none;
}
.fab:active { transform: scale(.92); }
.fab-add { bottom: 24px; right: 16px; background: linear-gradient(135deg,#1756A6,#087B6E); color: #fff; font-size: 26px; }
.fab-add:hover { box-shadow: 0 8px 28px rgba(23,86,166,.5); }
.fab-imp { bottom: 90px; right: 16px; background: var(--slate-800); color: #fff; font-size: 22px; }
.fab-imp:hover { background: var(--slate-700); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 84px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: var(--slate-900); color: var(--white);
  padding: 12px 18px; border-radius: 12px;
  font-size: 14px; font-weight: 500;
  box-shadow: var(--shadow-lg); z-index: 999;
  display: flex; align-items: center; gap: 12px;
  min-width: 220px; max-width: 360px;
  opacity: 0; pointer-events: none;
  transition: opacity .25s, transform .25s;
}
.toast.on { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: all; }
.toast-undo { color: #fbbf24; font-weight: 700; cursor: pointer; flex-shrink: 0; }

/* ── SETUP ── */
.setup-card {
  background: var(--white); border-radius: var(--radius-lg);
  border: 1px solid var(--slate-200); padding: 20px; margin-bottom: 14px;
  box-shadow: var(--shadow-sm);
}
.setup-title { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
.setup-desc { font-size: 14px; color: var(--slate-500); line-height: 1.6; margin-bottom: 14px; }
.setup-steps { background: var(--slate-50); border-radius: var(--radius-sm); padding: 14px 16px; font-size: 14px; color: var(--slate-500); line-height: 2.1; }
.setup-steps ol { padding-left: 20px; }
.code { background: var(--slate-100); border-radius: 4px; padding: 1px 6px; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
.test-box { font-size: 13px; background: var(--slate-50); border-radius: var(--radius-sm); padding: 10px 14px; margin-top: 10px; display: none; border: 1px solid var(--slate-200); }

/* ── IMPORT ── */
.drop-zone {
  border: 2px dashed var(--slate-200); border-radius: var(--radius);
  padding: 28px 20px; text-align: center; cursor: pointer;
  transition: border-color .2s, background .2s;
}
.drop-zone:hover, .drop-zone.drag { border-color: var(--blue); background: var(--blue-lt); }
.drop-zone input[type=file] { display: none; }
.import-log { font-size: 13px; background: var(--slate-50); border-radius: var(--radius-sm); padding: 10px 14px; margin-top: 10px; display: none; }
.import-ok { background: var(--green-lt); border: 1px solid var(--green-mid); }

/* ── EMPTY ── */
.empty { text-align: center; padding: 56px 20px; }
.empty-ico { font-size: 44px; margin-bottom: 12px; }
.empty-lbl { font-size: 16px; font-weight: 600; color: var(--slate-400); }

/* ── RESPONSIVE ── */
@media(min-width:640px) {
  .hdr-inner { padding: 0 24px; }
  .search-wrap { padding: 12px 24px 8px; }
  .main { padding: 10px 24px 80px; }
}
@media(min-width:960px) {
  .main { max-width: 1200px; padding: 12px 32px 80px; }
  .tabs-wrap .tabs { max-width: 1200px; }
  .search-wrap { max-width: 1200px; }
  .hdr-inner { max-width: 1200px; }
  .tab { padding: 0 16px; font-size: 13px; }
}
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast">
  <span id="toastMsg" style="flex:1"></span>
  <span class="toast-undo" id="toastUndo" onclick="undoAct()" style="display:none">Undo</span>
</div>

<!-- FABs -->
<button class="fab fab-imp" onclick="openImp()" title="Import CSV/PDF">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
</button>
<button class="fab fab-add" onclick="openModal(null)" title="Add patient">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- ADD/EDIT MODAL -->
<div class="overlay" id="modalOv" onclick="if(event.target===this)closeModal()">
  <div class="sheet" id="modalSh"></div>
</div>

<!-- IMPORT MODAL -->
<div class="overlay" id="impOv" onclick="if(event.target===this)closeImp()">
  <div class="sheet" id="impSh"></div>
</div>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-inner">
    <div class="logo">
      <div class="logo-mark">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      </div>
      <span class="logo-name">Visit<b>.</b>Manager</span>
    </div>
    <div class="hdr-right">
      <span class="sync-badge" id="syncBadge"></span>
      <button class="btn btn-sm" style="background:rgba(255,255,255,.15);color:#fff;border:1.5px solid rgba(255,255,255,.3)" onclick="syncAll()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Sync
      </button>
    </div>
  </div>
</header>

<!-- TABS -->
<div class="tabs-wrap"><div class="tabs" id="tabs"></div></div>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-row">
    <div class="search-field">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="sInp" class="search-inp" type="search" placeholder="Name, file #, phone..." oninput="doSearch()">
      <span class="search-x" id="sX" onclick="clearSearch()">&#x2715;</span>
    </div>
    <button class="btn btn-blue btn-sm" onclick="doSearch()">Search</button>
  </div>
</div>

<!-- PANELS -->
<main class="main">
  <div id="pSetup"     class="panel"></div>
  <div id="pToday"     class="panel"></div>
  <div id="pScheduled" class="panel"></div>
  <div id="pOverdue"   class="panel"></div>
  <div id="pQueue"     class="panel"></div>
  <div id="pPending"   class="panel"></div>
  <div id="pArchived"  class="panel"></div>
</main>

<script>
// ES5 - No template literals, no arrow functions
var DOSE_WEEKS = {7.5:4, 22.5:12, 30:16, 45:24};
var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var SITES = ['Left Side','Right Side','Left Glute','Right Glute'];
var ATYPES = ['Permanent','1 Dose Only'];
var FSTATUSES = ['Active','Pending','Archived'];
var AKEY = 'vm_akey';

var pts = [];
var openCards = {};
var IS_GAS = window.location.href.indexOf('script.google.com/macros') >= 0;
var sUrl = IS_GAS ? window.location.href.split('?')[0] : (localStorage.getItem('vm_surl') || '');
var curTab = sUrl ? 'today' : 'setup';
var lastSnap = null;
var toastTm = null;
var srchQ = '';

// AVATAR
var AV_COLORS=['#1756A6','#087B6E','#5E35B1','#A81C1C','#7A4400','#145E38','#0F2D52','#C67800'];
function avColor(p){var s=(p.patientName||p.fileNumber||'A').charCodeAt(0);return AV_COLORS[s%AV_COLORS.length];}
function avInitials(name){var parts=(name||'?').trim().split(/\s+/);return parts.length>=2?(parts[0][0]+parts[parts.length-1][0]).toUpperCase():parts[0][0].toUpperCase();}

// DATES
function tod() { var n=new Date(); return new Date(n.getFullYear(),n.getMonth(),n.getDate()); }
function fmt(d) { if(!d)return''; if(typeof d==='string')d=new Date(d); if(isNaN(d.getTime()))return''; return d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear(); }
function fmtDT(s) { if(!s)return''; var d=new Date(s); if(isNaN(d.getTime()))return s; var h=(d.getHours()<10?'0':'')+d.getHours(),m=(d.getMinutes()<10?'0':'')+d.getMinutes(); return fmt(d)+' '+h+':'+m; }
function pd(s) { if(!s)return null; var d=new Date(s); return isNaN(d.getTime())?null:d; }
function addW(d,w) { var r=new Date(d); r.setDate(r.getDate()+w*7); return r; }
function isToday(d) { if(!d)return false; var t=tod(); return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate(); }
function mgv(dose) { var m=String(dose||'').match(/(\d+(?:\.\d+)?)\s*mg/i); return m?parseFloat(m[1]):0; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// STORAGE
function save() { localStorage.setItem('vm_pts',JSON.stringify(pts)); }
function load() { try{pts=JSON.parse(localStorage.getItem('vm_pts')||'[]');}catch(e){pts=[];} }

// NORMALIZE
function norm(p) {
  return {
    fileNumber:String(p.fileNumber||p['File number']||''),
    patientName:p.patientName||p['Patient name']||'',
    address:p.address||p['Address']||'',
    phone1:p.phone1||p['Phone 1']||'',
    phone2:p.phone2||p['Phone 2']||'',
    dose:p.dose||p['Dose']||'',
    totalDoses:p.totalDoses||p['Total doses']||'',
    repeatsLeft:p.repeatsLeft||p['Repeats left']||'',
    prevSite:p.prevSite||p.previousInjectionSite||'',
    site:p.site||p.injectionSite||'',
    dueDate:p.dueDate||p['Due date']||'',
    apptDT:p.apptDT||p.appointmentDateTime||p['Appointment date and time']||'',
    prevDates:p.prevDates||p.previousInjectionDates||'',
    assignType:p.assignType||p.assignmentType||p['Assignment type']||'Permanent',
    special:p.special||p.specialInstructions||p['Special instructions']||'',
    adverse:p.adverse||p.adverseEffects||p['Adverse effects']||'',
    comments:p.comments||p['Comments']||'',
    status:p.status||p.fileStatus||p['File status']||'Active',
    pendReason:p.pendReason||p.pendingReason||'',
    archivedDate:p.archivedDate||'',
    lastUpdated:p.lastUpdated||''
  };
}

// SHEETS
function gsCall(payload, cb) {
  if(!sUrl){if(cb)cb(null,'No URL');return;}
  var xhr=new XMLHttpRequest();
  xhr.open('GET',sUrl+'?payload='+encodeURIComponent(JSON.stringify(payload))+'&t='+Date.now(),true);
  xhr.onload=function(){if(xhr.status===200){try{if(cb)cb(JSON.parse(xhr.responseText),null);}catch(e){if(cb)cb(null,'Parse err');}}else{if(cb)cb(null,'HTTP '+xhr.status);}};
  xhr.onerror=function(){if(cb)cb(null,'Network error');};
  xhr.send();
}
function push(p){if(sUrl)gsCall({action:'upsert',patient:p},null);}
function del(fn){if(sUrl)gsCall({action:'delete',fileNumber:fn},null);}

function syncAll() {
  if(!sUrl){toast('No Script URL - go to Setup');return;}
  setSB('Syncing...');
  var list=pts.slice(),i=0;
  function nx(){if(i>=list.length){loadSheet();return;}gsCall({action:'upsert',patient:list[i]},function(){i++;nx();});}
  nx();
}
function loadSheet() {
  gsCall({action:'getAll'},function(data,err){
    if(err){setSB('Failed');toast('Sync failed: '+err);return;}
    if(data&&data.error){setSB('Error');toast('Error: '+data.error);return;}
    if(Array.isArray(data)){
      pts=data.map(norm);save();
      var n=new Date(); setSB((n.getHours()<10?'0':'')+n.getHours()+':'+(n.getMinutes()<10?'0':'')+n.getMinutes());
      renderAll(); toast('Synced '+pts.length+' patients');
    }
  });
}
function setSB(t){var el=document.getElementById('syncBadge');if(el)el.textContent=t;}

// TAB LOGIC
function getTab(p) {
  if(p.status==='Archived')return'archived';
  if(p.status==='Pending')return'pending';
  var t=tod(),appt=p.apptDT?pd(p.apptDT):null,due=p.dueDate?pd(p.dueDate):null;
  // appointment date passed without injection = overdue
  if(appt&&appt<t)return'overdue';
  // due date passed with no appointment booked = overdue
  if(due&&due<t&&!appt)return'overdue';
  if(appt&&isToday(appt))return'today';
  if(appt&&appt>t)return'scheduled';
  // has future due date, no appointment yet = waiting in queue
  if(due&&due>=t)return'queue';
  return'queue';
}
function sortFor(list,tab) {
  return list.slice().sort(function(a,b){
    var ad,bd;
    if(tab==='today'||tab==='scheduled'){ad=pd(a.apptDT)||new Date(9e15);bd=pd(b.apptDT)||new Date(9e15);if(ad-bd!==0)return ad-bd;return a.patientName.localeCompare(b.patientName);}
    if(tab==='overdue'){ad=pd(a.apptDT)||pd(a.dueDate)||new Date(0);bd=pd(b.apptDT)||pd(b.dueDate)||new Date(0);return ad-bd;}
    if(tab==='queue'||tab==='pending'){ad=pd(a.dueDate)||new Date(9e15);bd=pd(b.dueDate)||new Date(9e15);return ad-bd;}
    if(tab==='archived'){ad=pd(a.archivedDate)||new Date(0);bd=pd(b.archivedDate)||new Date(0);return bd-ad;}
    return a.patientName.localeCompare(b.patientName);
  });
}

// SEARCH
function doSearch() {
  srchQ=document.getElementById('sInp')?document.getElementById('sInp').value.trim():'';
  var x=document.getElementById('sX');if(x)x.style.display=srchQ?'block':'none';
  renderAll();
}
function clearSearch() {
  srchQ='';
  var inp=document.getElementById('sInp');if(inp)inp.value='';
  var x=document.getElementById('sX');if(x)x.style.display='none';
  renderAll();
}
function filtered() {
  if(!srchQ)return pts;
  var q=srchQ.toLowerCase();
  return pts.filter(function(p){return p.patientName.toLowerCase().indexOf(q)>=0||p.fileNumber.indexOf(q)>=0||p.phone1.indexOf(q)>=0||p.phone2.indexOf(q)>=0||p.address.toLowerCase().indexOf(q)>=0;});
}

// RENDER
function renderAll() {
  var f=filtered();
  var tabs={today:[],scheduled:[],overdue:[],queue:[],pending:[],archived:[]};
  for(var i=0;i<f.length;i++){var t=getTab(f[i]);if(tabs[t])tabs[t].push(f[i]);}

  var TCFG=[
    {id:'today',     lbl:'Today',       dot:'#3b82f6'},
    {id:'scheduled', lbl:'Scheduled',   dot:'#14b8a6'},
    {id:'overdue',   lbl:'Overdue',     dot:'#ef4444'},
    {id:'queue',     lbl:'All Patients', dot:'#4A1F8A'},
    {id:'pending',   lbl:'Pending',     dot:'#f59e0b'},
    {id:'archived',  lbl:'Archived',    dot:'#94a3b8'}
  ];

  var nav='';
  for(var ti=0;ti<TCFG.length;ti++){
    var tc=TCFG[ti],on=curTab===tc.id;
    nav+='<button class="tab'+(on?' on':'')+'" onclick="switchTab(\''+tc.id+'\')">'+
         '<span class="tab-dot" style="background:'+tc.dot+'"></span>'+
         tc.lbl+'<span class="tab-n">'+tabs[tc.id].length+'</span></button>';
  }
  document.getElementById('tabs').innerHTML=nav;

  for(var ti2=0;ti2<TCFG.length;ti2++){
    var id=TCFG[ti2].id;
    var panelId='p'+id.charAt(0).toUpperCase()+id.slice(1);
    var panel=document.getElementById(panelId);
    if(!panel)continue;
    var sorted=sortFor(tabs[id],id);
    renderPanel(panel,id,sorted);
    panel.style.display=curTab===id?'block':'none';
  }
  var sp=document.getElementById('pSetup');
  if(sp){
    if(curTab==='setup'){renderSetup();sp.style.display='block';}
    else{sp.style.display='none';}
  }
  restoreOpen();
}

function restoreOpen(){
  for(var fn in openCards){
    if(!openCards[fn])continue;
    var card=document.getElementById('pc-'+fn);
    var body=document.getElementById('cb-'+fn);
    if(card&&body){card.classList.add('open');body.style.display='block';}
  }
}

function renderPanel(panel,tabId,list) {
  if(!list.length){
    var ico={today:'&#x1F4C5;',scheduled:'&#x1F5D3;',overdue:'&#x26A0;',queue:'&#x1F465;',pending:'&#x23F8;',archived:'&#x1F5C4;'};
    var msg={today:'No visits today',scheduled:'No scheduled appointments',overdue:'No overdue patients',queue:'No patients found',pending:'No pending patients',archived:'No archived records'};
    panel.innerHTML='<div class="empty"><div class="empty-ico">'+(ico[tabId]||'&#x1F4CB;')+'</div><div class="empty-lbl">'+(msg[tabId]||'Nothing here')+'</div></div>';
    return;
  }
  var html='';
  if(tabId==='today'){
    html+='<div class="cards-grid">';
    for(var bi=0;bi<list.length;bi++){
      if(list[bi].assignType==='1 Dose Only'){
        html+='<div class="banner"><span style="font-size:15px">&#9888;</span><span><strong>'+esc(list[bi].patientName)+'</strong> — 1 Dose Only. Confirm continuation after visit.</span></div>';
      }
    }
    for(var ci3=0;ci3<list.length;ci3++)html+=renderCard(list[ci3],tabId);
    html+='</div>';
  } else if(tabId==='queue'){
    // group by due date → each group gets its own 2-col grid
    var groups=[],groupMap={};
    for(var ci=0;ci<list.length;ci++){
      var ds=fmt(pd(list[ci].dueDate))||'No Due Date';
      if(!groupMap[ds]){groupMap[ds]=[];groups.push(ds);}
      groupMap[ds].push(list[ci]);
    }
    for(var gi=0;gi<groups.length;gi++){
      var label=groups[gi];
      html+='<div class="date-group">';
      html+='<div class="date-div"><div class="date-div-line"></div><span class="date-div-lbl">'+label+'</span><div class="date-div-line"></div></div>';
      html+='<div class="cards-grid">';
      for(var gci=0;gci<groupMap[label].length;gci++)html+=renderCard(groupMap[label][gci],tabId);
      html+='</div></div>';
    }
  } else {
    html+='<div class="cards-grid">';
    for(var ci2=0;ci2<list.length;ci2++)html+=renderCard(list[ci2],tabId);
    html+='</div>';
  }
  panel.innerHTML=html;
}

function renderCard(p,tab) {
  var fn=p.fileNumber,fe=esc(fn);
  var due=pd(p.dueDate),appt=pd(p.apptDT);
  var mg=mgv(p.dose),wk=DOSE_WEEKS[mg];

  // Border
  var bc='c-blue';
  if(tab==='overdue')bc='c-red';
  else if(tab==='today'&&p.apptDT)bc='c-green';
  else if(tab==='today')bc='c-blue';
  else if(tab==='pending')bc='c-amber';
  else if(tab==='archived')bc='c-gray';

  // Badges
  var bdg='';
  if(tab==='today'&&p.apptDT)bdg+='<span class="bdg bdg-green">&#10003; '+esc(fmtDT(p.apptDT))+'</span>';
  else if(tab==='today')bdg+='<span class="bdg bdg-blue">Today</span>';
  if(tab==='overdue')bdg+='<span class="bdg bdg-red">&#9888; Overdue</span>';
  if(due)bdg+='<span class="bdg bdg-purple">Due '+esc(fmt(due))+'</span>';
  if(p.assignType==='1 Dose Only')bdg+='<span class="bdg bdg-amber">1 Dose Only</span>';
  if(p.repeatsLeft)bdg+='<span class="bdg bdg-teal">'+esc(p.repeatsLeft)+' left</span>';
  if(tab==='pending')bdg+='<span class="bdg bdg-amber">Pending</span>';

  // Special
  var spec='';
  if(p.special)spec='<div class="card-special"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="flex-shrink:0;margin-top:2px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'+esc(p.special)+'</div>';

  // Pending reason
  var pr='';
  if(p.pendReason)pr='<div class="card-pend-reason">Pending: '+esc(p.pendReason)+'</div>';

  // Address
  var mu='https://www.google.com/maps/dir/?api=1&destination='+encodeURIComponent(p.address||'');
  var addr='';
  if(p.address)addr='<a href="'+mu+'" target="_blank" rel="noopener" class="addr-btn"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="flex-shrink:0"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg><span class="addr-btn-txt">'+esc(p.address)+'</span></a>';

  // Phones
  var phi='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="flex-shrink:0"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.63 3.4 2 2 0 0 1 3.6 1.21h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.78a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>';
  var ph='';
  if(p.phone1)ph+='<a href="tel:'+p.phone1.replace(/\D/g,'')+'" class="phone-btn">'+phi+esc(p.phone1)+'</a>';
  if(p.phone2)ph+='<a href="tel:'+p.phone2.replace(/\D/g,'')+'" class="phone-btn">'+phi+esc(p.phone2)+'</a>';

  // Site buttons
  var sb='';
  var scls={'Left Side':'sl','Right Side':'sr','Left Glute':'sg','Right Glute':'sg'};
  for(var si=0;si<SITES.length;si++){
    var s=SITES[si],on=p.site===s;

// TOGGLE
function togCard(fn) {
  var card=document.getElementById('pc-'+fn);
  var body=document.getElementById('cb-'+fn);
  if(!card||!body)return;
  var open=card.classList.contains('open');
  if(open){card.classList.remove('open');body.style.display='none';openCards[fn]=false;}
  else{card.classList.add('open');body.style.display='block';openCards[fn]=true;}
}

// FIND
function fp(fn){for(var i=0;i<pts.length;i++){if(pts[i].fileNumber===fn)return pts[i];}return null;}

// ACTIONS
function chkDone(inp,fn){
  var v=inp.value.trim().toUpperCase()==='DONE';
  if(v)inp.classList.add('ok');else inp.classList.remove('ok');
  var b=document.getElementById('cs-'+fn);
  if(b){if(v)b.classList.add('rdy');else b.classList.remove('rdy');}
}

function confInj(fn){
  var p=fp(fn);if(!p)return;
  lastSnap=JSON.parse(JSON.stringify(p));
  var wk=DOSE_WEEKS[mgv(p.dose)],now=new Date();
  var prev=p.prevDates?p.prevDates.split(',').map(function(s){return s.trim();}).filter(Boolean):[];
  prev.push(fmt(now));p.prevDates=prev.join(', ');
  p.prevSite=p.site||'';p.site='';
  var rl=parseInt(p.repeatsLeft)||0;if(rl>0)p.repeatsLeft=String(rl-1);
  if(wk)p.dueDate=addW(now,wk).toISOString().slice(0,10);
  p.apptDT='';p.lastUpdated=now.toISOString();
  save();push(p);renderAll();toast(p.patientName+' - injection confirmed',true);
  if(p.assignType==='1 Dose Only')setTimeout(function(){toast('Reminder: '+p.patientName+' is 1 Dose Only');},3000);
}
function setSite(fn,site){var p=fp(fn);if(!p)return;p.site=site;save();push(p);renderAll();}
function saveAppt(fn){var inp=document.getElementById('ap-'+fn);if(!inp||!inp.value){toast('Select a date and time first');return;}var p=fp(fn);if(!p)return;p.apptDT=inp.value;save();push(p);renderAll();toast('Appointment confirmed: '+fmtDT(inp.value));}
function clrAppt(fn){var p=fp(fn);if(!p)return;p.apptDT='';save();push(p);renderAll();toast('Appointment cleared');}
function saveDue(fn){var inp=document.getElementById('du-'+fn);if(!inp||!inp.value){toast('Select a due date first');return;}var p=fp(fn);if(!p)return;p.dueDate=inp.value;save();push(p);renderAll();toast('Due date saved: '+fmt(pd(inp.value)));}
function saveCom(fn){var p=fp(fn);if(!p)return;var ta=document.getElementById('cm-'+fn);if(ta)p.comments=ta.value.trim();save();push(p);toast('Saved');}
function showPF(fn){var f=document.getElementById('pf-'+fn);if(f)f.style.display=f.style.display==='block'?'none':'block';}
function mrkPend(fn){var p=fp(fn);if(!p)return;var inp=document.getElementById('pr-'+fn);p.pendReason=inp?inp.value.trim():'No reason given';p.status='Pending';p.apptDT='';save();push(p);renderAll();switchTab('pending');toast(p.patientName+' moved to Pending');}
function react(fn){var p=fp(fn);if(!p)return;p.status='Active';p.pendReason='';p.archivedDate='';save();push(p);renderAll();toast(p.patientName+' reactivated');}
function archPt(fn){var p=fp(fn);if(!p)return;lastSnap=JSON.parse(JSON.stringify(p));p.status='Archived';p.archivedDate=new Date().toISOString().slice(0,10);save();push(p);renderAll();toast(p.patientName+' archived',true);}
function delPt(fn){if(!confirm('Delete this patient?'))return;var idx=-1;for(var i=0;i<pts.length;i++){if(pts[i].fileNumber===fn){idx=i;break;}}if(idx<0)return;lastSnap=JSON.parse(JSON.stringify(pts[idx]));pts.splice(idx,1);save();del(fn);renderAll();toast('Patient deleted',true);}
function undoAct(){if(!lastSnap)return;var found=false;for(var i=0;i<pts.length;i++){if(pts[i].fileNumber===lastSnap.fileNumber){pts[i]=lastSnap;found=true;break;}}if(!found)pts.push(lastSnap);lastSnap=null;save();renderAll();hideToast();}

// MODAL
function openModal(fn){
  var p=fn?fp(fn):norm({});if(!p)return;
  var ae=!!fn;
  var av=p.apptDT?new Date(p.apptDT).toISOString().slice(0,16):'';
  var dv=p.dueDate?new Date(p.dueDate).toISOString().slice(0,10):'';
  function so(opts,cur){var s='';for(var i=0;i<opts.length;i++)s+='<option'+(opts[i]===cur?' selected':'')+'>'+opts[i]+'</option>';return s;}
  function fi(lbl,id,type,val,ph,ro){return '<div class="form-field"><label class="form-lbl">'+lbl+'</label><input class="inp" id="'+id+'" type="'+(type||'text')+'" value="'+esc(val||'')+'" placeholder="'+(ph||'')+'"'+(ro?' readonly':'')+' style="font-size:16px"></div>';}
  function ta(lbl,id,val){return '<div class="form-field full"><label class="form-lbl">'+lbl+'</label><textarea class="ta" id="'+id+'" style="font-size:15px">'+esc(val||'')+'</textarea></div>';}
  var h='<div class="sheet-handle"></div><div class="sheet-inner">';
  h+='<div class="sheet-hdr"><div class="sheet-title">'+(ae?'Edit Patient':'New Patient')+'</div><button class="sheet-close" onclick="closeModal()">&#x2715;</button></div>';
  h+='<div class="form-grid">';
  h+=fi('File Number *','ff','text',p.fileNumber,'29754',ae);
  h+=fi('Patient Name *','fn','text',p.patientName,'First Last');
  h+='<div class="form-field full"><label class="form-lbl">Address</label><input class="inp" id="fa" type="text" value="'+esc(p.address)+'" placeholder="123 Rue, Laval, QC" style="font-size:16px"></div>';
  h+=fi('Phone 1','fp1','tel',p.phone1,'514-000-0000');
  h+=fi('Phone 2','fp2','tel',p.phone2,'450-000-0000');
  var DOSES=['','7.5 mg','22.5 mg','30 mg','45 mg'];
  var doseOpts='';for(var di=0;di<DOSES.length;di++)doseOpts+='<option value="'+DOSES[di]+'"'+(DOSES[di]===p.dose?' selected':'')+'>'+( DOSES[di]||'-- Select dose --')+'</option>';
  h+='<div class="form-field"><label class="form-lbl">Dose</label>'+
     '<select class="sel" id="fd" style="font-size:16px" onchange="previewDue()">'+doseOpts+'</select>'+
     '<div id="duePreview" style="font-size:12px;color:var(--teal);margin-top:5px;font-family:JetBrains Mono,monospace;display:none"></div></div>';
  h+=fi('Total Doses','ftd','text',p.totalDoses,'6');
  h+=fi('Repeats Left','frl','text',p.repeatsLeft,'5');
  h+='<div class="form-field"><label class="form-lbl">Assignment</label><select class="sel" id="fat" style="font-size:16px">'+so(ATYPES,p.assignType)+'</select></div>';
  h+='<div class="form-field"><label class="form-lbl">Status</label><select class="sel" id="fst" style="font-size:16px">'+so(FSTATUSES,p.status)+'</select></div>';
  h+='<div class="form-field full"><label class="form-lbl">Appointment Date & Time</label><input class="inp" id="fat2" type="datetime-local" value="'+av+'" style="font-size:16px"></div>';
  h+='<div class="form-field full"><label class="form-lbl">Due Date</label><input class="inp" id="fdu" type="date" value="'+dv+'" style="font-size:16px"></div>';
  h+=ta('Special Instructions','fsp',p.special);
  h+=ta('Adverse Effects','fad',p.adverse);
  h+=ta('Comments','fco',p.comments);
  h+='</div>';
  h+='<div class="btn-row" style="margin-top:20px"><button onclick="closeModal()" class="btn btn-outline" style="flex-shrink:0">Cancel</button><button onclick="savePt()" class="btn btn-blue" style="flex:1">Save Patient</button></div>';
  h+='</div>';
  document.getElementById('modalSh').innerHTML=h;
  document.getElementById('modalOv').classList.add('on');
}
function closeModal(){document.getElementById('modalOv').classList.remove('on');}
function gv(id){var el=document.getElementById(id);return el?el.value.trim():'';}
function savePt(){
  var fn=gv('ff');if(!fn){alert('File number required.');return;}
  if(!gv('fn')){alert('Patient name required.');return;}
  var p=norm({fileNumber:fn,patientName:gv('fn'),address:gv('fa'),phone1:gv('fp1'),phone2:gv('fp2'),dose:gv('fd'),totalDoses:gv('ftd'),repeatsLeft:gv('frl'),assignType:gv('fat'),status:gv('fst'),apptDT:gv('fat2'),dueDate:gv('fdu'),special:gv('fsp'),adverse:gv('fad'),comments:gv('fco'),lastUpdated:new Date().toISOString()});
  var found=false;
  for(var i=0;i<pts.length;i++){
    if(pts[i].fileNumber===fn){
      p.prevSite=pts[i].prevSite||'';p.prevDates=pts[i].prevDates||'';
      p.pendReason=pts[i].pendReason||'';p.archivedDate=pts[i].archivedDate||'';
      p.site=pts[i].site||'';pts[i]=p;found=true;break;
    }
  }
  if(!found)pts.push(p);
  save();push(p);closeModal();renderAll();toast(p.patientName+' saved');
}

  '<div class="setup-card"><div class="setup-title">Setup Guide</div><div class="setup-steps"><ol><li>Google Sheet &rarr; <strong>Extensions</strong> &rarr; <strong>Apps Script</strong></li><li>Paste <span class="code">Code.gs</span> into the editor</li><li>Create HTML file named <span class="code">index</span> &rarr; paste this file</li><li><strong>Deploy</strong> &rarr; New deployment &rarr; Web app</li><li>Execute as: <strong>Me</strong> &bull; Access: <strong>Anyone</strong></li><li>Authorize &rarr; Copy the <span class="code">/exec</span> URL</li></ol></div></div>';
}
function saveUrl(){var u=document.getElementById('surl')?document.getElementById('surl').value.trim():'';if(!u){alert('Enter URL');return;}if(u.indexOf('script.google.com')<0){alert('Not a valid Apps Script URL');return;}sUrl=u;localStorage.setItem('vm_surl',u);curTab='today';loadSheet();renderAll();}
function testConn(){
  var u=document.getElementById('surl')?document.getElementById('surl').value.trim():'';
  var tb=document.getElementById('tbox');if(!tb)return;
  tb.style.display='block';tb.textContent='Testing...';
  if(!u||!u.endsWith('/exec')){tb.textContent='URL must end in /exec';return;}
  var prev=sUrl;sUrl=u;
  var xhr=new XMLHttpRequest();xhr.open('GET',u+'?action=getAll&t='+Date.now(),true);
  xhr.onload=function(){try{var d=JSON.parse(xhr.responseText);if(d.error){tb.textContent='Error: '+d.error;sUrl=prev;}else if(Array.isArray(d)){tb.textContent='Connected! '+d.length+' patients found.';}else{tb.textContent='Unexpected response.';sUrl=prev;}}catch(e){tb.textContent='Parse error.';sUrl=prev;}};
  xhr.onerror=function(){tb.textContent='Network error.';sUrl=prev;};xhr.send();
}

function openImp(){
  var ak=localStorage.getItem(AKEY)||'';
  var h='<div class="sheet-handle"></div><div class="sheet-inner">';

  h+='<div class="setup-card" style="margin-bottom:12px"><div class="setup-title">Import CSV</div><div class="setup-desc">Upload any CSV with patient data. First row = headers.</div><div class="drop-zone" id="csvDZ" onclick="document.getElementById(\'csvF\').click()" ondragover="event.preventDefault();this.classList.add(\'drag\')" ondragleave="this.classList.remove(\'drag\')" ondrop="this.classList.remove(\'drag\');handleCsv(event.dataTransfer.files[0]);event.preventDefault()"><div style="font-size:32px;margin-bottom:8px">&#x1F4CA;</div><div style="font-size:15px;font-weight:600;color:var(--slate-700)">Drop CSV here or tap to browse</div><input type="file" id="csvF" accept=".csv" onchange="handleCsv(this.files[0])"></div><div id="csvLog" class="import-log"></div></div>';
  h+='<div class="setup-card"><div class="setup-title">Import PDF (AI)</div><div class="setup-desc">AI reads your PDF and extracts patient data automatically. Needs API key above.</div><div class="drop-zone" id="pdfDZ" onclick="document.getElementById(\'pdfF\').click()" ondragover="event.preventDefault();this.classList.add(\'drag\')" ondragleave="this.classList.remove(\'drag\')" ondrop="this.classList.remove(\'drag\');handlePdf(event.dataTransfer.files[0]);event.preventDefault()"><div style="font-size:32px;margin-bottom:8px">&#x1F4C4;</div><div style="font-size:15px;font-weight:600;color:var(--slate-700)">Drop PDF here or tap to browse</div><input type="file" id="pdfF" accept=".pdf" onchange="handlePdf(this.files[0])"></div><div id="pdfLog" class="import-log"></div></div>';
  h+='</div>';

function closeImp(){document.getElementById('impOv').classList.remove('on');}

function handleCsv(file){
  if(!file)return;
  var log=document.getElementById('csvLog');if(log){log.style.display='block';log.textContent='Reading...';}
  var r=new FileReader();
  r.onload=function(e){
    try{
      var rows=parseCSV(e.target.result);if(rows.length<2){if(log)log.textContent='No data rows found.';return;}
      var headers=rows[0],imp=0,skip=0;
      for(var i=1;i<rows.length;i++){
        var row=rows[i];if(!row||row.length===0)continue;
        var obj={};for(var j=0;j<headers.length;j++)obj[headers[j]]=row[j]||'';
        var p=norm(obj);if(!p.fileNumber&&!p.patientName){skip++;continue;}
        if(!p.fileNumber)p.fileNumber='CSV-'+Date.now()+'-'+i;
        var found=false;for(var k=0;k<pts.length;k++){if(pts[k].fileNumber===p.fileNumber){pts[k]=p;found=true;break;}}
        if(!found)pts.push(p);imp++;
      }
      save();renderAll();
      if(log){log.textContent='Imported '+imp+' patients.'+(skip?' Skipped '+skip+'.':'');log.classList.add('import-ok');}
    }catch(err){if(log)log.textContent='Error: '+err.message;}
  };
  r.readAsText(file);
}

function parseCSV(text){
  var rows=[],cur=[],field='',inQ=false;
  for(var i=0;i<text.length;i++){
    var c=text[i];
    if(inQ){if(c==='"'&&text[i+1]==='"'){field+='"';i++;}else if(c==='"'){inQ=false;}else{field+=c;}}
    else if(c==='"'){inQ=true;}
    else if(c===','){cur.push(field.trim());field='';}
    else if(c==='\n'||c==='\r'){if(field||cur.length){cur.push(field.trim());if(cur.some(function(v){return v;}))rows.push(cur);}cur=[];field='';}
    else{field+=c;}
  }
  if(field||cur.length){cur.push(field.trim());if(cur.some(function(v){return v;}))rows.push(cur);}
  return rows;
}

function handlePdf(file){
  if(!file)return;
  var ak=localStorage.getItem(AKEY)||document.getElementById('iak')&&document.getElementById('iak').value.trim();
  var log=document.getElementById('pdfLog');
  if(!ak){if(log){log.style.display='block';log.textContent='Enter your Anthropic API key first.';}return;}
  if(log){log.style.display='block';log.textContent='Reading PDF...';}
  var r=new FileReader();
  r.onload=function(e){
    var b64=e.target.result.split(',')[1];
    if(log)log.textContent='Sending to AI...';
    var prompt='Extract all patient records from this medical document. Return ONLY a valid JSON array. Each object must have: fileNumber, patientName, address, phone1, phone2, dose, totalDoses, repeatsLeft, site (injection site), dueDate (YYYY-MM-DD), apptDT (YYYY-MM-DDThh:mm), assignType (Permanent or 1 Dose Only), special (special instructions), adverse (adverse effects), comments. Empty string if not found. Return JSON array only, no other text.';
    var xhr=new XMLHttpRequest();
    xhr.open('POST','https://api.anthropic.com/v1/messages',true);
    xhr.setRequestHeader('Content-Type','application/json');
    xhr.setRequestHeader('x-api-key',ak);
    xhr.setRequestHeader('anthropic-version','2023-06-01');
    xhr.setRequestHeader('anthropic-dangerous-direct-browser-access','true');
    xhr.onload=function(){
      try{
        var data=JSON.parse(xhr.responseText);
        if(data.error){if(log)log.textContent='AI error: '+data.error.message;return;}
        var txt=data.content&&data.content[0]?data.content[0].text:'';
        var m=txt.match(/\[[\s\S]*\]/);
        if(!m){if(log)log.textContent='Could not parse AI response.';return;}
        var extracted=JSON.parse(m[0]),imp=0;
        for(var i=0;i<extracted.length;i++){
          var p=norm(extracted[i]);if(!p.patientName&&!p.fileNumber)continue;
          if(!p.fileNumber)p.fileNumber='PDF-'+Date.now()+'-'+i;
          var found=false;for(var k=0;k<pts.length;k++){if(pts[k].fileNumber===p.fileNumber){pts[k]=p;found=true;break;}}
          if(!found)pts.push(p);imp++;
        }
        save();renderAll();
        if(log){log.textContent='AI extracted '+imp+' patients.';log.classList.add('import-ok');}
      }catch(err){if(log)log.textContent='Error: '+err.message;}
    };
    xhr.onerror=function(){if(log)log.textContent='Network error.';};
    xhr.send(JSON.stringify({model:'claude-opus-4-5',max_tokens:4000,messages:[{role:'user',content:[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:prompt}]}]}));
  };
  r.readAsDataURL(file);
}

// TOAST
function toast(msg,withUndo){
  clearTimeout(toastTm);
  document.getElementById('toastMsg').textContent=msg;
  var u=document.getElementById('toastUndo');if(u)u.style.display=withUndo?'':'none';
  document.getElementById('toast').classList.add('on');
  toastTm=setTimeout(hideToast,5000);
}
function hideToast(){document.getElementById('toast').classList.remove('on');}

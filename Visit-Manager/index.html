<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>DosingTracker | Clinical Suite</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/utils.css">
    
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- PDF.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';</script>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header__container">
                <div class="header__top">
                    <div class="logo">
                        <span class="logo__icon">💉</span>
                        <h1 class="logo__text">DosingTracker</h1>
                        <span class="logo__badge">CLINICAL SUITE</span>
                    </div>
                    <div class="header__actions">
                        <button id="refreshBtn" class="btn btn--ghost" aria-label="Refresh">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                        </button>
                        <button id="syncStatusBtn" class="sync-status">
                            <span class="sync-status__dot"></span>
                            <span id="syncStatus">Connected</span>
                        </button>
                    </div>
                </div>
                <div class="header__search">
                    <div class="search">
                        <svg class="search__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                        <input type="text" id="searchInput" placeholder="Search by name or file number...">
                        <button id="clearSearchBtn" class="search__clear">✕</button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Tabs -->
        <nav class="tabs">
            <div class="tabs__container">
                <button class="tab-btn active" data-tab="all">All Patients</button>
                <button class="tab-btn" data-tab="today">Today</button>
                <button class="tab-btn" data-tab="scheduled">Scheduled</button>
                <button class="tab-btn" data-tab="overdue">Overdue</button>
                <button class="tab-btn" data-tab="pending">Pending</button>
                <button class="tab-btn" data-tab="archived">Archived</button>
                <button class="tab-btn" data-tab="report">Reports</button>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main">
            <div class="container">
                <button id="addPatientBtn" class="btn btn--primary btn--full add-patient-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                    Add New Patient
                </button>

                <!-- Patient List -->
                <div id="patientList" class="patient-list">
                    <div class="empty-state">
                        <div class="empty-state__icon">👥</div>
                        <p>Loading patients...</p>
                    </div>
                </div>

                <!-- Report View -->
                <div id="reportView" class="report-view" style="display: none;">
                    <div class="card card--report">
                        <div class="card__header">
                            <h2 class="card__title">📊 Data Management</h2>
                        </div>
                        <div class="card__body">
                            <div class="button-group">
                                <button id="importGoogleSheetsBtn" class="btn btn--secondary">📊 Import from Sheets</button>
                                <button id="importCSVBtn" class="btn btn--secondary">📄 Import CSV</button>
                                <button id="importPDFBtn" class="btn btn--secondary">📑 Import PDF</button>
                                <button id="exportJSONBtn" class="btn btn--secondary">📥 Export Backup</button>
                                <button id="exportCSVReportBtn" class="btn btn--secondary">📊 Export All CSV</button>
                                <input type="file" id="csvFileInput" accept=".csv" style="display:none">
                                <input type="file" id="pdfFileInput" accept=".pdf" style="display:none">
                            </div>
                        </div>
                    </div>

                    <div class="card card--report">
                        <div class="card__header">
                            <h2 class="card__title">📋 Custom Report</h2>
                        </div>
                        <div class="card__body">
                            <div class="report-controls">
                                <select id="reportField" class="select">
                                    <option value="due_date">Due Date</option>
                                    <option value="dose_prescribed">Dose Prescribed</option>
                                    <option value="assignment_type">Assignment Type</option>
                                    <option value="doses_remaining">Doses Remaining</option>
                                    <option value="patient_name">Patient Name</option>
                                    <option value="file_number">File Number</option>
                                </select>
                                <select id="reportCondition" class="select">
                                    <option value="equals">Equals</option>
                                    <option value="contains">Contains</option>
                                    <option value="greater">Greater Than</option>
                                    <option value="less">Less Than</option>
                                </select>
                                <input type="text" id="reportValue" placeholder="Value" class="input">
                                <button id="generateReportBtn" class="btn btn--primary">Generate</button>
                            </div>
                            <div class="quick-reports">
                                <button class="quick-btn" data-quick="dueToday">📅 Due Today</button>
                                <button class="quick-btn" data-quick="noRepeatsLeft">⚠️ No Repeats Left</button>
                                <button class="quick-btn" data-quick="pendingPatients">⏳ Pending</button>
                                <button class="quick-btn" data-quick="tempPatients">📋 Temporary</button>
                            </div>
                            <div id="reportOutput" class="report-output"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="loading-overlay" style="display: none;">
            <div class="loading-spinner"></div>
            <div class="loading-text">Loading...</div>
        </div>
    </div>

    <!-- Modals (placed at end for clean DOM) -->
    <div id="injectionModal" class="modal">
        <div class="modal__content modal__content--medium">
            <div class="modal__header">
                <h2>💉 Confirm Injection</h2>
                <button class="modal__close close-injection-modal">&times;</button>
            </div>
            <div id="injectionPatientName" class="modal__patient-name"></div>
            <div id="injectionCurrentInfo" class="modal__info"></div>
            <div class="form-group">
                <label>Injection Site *</label>
                <select id="injectionSiteSelect" class="select">
                    <option value="">Select injection site...</option>
                    <option value="Right Side">Right Side</option>
                    <option value="Left Side">Left Side</option>
                    <option value="Right Glute">Right Glute</option>
                    <option value="Left Glute">Left Glute</option>
                </select>
            </div>
            <div class="form-group">
                <label>📝 Special Instructions</label>
                <textarea id="injectionSpecialInstructions" rows="2" class="textarea"></textarea>
            </div>
            <div class="form-group">
                <label>⚠️ Adverse Events</label>
                <textarea id="injectionAdverseEvents" rows="2" class="textarea"></textarea>
            </div>
            <div class="form-group">
                <label>💬 Comments / Notes</label>
                <textarea id="injectionComments" rows="2" class="textarea" placeholder="Additional notes..."></textarea>
            </div>
            <div class="modal__footer">
                <button id="cancelInjectionBtn" class="btn btn--secondary">Cancel</button>
                <button id="confirmInjectionBtn" class="btn btn--primary">Confirm Injection</button>
            </div>
        </div>
    </div>

    <div id="apptEditModal" class="modal">
        <div class="modal__content modal__content--small">
            <div class="modal__header">
                <h2>📅 Edit Appointment</h2>
                <button class="modal__close close-appt">&times;</button>
            </div>
            <input type="datetime-local" id="appointmentDateInput" class="input">
            <div class="modal__footer">
                <button id="saveAppointmentBtn" class="btn btn--primary">Save & Confirm</button>
                <button id="cancelAppointmentBtn" class="btn btn--secondary">Cancel</button>
            </div>
        </div>
    </div>

    <div id="confirmModal" class="modal">
        <div class="modal__content modal__content--tiny">
            <h3>Confirm Action</h3>
            <p id="confirmMessage" class="confirm-message"></p>
            <div class="modal__footer">
                <button id="confirmYes" class="btn btn--primary">Yes</button>
                <button id="confirmNo" class="btn btn--secondary">No</button>
            </div>
        </div>
    </div>

    <div id="patientModal" class="modal">
        <div class="modal__content modal__content--large">
            <div class="modal__header">
                <h2 id="modalTitle">Add Patient</h2>
                <button class="modal__close close">&times;</button>
            </div>
            <form id="patientForm" class="form">
                <div class="form__grid">
                    <div class="form-group"><label>Patient Name *</label><input type="text" id="patientName" class="input" required></div>
                    <div class="form-group"><label>File Number *</label><input type="text" id="fileNumber" class="input" required></div>
                    <div class="form-group full-width"><label>Address</label><input type="text" id="address" class="input"></div>
                    <div class="form-group"><label>Phone 1</label><input type="tel" id="phone1" class="input"></div>
                    <div class="form-group"><label>Phone 2</label><input type="tel" id="phone2" class="input"></div>
                    <div class="form-group"><label>💊 Dose Prescribed</label>
                        <select id="dosePrescribed" class="select">
                            <option value="7.5">7.5 mg (4 weeks)</option>
                            <option value="22.5">22.5 mg (12 weeks)</option>
                            <option value="30">30 mg (16 weeks)</option>
                            <option value="45">45 mg (24 weeks)</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Total Doses</label><input type="number" id="totalDoses" class="input" value="4" min="1"></div>
                    <div class="form-group"><label>Doses Remaining</label><input type="number" id="dosesRemaining" class="input" value="4" min="0"></div>
                    <div class="form-group"><label>Previous Injection Site</label><input type="text" id="prevInjSite" class="input"></div>
                    <div class="form-group"><label>Injection Site</label>
                        <select id="injSite" class="select">
                            <option value="">Select</option>
                            <option value="Right Side">Right Side</option>
                            <option value="Left Side">Left Side</option>
                            <option value="Right Glute">Right Glute</option>
                            <option value="Left Glute">Left Glute</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Due Date</label><input type="date" id="dueDate" class="input"></div>
                    <div class="form-group"><label>Appointment Date & Time</label><input type="datetime-local" id="appointmentDateTime" class="input"></div>
                    <div class="form-group full-width"><label>Previous Injection Dates</label><input type="text" id="prevInjDates" class="input"></div>
                    <div class="form-group"><label>Assignment Type</label>
                        <select id="assignmentType" class="select"><option value="Permanent">Permanent</option><option value="Temporary">Temporary</option></select>
                    </div>
                    <div class="form-group full-width"><label>⚠️ Special Instructions</label><textarea id="specialInstructions" class="textarea" rows="2"></textarea></div>
                    <div class="form-group full-width"><label>Adverse Effects Comments</label><textarea id="adverseEffects" class="textarea" rows="2"></textarea></div>
                </div>
                <div class="form__footer">
                    <button type="button" id="deletePatientBtn" class="btn btn--danger" style="display:none;">Delete</button>
                    <button type="submit" class="btn btn--primary">Save Patient</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>

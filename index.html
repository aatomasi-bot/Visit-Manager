<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1e40af">
<title>Visit Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#1d4ed8;--blue-lt:#eff6ff;--blue-md:#bfdbfe;
  --green:#15803d;--green-lt:#f0fdf4;--green-md:#bbf7d0;
  --red:#b91c1c;--red-lt:#fef2f2;--red-md:#fecaca;
  --amber:#92400e;--amber-lt:#fffbeb;--amber-md:#fde68a;
  --purple:#5b21b6;--purple-lt:#f5f3ff;
  --teal:#0f766e;--teal-lt:#f0fdfa;
  --slate-50:#f8fafc;--slate-100:#f1f5f9;--slate-200:#e2e8f0;
  --slate-300:#cbd5e1;--slate-400:#94a3b8;--slate-500:#64748b;
  --slate-600:#475569;--slate-700:#334155;--slate-800:#1e293b;--slate-900:#0f172a;
  --white:#ffffff;
  --r:14px;--rs:10px;--rx:8px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 2px 6px rgba(0,0,0,.04);
  --shh:0 4px 16px rgba(0,0,0,.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;-webkit-text-size-adjust:100%;}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--slate-100);color:var(--slate-900);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
a{text-decoration:none;color:inherit;}
input,select,textarea,button{font-family:inherit;-webkit-appearance:none;appearance:none;border:none;outline:none;background:none;}
button{cursor:pointer;}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;background:var(--white);border-bottom:1px solid var(--slate-200);box-shadow:var(--sh);}
.hdr-in{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:54px;}
.logo{display:flex;align-items:center;gap:9px;}
.logo-mark{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#1d4ed8,#3b82f6);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(29,78,216,.3);}
.logo-name{font-size:18px;font-weight:800;letter-spacing:-.5px;}
.logo-name b{color:var(--blue);}
.hdr-right{display:flex;align-items:center;gap:8px;}
.sync-lbl{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--slate-400);}

/* TABS */
.tabs-wrap{position:sticky;top:54px;z-index:90;background:var(--white);border-bottom:1px solid var(--slate-200);overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tabs-wrap::-webkit-scrollbar{display:none;}
.tabs{display:flex;max-width:960px;margin:0 auto;padding:0 10px;min-width:max-content;}
.tab{display:inline-flex;align-items:center;gap:5px;padding:0 13px;height:46px;font-size:13px;font-weight:600;color:var(--slate-400);border-bottom:2.5px solid transparent;cursor:pointer;white-space:nowrap;transition:color .15s;background:none;border-top:none;border-left:none;border-right:none;}
.tab.on{color:var(--blue);border-bottom-color:var(--blue);}
.tab:hover:not(.on){color:var(--slate-600);}
.tab-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.tab-n{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:2px 6px;border-radius:20px;background:var(--slate-100);color:var(--slate-500);}
.tab.on .tab-n{background:var(--blue-lt);color:var(--blue);}

/* SEARCH */
.srch-wrap{max-width:960px;margin:0 auto;padding:12px 16px 8px;}
.srch-row{display:flex;gap:8px;align-items:center;}
.srch-box{flex:1;display:flex;align-items:center;gap:9px;background:var(--white);border:1.5px solid var(--slate-200);border-radius:var(--r);padding:0 13px;height:44px;transition:border-color .15s,box-shadow .15s;}
.srch-box:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,78,216,.08);}
.srch-inp{flex:1;font-size:15px;color:var(--slate-900);background:transparent;}
.srch-inp::placeholder{color:var(--slate-400);}
.srch-x{color:var(--slate-400);font-size:17px;cursor:pointer;display:none;line-height:1;}

/* MAIN */
.main{max-width:960px;margin:0 auto;padding:10px 14px 90px;}
.panel{display:none;}
.panel.on{display:block;}

/* DATE DIVIDER */
.date-div{display:flex;align-items:center;gap:10px;padding:14px 0 6px;}
.date-div-line{flex:1;height:1px;background:var(--slate-200);}
.date-div-lbl{font-size:11px;font-weight:700;color:var(--slate-400);text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;}

/* BANNER */
.banner{display:flex;align-items:flex-start;gap:9px;background:var(--amber-lt);border:1px solid var(--amber-md);border-radius:var(--r);padding:12px 14px;margin-bottom:10px;font-size:14px;color:var(--amber);line-height:1.5;}

/* CARD */
.card{background:var(--white);border-radius:var(--r);border:1px solid var(--slate-200);box-shadow:var(--sh);margin-bottom:10px;overflow:hidden;transition:box-shadow .2s;}
.card:hover{box-shadow:var(--shh);}
.card.bl-blue  {border-left:4px solid #3b82f6;}
.card.bl-green {border-left:4px solid #22c55e;}
.card.bl-red   {border-left:4px solid #ef4444;}
.card.bl-amber {border-left:4px solid #f59e0b;}
.card.bl-gray  {border-left:4px solid var(--slate-300);opacity:.7;}

/* CARD TOP */
.card-top{padding:14px 16px 0;cursor:pointer;}
.card-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.card-name{font-size:17px;font-weight:700;color:var(--slate-900);line-height:1.25;letter-spacing:-.2px;}
.card-meta{font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--slate-400);margin-top:3px;}
.card-badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.bdg{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;font-family:'JetBrains Mono',monospace;}
.bdg-blue  {background:var(--blue-lt);color:var(--blue);}
.bdg-green {background:var(--green-lt);color:var(--green);}
.bdg-red   {background:var(--red-lt);color:var(--red);}
.bdg-amber {background:var(--amber-lt);color:var(--amber);}
.bdg-purple{background:var(--purple-lt);color:var(--purple);}
.bdg-teal  {background:var(--teal-lt);color:var(--teal);}
.bdg-gray  {background:var(--slate-100);color:var(--slate-500);}

/* SPECIAL */
.card-special{display:flex;align-items:flex-start;gap:8px;background:var(--amber-lt);border-left:4px solid #f59e0b;border-radius:0 10px 10px 0;padding:10px 14px;margin:10px 14px 0;font-size:13px;font-weight:600;color:var(--amber);line-height:1.5;}
.card-pend{font-size:12px;color:var(--amber);background:var(--amber-lt);border-radius:var(--rx);margin:6px 14px 0;padding:7px 12px;font-weight:500;}

/* QUICK ACTIONS */
.card-actions{display:flex;flex-wrap:wrap;gap:7px;padding:10px 14px 12px;}
.addr-btn{display:inline-flex;align-items:center;gap:6px;background:var(--green-lt);color:var(--green);border:1.5px solid var(--green-md);border-radius:var(--rs);padding:8px 13px;font-size:13px;font-weight:600;text-decoration:none;max-width:100%;overflow:hidden;min-height:40px;}
.addr-btn:active{background:#dcfce7;}
.addr-btn-txt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:min(240px,55vw);}
.phone-btn{display:inline-flex;align-items:center;gap:6px;background:var(--blue-lt);color:var(--blue);border:1.5px solid var(--blue-md);border-radius:var(--rs);padding:8px 13px;font-size:14px;font-weight:600;font-family:'JetBrains Mono',monospace;text-decoration:none;white-space:nowrap;min-height:40px;}
.phone-btn:active{background:#dbeafe;}

/* EXPAND TOGGLE */
.card-tog{display:flex;align-items:center;justify-content:center;gap:5px;padding:10px;border-top:1px solid var(--slate-100);cursor:pointer;font-size:12px;font-weight:600;color:var(--slate-400);transition:background .15s,color .15s;}
.card-tog:hover{background:var(--slate-50);color:var(--slate-600);}
.chev{display:inline-block;transition:transform .2s;font-size:11px;}
.card.open .chev{transform:rotate(180deg);}

/* EXPANDED */
.card-body{display:none;border-top:1px solid var(--slate-100);background:var(--slate-50);}
.card.open .card-body{display:block;}
.sec{padding:16px 18px;border-bottom:1px solid var(--slate-100);}
.sec:last-child{border-bottom:none;}
.sec-ttl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--slate-400);margin-bottom:12px;font-family:'JetBrains Mono',monospace;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g2 .full{grid-column:1/-1;}
.fld{display:flex;flex-direction:column;gap:3px;}
.fld-l{font-size:10px;font-weight:600;color:var(--slate-400);text-transform:uppercase;letter-spacing:.5px;}
.fld-v{font-size:14px;font-weight:500;color:var(--slate-800);line-height:1.4;}
.fld-m{font-family:'JetBrains Mono',monospace;font-size:13px;}
.next-prev{display:inline-flex;align-items:center;gap:6px;background:var(--blue-lt);color:var(--blue);border-radius:var(--rx);padding:6px 12px;font-size:12px;font-family:'JetBrains Mono',monospace;margin-top:10px;}
.adverse-box{background:var(--red-lt);border-left:4px solid #ef4444;border-radius:0 var(--rx) var(--rx) 0;padding:10px 14px;font-size:13px;color:var(--red);font-weight:500;line-height:1.5;}

/* INPUTS */
.inp{width:100%;background:var(--white);border:1.5px solid var(--slate-200);border-radius:var(--rx);padding:10px 12px;font-size:15px;color:var(--slate-900);transition:border-color .15s;min-height:44px;}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,78,216,.08);}
.inp::placeholder{color:var(--slate-400);}
.inp[type=date],.inp[type=datetime-local]{cursor:pointer;}
.sel{width:100%;background:var(--white);border:1.5px solid var(--slate-200);border-radius:var(--rx);padding:10px 12px;font-size:15px;color:var(--slate-900);cursor:pointer;min-height:44px;}
.ta{width:100%;background:var(--white);border:1.5px solid var(--slate-200);border-radius:var(--rx);padding:10px 12px;font-size:14px;color:var(--slate-900);resize:vertical;min-height:76px;line-height:1.6;}
.ta:focus,.sel:focus,.inp:focus{border-color:var(--blue);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;font-size:13px;font-weight:600;padding:9px 16px;border-radius:var(--rx);cursor:pointer;transition:all .15s;white-space:nowrap;min-height:40px;line-height:1;}
.btn:active{transform:scale(.96);}
.btn.full{width:100%;}
.btn-blue {background:var(--blue);color:#fff;}
.btn-blue:hover{background:#1e40af;box-shadow:0 4px 12px rgba(29,78,216,.35);}
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover{background:#166534;}
.btn-amber{background:#d97706;color:#fff;}
.btn-amber:hover{background:#b45309;}
.btn-red  {background:var(--red-lt);color:var(--red);border:1.5px solid var(--red-md);}
.btn-red:hover{background:#fee2e2;}
.btn-out  {background:var(--white);color:var(--slate-700);border:1.5px solid var(--slate-200);}
.btn-out:hover{background:var(--slate-50);border-color:var(--slate-300);}
.btn-ghost{background:transparent;color:var(--slate-500);}
.btn-ghost:hover{background:var(--slate-100);}
.btn-sm{padding:7px 12px;font-size:12px;min-height:36px;}
.btn-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;}

/* SITE BUTTONS */
.site-btns{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;}
.site-btn{padding:7px 14px;border-radius:20px;border:1.5px solid var(--slate-200);background:var(--white);color:var(--slate-500);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;min-height:36px;}
.site-btn:hover{border-color:var(--blue);color:var(--blue);}
.sl{background:var(--blue-lt);color:var(--blue);border-color:#93c5fd;}
.sr{background:var(--amber-lt);color:var(--amber);border-color:var(--amber-md);}
.sg{background:var(--green-lt);color:var(--green);border-color:var(--green-md);}

/* CONFIRM */
.conf-box{background:var(--green-lt);border:1.5px solid var(--green-md);border-radius:var(--r);padding:14px;}
.conf-lbl{font-size:13px;color:var(--slate-600);margin-bottom:10px;line-height:1.5;}
.conf-lbl strong{color:var(--green);}
.conf-inp{width:100%;background:var(--white);border:1.5px solid var(--slate-200);border-radius:var(--rx);padding:11px 14px;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:5px;text-transform:uppercase;text-align:center;margin-bottom:10px;min-height:50px;transition:border-color .15s;}
.conf-inp.ok{border-color:var(--green);background:var(--green-lt);}
.conf-sub{opacity:.4;pointer-events:none;}
.conf-sub.rdy{opacity:1;pointer-events:all;}

/* PEND FORM */
.pend-form{background:var(--amber-lt);border:1.5px solid var(--amber-md);border-radius:var(--r);padding:14px;margin-top:10px;display:none;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.overlay.on{display:flex;}
.sheet{background:var(--white);width:100%;max-width:960px;border-radius:20px 20px 0 0;max-height:94dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:6px 0 0;animation:slideUp .25s ease;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.sheet-handle{width:36px;height:4px;background:var(--slate-200);border-radius:2px;margin:0 auto 16px;}
.sheet-in{padding:0 18px 48px;}
.sheet-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.sheet-ttl{font-size:20px;font-weight:800;}
.sheet-x{width:34px;height:34px;border-radius:50%;background:var(--slate-100);color:var(--slate-500);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.fg .full{grid-column:1/-1;}
.ff{display:flex;flex-direction:column;gap:5px;}
.fl{font-size:11px;font-weight:700;color:var(--slate-500);text-transform:uppercase;letter-spacing:.5px;}

/* FAB */
.fab{position:fixed;z-index:150;width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.2);cursor:pointer;transition:transform .15s;border:none;}
.fab:active{transform:scale(.92);}
.fab-add{bottom:22px;right:14px;background:var(--blue);color:#fff;font-size:26px;box-shadow:0 4px 16px rgba(29,78,216,.4);}
.fab-add:hover{background:#1e40af;}

/* TOAST */
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--slate-900);color:#f8fafc;padding:11px 18px;border-radius:12px;font-size:14px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:999;display:flex;align-items:center;gap:12px;min-width:220px;max-width:340px;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:all;}
.toast-undo{color:#fbbf24;font-weight:700;cursor:pointer;flex-shrink:0;}

/* EMPTY */
.empty{text-align:center;padding:56px 20px;}
.empty-ico{font-size:44px;margin-bottom:12px;}
.empty-lbl{font-size:15px;font-weight:600;color:var(--slate-400);}

@media(min-width:640px){.hdr-in,.srch-wrap,.main{padding-left:24px;padding-right:24px;}.fg{grid-template-columns:1fr 1fr 1fr;}}
@media(max-width:480px){.g2{grid-template-columns:1fr;}.g2 .full{grid-column:1;}.card-name{font-size:16px;}}
</style>
</head>
<body>

<div class="toast" id="toast">
  <span id="tMsg" style="flex:1"></span>
  <span class="toast-undo" id="tUndo" onclick="undoAct()" style="display:none">Undo</span>
</div>

<button class="fab fab-add" onclick="openModal(null)">+</button>

<div class="overlay" id="modalOv" onclick="if(event.target===this)closeModal()">
  <div class="sheet" id="modalSh"></div>
</div>

<header class="hdr">
  <div class="hdr-in">
    <div class="logo">
      <div class="logo-mark">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      </div>
      <span class="logo-name">Visit<b>.</b>Manager</span>
    </div>
    <div class="hdr-right">
      <span class="sync-lbl" id="syncLbl"></span>
      <button class="btn btn-out btn-sm" onclick="syncNow()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Sync
      </button>
    </div>
  </div>
</header>

<div class="tabs-wrap"><div class="tabs" id="tabsEl"></div></div>

<div class="srch-wrap">
  <div class="srch-row">
    <div class="srch-box">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="srchInp" class="srch-inp" type="search" placeholder="Search name, file #, phone..." oninput="onSearch()">
      <span class="srch-x" id="srchX" onclick="clearSearch()">&#x2715;</span>
    </div>
    <button class="btn btn-blue btn-sm" onclick="onSearch()">Search</button>
  </div>
</div>

<main class="main">
  <div id="pToday"     class="panel"></div>
  <div id="pScheduled" class="panel"></div>
  <div id="pOverdue"   class="panel"></div>
  <div id="pQueue"     class="panel"></div>
  <div id="pPending"   class="panel"></div>
  <div id="pArchived"  class="panel"></div>
</main>

<script>
// ES5 compatible
var CSV_URL    = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQQidcM4dXyR4xXYhZQyTqC-_9LmZ5vMkRiV7oluY13fFGO8ySmpkjH1k8xqzzjhLc__yL5vMafIsb9/pub?output=csv";
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwNMhrg7E7UCU-GYn3zeSw_kXAOi6OfdVf_JMPfTzXYm75BYp6HaZW6dPDRN0QdNqgh/exec";
var MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
var SITES  = ["Left Side","Right Side","Left Glute","Right Glute"];
var DOSE_WEEKS = {7.5:4, 22.5:12, 30:16, 45:24};

var pts = [];
var curTab = "today";
var srchQ  = "";
var lastSnap = null;
var toastTm  = null;

// DATE UTILS
function tod(){ var n=new Date(); return new Date(n.getFullYear(),n.getMonth(),n.getDate()); }
function pd(s){
  if(!s||String(s).trim()==="")return null;
  s=String(s).trim();
  var dm=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(dm)return new Date(parseInt(dm[1]),parseInt(dm[2])-1,parseInt(dm[3]),12,0,0);
  return null;
}
function fmtD(d){
  if(!d)return"";
  if(typeof d==="string")d=pd(d);
  if(!d)return"";
  return d.getDate()+" "+MONTHS[d.getMonth()]+" "+d.getFullYear();
}
function fmtDT(s){
  if(!s)return"";
  var d=pd(s);
  if(!d)return s;
  var parts=s.split("T");
  var t=parts[1]?parts[1].slice(0,5):"";
  return fmtD(d)+(t?" "+t:"");
}
function addW(d,w){var r=new Date(d);r.setDate(r.getDate()+w*7);return r;}
function isToday(d){if(!d)return false;var t=tod();return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate();}
function getMg(dose){var m=String(dose||"").match(/(\d+(?:\.\d+)?)\s*mg/i);return m?parseFloat(m[1]):0;}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

// CSV PARSING
function parseCSV(text){
  var lines=text.split("\n");
  var headers=parseCSVLine(lines[0]);
  var result=[];
  for(var i=1;i<lines.length;i++){
    var line=lines[i].trim();
    if(!line)continue;
    var vals=parseCSVLine(line);
    var obj={};
    for(var j=0;j<headers.length;j++) obj[headers[j].trim()]=vals[j]?vals[j].trim():"";
    if(obj.fileNumber&&obj.fileNumber.trim()) result.push(obj);
  }
  return result;
}
function parseCSVLine(line){
  var result=[],cur="",inQ=false;
  for(var i=0;i<line.length;i++){
    var c=line[i];
    if(inQ){if(c==='"'&&line[i+1]==='"'){cur+='"';i++;}else if(c==='"'){inQ=false;}else{cur+=c;}}
    else if(c==='"'){inQ=true;}
    else if(c===","){result.push(cur);cur="";}
    else{cur+=c;}
  }
  result.push(cur);
  return result;
}

// LOAD from public CSV
// Google Sheets published CSV blocks direct cross-origin fetch from GitHub Pages
// We try direct first, then fall back through two reliable proxies
function loadCSV(cb){
  var urls = [
    CSV_URL + "&t=" + Date.now(),
    "https://corsproxy.io/?" + encodeURIComponent(CSV_URL),
    "https://api.allorigins.win/raw?url=" + encodeURIComponent(CSV_URL)
  ];
  var idx = 0;
  function tryNext(){
    if(idx >= urls.length){ cb(null, "All sync methods failed. Check your internet connection."); return; }
    var url = urls[idx++];
    fetch(url)
      .then(function(r){ return r.text(); })
      .then(function(text){
        if(!text || text.trim().charAt(0) === "<"){
          tryNext(); // got HTML error page, try next
          return;
        }
        cb(parseCSV(text), null);
      })
      .catch(function(){ tryNext(); });
  }
  tryNext();
}

// TAB LOGIC
function getTab(p){
  var s=p.status||"Active";
  if(s==="Archived")return"archived";
  if(s==="Pending")return"pending";
  var t=tod();
  var appt=pd(p.apptDT||"");
  var due=pd(p.dueDate||"");
  if(appt&&appt<t)return"overdue";
  if(due&&due<t&&!appt)return"overdue";
  if(appt&&isToday(appt))return"today";
  if(appt&&appt>t)return"scheduled";
  if(due&&due>=t)return"queue";
  return"scheduled";
}
function sortFor(list,tab){
  return list.slice().sort(function(a,b){
    var ad,bd,an=a.patientName||"",bn=b.patientName||"";
    if(tab==="today"||tab==="scheduled"){
      ad=pd(a.apptDT)||new Date(9e15);bd=pd(b.apptDT)||new Date(9e15);
      if(ad-bd!==0)return ad-bd;return an.localeCompare(bn);
    }
    if(tab==="overdue"){
      ad=pd(a.apptDT)||pd(a.dueDate)||new Date(0);
      bd=pd(b.apptDT)||pd(b.dueDate)||new Date(0);
      return ad-bd;
    }
    if(tab==="queue"||tab==="pending"){
      ad=pd(a.dueDate)||new Date(9e15);bd=pd(b.dueDate)||new Date(9e15);return ad-bd;
    }
    if(tab==="archived"){
      ad=pd(a.archivedDate)||new Date(0);bd=pd(b.archivedDate)||new Date(0);return bd-ad;
    }
    return an.localeCompare(bn);
  });
}

// FIND PATIENT
function fp(fn){for(var i=0;i<pts.length;i++){if(pts[i].fileNumber===fn)return pts[i];}return null;}
function sp(p){for(var i=0;i<pts.length;i++){if(pts[i].fileNumber===p.fileNumber){pts[i]=p;return;}}pts.push(p);}

// ACTIONS
function chkDone(inp,fn){
  var v=inp.value.trim().toUpperCase()==="DONE";
  if(v)inp.classList.add("ok");else inp.classList.remove("ok");
  var b=document.getElementById("cs-"+fn);
  if(b){if(v)b.classList.add("rdy");else b.classList.remove("rdy");}
}

function confInj(fn){
  var p=fp(fn);if(!p)return;
  lastSnap=JSON.parse(JSON.stringify(p));
  var mg=getMg(p.dose||""),wk=DOSE_WEEKS[mg];
  var appt=pd(p.apptDT||""),today=tod();
  var base=appt||today;
  var prev=(p.prevDates?p.prevDates.split(",").map(function(s){return s.trim();}).filter(Boolean):[]);
  prev.push(fmtD(base));p.prevDates=prev.join(", ");
  p.prevSite=p.site||"";p.site="";
  var rl=parseInt(p.repeatsLeft||"0")||0;if(rl>0)p.repeatsLeft=String(rl-1);
  if(wk){var nd=addW(base,wk);p.dueDate=nd.getFullYear()+"-"+(nd.getMonth()<9?"0":"")+(nd.getMonth()+1)+"-"+(nd.getDate()<10?"0":"")+nd.getDate();}
  p.apptDT="";p.lastUpdated=new Date().toISOString();
  sp(p);writePatient(p);renderAll();
  var ndStr=fmtD(pd(p.dueDate));
  toast(p.patientName+" confirmed. Next due: "+ndStr,true);
  if(p.assignType==="1 Dose Only")setTimeout(function(){toast("Reminder: "+p.patientName+" is 1 Dose Only");},3000);
}

function setSite(fn,site){var p=fp(fn);if(!p)return;p.site=site;sp(p);writePatient(p);renderAll();}

function saveAppt(fn){
  var inp=document.getElementById("ap-"+fn);
  if(!inp||!inp.value){toast("Select a date and time first");return;}
  var p=fp(fn);if(!p)return;
  p.apptDT=inp.value;sp(p);writePatient(p);
  var newTab=getTab(p);curTab=newTab;
  renderAll();toast("Appointment confirmed: "+fmtDT(inp.value));
}
function clrAppt(fn){var p=fp(fn);if(!p)return;p.apptDT="";sp(p);writePatient(p);renderAll();toast("Appointment cleared");}
function saveDue(fn){
  var inp=document.getElementById("du-"+fn);
  if(!inp||!inp.value){toast("Select a due date");return;}
  var p=fp(fn);if(!p)return;p.dueDate=inp.value;sp(p);writePatient(p);renderAll();toast("Due date saved: "+fmtD(pd(inp.value)));
}
function saveCom(fn){var p=fp(fn);if(!p)return;var ta=document.getElementById("cm-"+fn);if(ta)p.comments=ta.value.trim();sp(p);writePatient(p);toast("Saved");}
function showPF(fn){var f=document.getElementById("pf-"+fn);if(f)f.style.display=f.style.display==="block"?"none":"block";}
function mrkPend(fn){
  var p=fp(fn);if(!p)return;
  var inp=document.getElementById("pr-"+fn);
  p.pendReason=inp?inp.value.trim():"No reason given";
  p.status="Pending";p.apptDT="";
  sp(p);writePatient(p);renderAll();switchTab("pending");toast(p.patientName+" moved to Pending");
}
function react(fn){var p=fp(fn);if(!p)return;p.status="Active";p.pendReason="";p.archivedDate="";sp(p);writePatient(p);renderAll();toast(p.patientName+" reactivated");}
function archPt(fn){
  var p=fp(fn);if(!p)return;lastSnap=JSON.parse(JSON.stringify(p));
  p.status="Archived";p.archivedDate=new Date().toISOString().slice(0,10);
  sp(p);writePatient(p);renderAll();toast(p.patientName+" archived",true);
}
function delPt(fn){
  if(!confirm("Delete this patient permanently?"))return;
  var idx=-1;for(var i=0;i<pts.length;i++){if(pts[i].fileNumber===fn){idx=i;break;}}
  if(idx<0)return;
  lastSnap=JSON.parse(JSON.stringify(pts[idx]));
  pts.splice(idx,1);deleteRemote(fn);renderAll();toast("Patient deleted",true);
}
function undoAct(){
  if(!lastSnap)return;
  sp(lastSnap);lastSnap=null;renderAll();hideToast();
}

// MODAL
function openModal(fn){
  var p=fn?fp(fn):{};if(!p)p={};
  var isEdit=!!fn;
  var av=p.apptDT?p.apptDT.slice(0,16):"";
  var dv=p.dueDate?p.dueDate.slice(0,10):"";
  function sel(opts,cur){var s="";for(var i=0;i<opts.length;i++)s+="<option"+(opts[i]===cur?" selected":"")+">"+opts[i]+"</option>";return s;}
  function fi(lbl,id,type,val,ph,ro){
    return '<div class="ff"><label class="fl">'+lbl+'</label><input class="inp" id="'+id+'" type="'+(type||"text")+'" value="'+esc(val||"")+'" placeholder="'+(ph||"")+'"'+(ro?" readonly":"")+' style="font-size:15px"></div>';
  }

  var h='<div class="sheet-handle"></div><div class="sheet-in">';
  h+='<div class="sheet-hdr"><div class="sheet-ttl">'+(isEdit?"Edit Patient":"New Patient")+'</div><button class="sheet-x" onclick="closeModal()">&#x2715;</button></div>';
  h+='<div class="fg">';
  h+=fi("File Number *","ff","text",p.fileNumber,"29754",isEdit);
  h+=fi("Patient Name *","fn2","text",p.patientName,"First Last");
  h+='<div class="ff full"><label class="fl">Address</label><input class="inp" id="fa" type="text" value="'+esc(p.address||"")+'" placeholder="123 Rue, Montreal, QC" style="font-size:15px"></div>';
  h+=fi("Phone 1","fp1","tel",p.phone1,"514-000-0000");
  h+=fi("Phone 2","fp2","tel",p.phone2,"450-000-0000");
  h+=fi("Dose","fd","text",p.dose,"45 mg x 6");
  h+=fi("Total Doses","ftd","text",p.totalDoses,"6");
  h+=fi("Repeats Left","frl","text",p.repeatsLeft,"5");
  h+='<div class="ff"><label class="fl">Assignment</label><select class="sel" id="fat">'+sel(["Permanent","1 Dose Only"],p.assignType||"Permanent")+'</select></div>';
  h+='<div class="ff"><label class="fl">Status</label><select class="sel" id="fst">'+sel(["Active","Pending","Archived"],p.status||"Active")+'</select></div>';
  h+='<div class="ff full"><label class="fl">Appointment Date &amp; Time</label><input class="inp" id="fat2" type="datetime-local" value="'+av+'" style="font-size:15px"></div>';
  h+='<div class="ff full"><label class="fl">Due Date</label><input class="inp" id="fdu" type="date" value="'+dv+'" style="font-size:15px"></div>';
  h+='<div class="ff full"><label class="fl">Special Instructions</label><textarea class="ta" id="fsp">'+esc(p.special||"")+'</textarea></div>';
  h+='<div class="ff full"><label class="fl">Adverse Effects</label><textarea class="ta" id="fad">'+esc(p.adverse||"")+'</textarea></div>';
  h+='<div class="ff full"><label class="fl">Comments</label><textarea class="ta" id="fco">'+esc(p.comments||"")+'</textarea></div>';
  h+='</div>';
  h+='<div class="btn-row" style="margin-top:20px"><button onclick="closeModal()" class="btn btn-out" style="flex-shrink:0">Cancel</button><button onclick="savePt(\''+esc(fn||"")+'\')" class="btn btn-blue" style="flex:1">Save Patient</button></div>';
  h+='</div>';
  document.getElementById("modalSh").innerHTML=h;
  document.getElementById("modalOv").classList.add("on");
}
function closeModal(){document.getElementById("modalOv").classList.remove("on");}
function gv(id){var el=document.getElementById(id);return el?el.value.trim():"";}
function savePt(origFn){
  var fn=gv("ff")||origFn;if(!fn){alert("File number required.");return;}
  if(!gv("fn2")){alert("Patient name required.");return;}
  var existing=fp(fn)||{};
  var p=Object.assign({},existing,{
    fileNumber:fn,patientName:gv("fn2"),address:gv("fa"),
    phone1:gv("fp1"),phone2:gv("fp2"),dose:gv("fd"),
    totalDoses:gv("ftd"),repeatsLeft:gv("frl"),
    assignType:gv("fat"),status:gv("fst"),
    apptDT:gv("fat2"),dueDate:gv("fdu"),
    special:gv("fsp"),adverse:gv("fad"),comments:gv("fco"),
    lastUpdated:new Date().toISOString()
  });
  sp(p);writePatient(p);closeModal();renderAll();toast(p.patientName+" saved");
}

// TABS
function switchTab(id){curTab=id;renderAll();window.scrollTo({top:0,behavior:"smooth"});}

// TOAST
function toast(msg,withUndo){
  clearTimeout(toastTm);
  document.getElementById("tMsg").textContent=msg;
  var u=document.getElementById("tUndo");if(u)u.style.display=withUndo?"":"none";
  document.getElementById("toast").classList.add("on");
  toastTm=setTimeout(hideToast,5000);
}
function hideToast(){document.getElementById("toast").classList.remove("on");}

// INIT
function init(){
  syncNow();
}
init();
</script>
</body>
</html>

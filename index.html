<div id="patientModal" class="modal"><div class="modal-content"><div class="modal-header"><h2 id="modalTitle">Add Patient</h2><span class="close">&times;</span></div><form id="patientForm"><div class="form-grid"><div class="form-group"><label>Patient Name *</label><input type="text" id="patientName" required></div><div class="form-group"><label>File Number *</label><input type="text" id="fileNumber" required></div><div class="form-group full-width"><label>Address</label><input type="text" id="address"></div><div class="form-group"><label>Phone 1</label><input type="tel" id="phone1"></div><div class="form-group"><label>Phone 2</label><input type="tel" id="phone2"></div><div class="form-group"><label>💊 Dose</label><select id="dosePrescribed"><option value="7.5">7.5 mg (4 weeks)</option><option value="22.5">22.5 mg (12 weeks)</option><option value="30">30 mg (16 weeks)</option><option value="45">45 mg (24 weeks)</option></select></div><div class="form-group"><label>Total Doses</label><input type="number" id="totalDoses" value="4" min="1"></div><div class="form-group"><label>Doses Left</label><input type="number" id="dosesRemaining" value="4" min="0"></div><div class="form-group"><label>Prev Injection Site</label><input type="text" id="prevInjSite"></div><div class="form-group"><label>Injection Site</label><select id="injSite"><option value="">Select</option><option value="Right Side">Right Side</option><option value="Left Side">Left Side</option><option value="Right Glute">Right Glute</option><option value="Left Glute">Left Glute</option></select></div><div class="form-group"><label>Due Date</label><input type="date" id="dueDate"></div><div class="form-group"><label>Appointment</label><input type="datetime-local" id="appointmentDateTime"></div><div class="form-group full-width"><label>Prev Injection Dates</label><input type="text" id="prevInjDates"></div><div class="form-group"><label>Assignment</label><select id="assignmentType"><option value="Permanent">Permanent</option><option value="Temporary">Temporary</option></select></div><div class="form-group full-width"><label>Special Instructions</label><textarea id="specialInstructions" rows="2"></textarea></div><div class="form-group full-width"><label>Adverse Effects</label><textarea id="adverseEffects" rows="2"></textarea></div></div><div class="modal-footer"><button type="button" id="deletePatientBtn" class="btn-sm btn-danger" style="display:none">Delete</button><button type="submit" class="btn-sm btn-primary">Save</button></div></form></div></div>

<script>
    // ==================== SUPABASE CONFIG ====================
    // REPLACE WITH YOUR ACTUAL SUPABASE CREDENTIALS
    const SUPABASE_URL = "https://wqlbmtjbjloxpvsbeqyb.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_gcyK2z_8lvbOgHNcJfdX1g_8QCWJ_Xi";
    const GOOGLE_SHEETS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSYgD018ww2Mbkud6ZYmZHop7EXxcm_0Zl4V9bB2AaY4r4xXTWChAW6v-gUyjD4-2Qmg4H8O0kxryCf/pub?output=csv";
    
    let _supabase = null, patients = [], currentEditId = null, pendingConfirmCallback = null, currentTab = 'all', searchQuery = '', pendingInjectionId = null, pendingAppointmentId = null;
    const doseToWeeks = { '7.5': 4, '22.5': 12, '30': 16, '45': 24 };
    
    // Column mapping - NO 'comments' column
    const columnMapping = {
        'Patient Name': 'patient_name', 'File Number': 'file_number', 'Address': 'address', 'Phone 1': 'phone1', 'Phone 2': 'phone2',
        'Dose Prescribed': 'dose_prescribed', 'Total Doses': 'total_doses', 'Doses Remaining': 'doses_remaining',
        'Previous Injection Site': 'previous_injection_site', 'Injection Site': 'injection_site', 'Due Date': 'due_date',
        'Appointment Date & Time': 'appointment_date_time', 'Previous Injection Dates': 'previous_injection_dates',
        'Assignment Type': 'assignment_type', 'Special Instructions': 'special_instructions', 'Adverse Effects Comments': 'adverse_effects_comments',
        'File Status': 'file_status', 'Injection Administered': 'injection_administered', 'Appointment Confirmed': 'appointment_confirmed',
        'Pending': 'pending', 'Archived': 'archived'
    };

    // ==================== FIXED: LOCAL DATE HANDLING (NO OFFSET) ====================
    function getLocalDateFromInput(dateInput) {
        if (!dateInput) return null;
        if (typeof dateInput === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(dateInput)) return dateInput;
        const date = new Date(dateInput);
        if (isNaN(date.getTime())) return null;
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }
    
    function getLocalDateTimeFromInput(dtInput) {
        if (!dtInput) return null;
        if (typeof dtInput === 'string' && dtInput.includes('T')) return dtInput;
        const date = new Date(dtInput);
        if (isNaN(date.getTime())) return null;
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');
        return `${year}-${month}-${day}T${hours}:${minutes}`;
    }

    function parseLocalDate(dateStr) {
        if (!dateStr) return null;
        const [year, month, day] = dateStr.split('-').map(Number);
        return new Date(year, month - 1, day);
    }

    function addWeeksToLocalDate(dateStr, weeks) {
        const date = parseLocalDate(dateStr);
        if (!date) return null;
        date.setDate(date.getDate() + (weeks * 7));
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    // ==================== SUPABASE FUNCTIONS ====================
    async function initSupabase() {
        if (SUPABASE_URL === "https://YOUR_PROJECT_ID.supabase.co") { document.getElementById('syncStatus').innerHTML = '⚠️ Configure Supabase'; return false; }
        try {
            _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            const { error } = await _supabase.from('patients').select('count', { count: 'exact', head: true });
            if (error) throw error;
            document.getElementById('syncStatus').innerHTML = '✅ Connected';
            return true;
        } catch(e) { console.error(e); document.getElementById('syncStatus').innerHTML = '❌ Connection failed'; return false; }
    }
    
    async function loadPatients() {
        if (!_supabase) return;
        document.getElementById('loadingOverlay').style.display = 'flex';
        try {
            const { data, error } = await _supabase.from('patients').select('*').order('created_at', { ascending: false });
            if (error) throw error;
            patients = data.map(row => { const p = {}; for (let [display, db] of Object.entries(columnMapping)) p[display] = row[db]; p.id = row.id; return p; });
            document.getElementById('recordCount').innerHTML = `📋 ${patients.length}`;
            renderCurrentTab();
        } catch(e) { console.error(e); alert('Load error: ' + e.message); }
        finally { document.getElementById('loadingOverlay').style.display = 'none'; }
    }
    
    async function addPatientToDB(p) { 
        const db = {}; 
        for (let [display, dbName] of Object.entries(columnMapping)) db[dbName] = p[display] || null; 
        const { error } = await _supabase.from('patients').insert([db]); 
        if(error) { alert('Error: '+error.message); return false; } 
        return true; 
    }
    
    async function updatePatientInDB(id, p) { 
        const db = {}; 
        for (let [display, dbName] of Object.entries(columnMapping)) db[dbName] = p[display] || null; 
        const { error } = await _supabase.from('patients').update(db).eq('id', id); 
        if(error) { alert('Error: '+error.message); return false; } 
        return true; 
    }
    
    async function deletePatientFromDB(id) { 
        const { error } = await _supabase.from('patients').delete().eq('id', id); 
        if(error) { alert('Error: '+error.message); return false; } 
        return true; 
    }

    // ==================== PDF EXTRACTION ====================
    async function importPDF(file) {
        const fileInput = document.getElementById('pdfFileInput');
        const selectedFile = fileInput.files[0];
        if (!selectedFile || selectedFile.type !== 'application/pdf') { alert('Select a PDF'); return; }
        document.getElementById('loadingOverlay').style.display = 'flex';
        try {
            const arrayBuffer = await selectedFile.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let fullText = '';
            for (let i = 1; i <= pdf.numPages; i++) { const page = await pdf.getPage(i); const textContent = await page.getTextContent(); fullText += textContent.items.map(t => t.str).join(' ') + '\n'; }
            document.getElementById('loadingOverlay').style.display = 'none';
            
            let patientName = null, fileNumber = null, dose = null, address = null, phone1 = null, phone2 = null, injectionDate = null;
            const nameMatch = fullText.match(/PATIENT NAME\/NOM DU PATIENT\s*([A-Z][A-Z\s]+[A-Z])/i);
            if (nameMatch) patientName = nameMatch[1].trim().replace(/\s+/g, ' ');
            const fileMatch = fullText.match(/MEDICUM\s*#:\s*(\d+)/i);
            if (fileMatch) fileNumber = fileMatch[1];
            const doseMatch = fullText.match(/(\d+\.?\d*)\s*mg/i);
            if (doseMatch && [7.5,22.5,30,45].includes(parseFloat(doseMatch[1]))) dose = parseFloat(doseMatch[1]).toString();
            let addrParts = [];
            const street = fullText.match(/ADDRESS\/ADRESSE\s*([A-Za-z0-9\s,.'-]+)/i);
            if (street) addrParts.push(street[1].trim());
            const city = fullText.match(/CITY\/VILLE\s*([A-Za-zÀ-ÿ\s.'-]+(?:,?\s*[A-Z]{2})?)/i);
            if (city) addrParts.push(city[1].trim());
            const postal = fullText.match(/\b([A-Z]\d[A-Z]\s?\d[A-Z]\d)\b/i);
            if (postal && !addrParts.some(p=>p.includes(postal[1]))) addrParts.push(postal[1].trim());
            if (addrParts.length) address = addrParts.join(', ').replace(/\s+/g,' ').trim();
            const phoneMatch1 = fullText.match(/TELEPHONE\/TELEPHONE\s*(\d{3}\s?\d{3}\s?\d{4})/i);
            if (phoneMatch1) phone1 = phoneMatch1[1].replace(/\s/g,'');
            else { const phoneStd = fullText.match(/TELEPHONE\s*(\d{3}\s?\d{3}\s?\d{4})/i); if(phoneStd) phone1 = phoneStd[1].replace(/\s/g,''); }
            const phoneSec = fullText.match(/SECONDARY CONTACT[^0-9]*(\d{3}\s?\d{3}\s?\d{4})/i);
            if (phoneSec) phone2 = phoneSec[1].replace(/\s/g,'');
            const injMatch = fullText.match(/injection seulement\s+(\d{1,2})\s+([A-Za-zéè]+)\s+(\d{4})/i);
            if (injMatch) {
                const months = {'janvier':'01','février':'02','mars':'03','avril':'04','mai':'05','juin':'06','juillet':'07','août':'08','septembre':'09','octobre':'10','novembre':'11','décembre':'12'};
                injectionDate = `${injMatch[3]}-${months[injMatch[2].toLowerCase()]}-${injMatch[1].padStart(2,'0')}`;
            }
            if (patientName && fileNumber && confirm(`Add: ${patientName} (${fileNumber})?`)) {
                const defaultDue = new Date(); defaultDue.setDate(defaultDue.getDate()+7);
                const dueDateStr = `${defaultDue.getFullYear()}-${String(defaultDue.getMonth()+1).padStart(2,'0')}-${String(defaultDue.getDate()).padStart(2,'0')}`;
                await addPatient({
                    'Patient Name': patientName, 'File Number': fileNumber, 'Address': address||'', 'Phone 1': phone1||'', 'Phone 2': phone2||'',
                    'Dose Prescribed': dose||'7.5', 'Total Doses': '4', 'Doses Remaining': '4', 'Previous Injection Site': '', 'Injection Site': '',
                    'Due Date': dueDateStr, 'Appointment Date & Time': injectionDate, 'Previous Injection Dates': '', 'Assignment Type': 'Permanent',
                    'Special Instructions': '', 'Adverse Effects Comments': '', 'File Status': 'Active', 'Injection Administered': false,
                    'Appointment Confirmed': !!injectionDate, 'Pending': false, 'Archived': false
                });
                alert('Patient added');
            } else alert('Could not extract required data');

    // ==================== GOOGLE SHEETS IMPORT ====================
    async function importFromGoogleSheets() {
        if (!confirm('Import from Google Sheets?')) return;
        document.getElementById('loadingOverlay').style.display = 'flex';
        try {
            const resp = await fetch(GOOGLE_SHEETS_CSV_URL);
            const csv = await resp.text();
            const rows = csv.split('\n');
            const headers = rows[0].split(',').map(h=>h.trim().replace(/"/g,''));
            let imported=0, dup=0;
            for(let i=1;i<rows.length;i++) {
                if(!rows[i].trim()) continue;
                let vals=[], inQuote=false, cur='';
                for(let ch of rows[i]) {
                    if(ch==='"') inQuote=!inQuote;
                    else if(ch===',' && !inQuote) { vals.push(cur.trim().replace(/^"|"$/g,'')); cur=''; }
                    else cur+=ch;
                }
                vals.push(cur.trim().replace(/^"|"$/g,''));
                const p={}; headers.forEach((h,idx)=>p[h]=vals[idx]||'');
                if(p['Patient Name'] && !patients.find(ex=>ex['File Number']===p['File Number'])) {
                    const defDue = new Date(); defDue.setDate(defDue.getDate()+7);
                    const due = `${defDue.getFullYear()}-${String(defDue.getMonth()+1).padStart(2,'0')}-${String(defDue.getDate()).padStart(2,'0')}`;
                    await addPatient({
                        'Patient Name': p['Patient Name'], 'File Number': p['File Number'], 'Address': p['Address']||'', 'Phone 1': p['Phone 1']||'', 'Phone 2': p['Phone 2']||'',
                        'Dose Prescribed': p['Dose Prescribed']||'7.5', 'Total Doses': p['Total Doses']||'4', 'Doses Remaining': p['Doses Remaining']||'4',
                        'Previous Injection Site': '', 'Injection Site': '', 'Due Date': due, 'Appointment Date & Time': null,
                        'Previous Injection Dates': '', 'Assignment Type': 'Permanent', 'Special Instructions': '', 'Adverse Effects Comments': '',
                        'File Status': 'Active', 'Injection Administered': false, 'Appointment Confirmed': false, 'Pending': false, 'Archived': false
                    });
                    imported++;
                } else dup++;
            }
            alert(`Imported ${imported}, skipped ${dup} duplicates`);
            await loadPatients();
        } catch(e) { alert('Import error: '+e.message); }
        finally { document.getElementById('loadingOverlay').style.display = 'none'; }
    }

    // ==================== DOSING LOGIC (FIXED DATES) ====================
    function getReferenceDateForDueDate(patient) {
        const today = new Date();
        const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
        const apptDateStr = patient['Appointment Date & Time'];
        const apptOnly = apptDateStr ? apptDateStr.split('T')[0] : null;
        const isConfirmed = patient['Appointment Confirmed'] === true;
        const isInjected = patient['Injection Administered'] === true;
        if (isConfirmed && !isInjected && apptOnly) {
            const apptDate = parseLocalDate(apptOnly);
            const todayDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
            if (apptDate && apptDate < todayDate) return apptOnly;
        }
        return todayStr;
    }
    
    function calculateNextDueDate(currentDue, dose, refDate) {
        const weeks = doseToWeeks[dose] || 4;
        return addWeeksToLocalDate(refDate, weeks);
    }

    function showInjectionModal(id) {

        document.getElementById('injectionPatientName').innerHTML = `<strong>${escapeHtml(p['Patient Name'])}</strong> (${p['Dose Prescribed']}mg, ${p['Doses Remaining']} left)`;
        document.getElementById('injectionCurrentInfo').innerHTML = `Next due: +${doseToWeeks[p['Dose Prescribed']]} weeks`;
        document.getElementById('injectionSiteSelect').value = '';

    async function performInjection() {
        const site = document.getElementById('injectionSiteSelect').value;
        if(!site) { alert('Select injection site'); return; }
        const spec = document.getElementById('injectionSpecialInstructions').value;
        const adverse = document.getElementById('injectionAdverseEvents').value;
        const comments = document.getElementById('injectionComments').value;
        const id = pendingInjectionId;
        const p = patients.find(p=>p.id===id);
        if(!p) return;
        let left = parseInt(p['Doses Remaining']) || 0;
        const total = parseInt(p['Total Doses']) || 4;
        if(left<=0) { alert('No doses left'); document.getElementById('injectionModal').style.display='none'; pendingInjectionId=null; return; }
        const today = new Date();
        const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
        let prev = p['Previous Injection Dates'] ? p['Previous Injection Dates'].split(',') : [];
        prev.push(todayStr);
        p['Previous Injection Dates'] = prev.join(', ');
        if(p['Injection Site']) p['Previous Injection Site'] = p['Injection Site'];
        p['Injection Site'] = site;
        if(spec) p['Special Instructions'] = (p['Special Instructions']?p['Special Instructions']+' | ':'') + `[${todayStr}] ${spec}`;
        if(adverse) p['Adverse Effects Comments'] = (p['Adverse Effects Comments']?p['Adverse Effects Comments']+' | ':'') + `[${todayStr}] ${adverse}`;
        if(comments) p['Special Instructions'] = (p['Special Instructions']?p['Special Instructions']+' | ':'') + `[${todayStr}] COMMENTS: ${comments}`;
        const newLeft = left-1;
        p['Doses Remaining'] = newLeft;
        const ref = getReferenceDateForDueDate(p);
        p['Due Date'] = calculateNextDueDate(p['Due Date'], p['Dose Prescribed'], ref);
        p['Injection Administered'] = true;
        p['Appointment Confirmed'] = false;
        p['Appointment Date & Time'] = null;
        p['Pending'] = false;
        if(newLeft===0) p['Pending'] = true;
        await updatePatientInDB(id, p);
        await loadPatients();
        document.getElementById('injectionModal').style.display = 'none';
        pendingInjectionId = null;
        alert(`Injection recorded. ${newLeft} doses left. Next due: ${p['Due Date']}`);
    }

    function getFiltered() {
        const today = new Date();
        const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
        return patients.filter(p => {
            if(p['Archived'] && currentTab!=='archived') return false;
            if(!p['Archived'] && currentTab==='archived') return false;
            if(p['Pending'] && currentTab!=='pending') return false;
            if(!p['Pending'] && currentTab==='pending') return false;
            if(currentTab==='all') return !p['Archived'] && !p['Pending'] && !p['Appointment Confirmed'];
            const appt = p['Appointment Date & Time'];
            const apptDate = appt ? appt.split('T')[0] : null;
            const confirmed = p['Appointment Confirmed'] === true;
            const isToday = apptDate === todayStr;
            const isFuture = apptDate && apptDate > todayStr;
            const overdue = apptDate && apptDate < todayStr && !p['Injection Administered'] && confirmed;
            if(currentTab==='today') return isToday && confirmed && !overdue;
            if(currentTab==='scheduled') return isFuture && confirmed;
            if(currentTab==='overdue') return overdue;
            return false;
        }).filter(p => !searchQuery || p['Patient Name'].toLowerCase().includes(searchQuery) || p['File Number'].toLowerCase().includes(searchQuery))
          .sort((a,b)=> (a['Due Date']||'').localeCompare(b['Due Date']||''));
    }

    function generateReport() { 
        const field=document.getElementById('reportField').value; 
        const cond=document.getElementById('reportCondition').value; 
        const val=document.getElementById('reportValue').value.toLowerCase(); 
        let filtered=patients.filter(p=>{ 
            let fv=p[field]; 
            if(field==='due_date') { 
                if(!fv) return false; 
                const due=new Date(fv); 
                const vdate=new Date(val); 
                if(cond==='equals') return due.toDateString()===vdate.toDateString(); 
                if(cond==='greater') return due>vdate; 
                if(cond==='less') return due<vdate; 
            } else if(field==='dose_prescribed') { 
                if(cond==='equals') return fv===val; 
                if(cond==='greater') return parseFloat(fv)>parseFloat(val); 
                if(cond==='less') return parseFloat(fv)<parseFloat(val); 
            } else if(field==='doses_remaining') { 
                const rem=parseInt(fv)||0; 
                const v=parseInt(val); 
                if(cond==='equals') return rem===v; 
                if(cond==='greater') return rem>v; 
                if(cond==='less') return rem<v; 
            } else { 
                fv=String(fv||'').toLowerCase(); 
                if(cond==='equals') return fv===val; 
                if(cond==='contains') return fv.includes(val); 
            } 
            return false; 
        }); 
        if(!filtered.length) { document.getElementById('reportOutput').innerHTML='<div class="empty-state">No matches</div>'; return; } 
        let html=`<div style="background:white;border-radius:20px;padding:20px"><strong>${filtered.length} found</strong><button onclick="exportReportToCSV()" class="btn-sm btn-secondary" style="margin-left:12px">📥 Export</button>`; 
        const grouped={}; 
        filtered.forEach(p=>{ const d=p['Due Date']?new Date(p['Due Date']).toLocaleDateString():'No Date'; if(!grouped[d]) grouped[d]=[]; grouped[d].push(p); }); 
        Object.keys(grouped).sort().forEach(date=>{ 
            html+=`<div class="date-separator" style="margin-top:16px">📅 ${date}</div>`; 
            grouped[date].forEach(p=>{ 
                html+=`<div style="padding:14px;border-bottom:1px solid #e2e8f0;cursor:pointer" onclick="openEditModal(${p.id})"><strong>${escapeHtml(p['Patient Name'])}</strong> #${escapeHtml(p['File Number'])}<div style="font-size:12px;color:#64748b">💊 ${p['Dose Prescribed']}mg</div></div>`; 
            }); 
        }); 
        html+=`</div>`; 
        document.getElementById('reportOutput').innerHTML=html; 
        window.lastReport=filtered; 
    }
    
    function exportReportToCSV() { 
        if(!window.lastReport || !window.lastReport.length) return; 
        const headers=['Patient Name','File Number','Phone 1','Address','Dose Prescribed','Doses Remaining','Due Date']; 
        const rows=[headers.join(',')]; 
        window.lastReport.forEach(p=>{ rows.push(headers.map(h=>{ let v=p[h]||''; if(v.includes(',')) v=`"${v}"`; return v; }).join(',')); }); 
        const blob=new Blob([rows.join('\n')],{type:'text/csv'}); 
        const a=document.createElement('a'); 
        a.href=URL.createObjectURL(blob); 
        a.download=`report.csv`; 
        a.click(); 
    }

            btn.classList.add('active'); currentTab=btn.dataset.tab; searchQuery=''; document.getElementById('searchInput').value=''; renderCurrentTab();
        }));
        document.getElementById('refreshBtn').addEventListener('click',()=>loadPatients());
        document.getElementById('clearSearchBtn').addEventListener('click',()=>{ document.getElementById('searchInput').value=''; searchQuery=''; renderCurrentTab(); });
        document.getElementById('searchInput').addEventListener('input',e=>{ if(currentTab!=='report'){ searchQuery=e.target.value.toLowerCase(); renderCurrentTab(); } });
        document.getElementById('addPatientBtn').addEventListener('click',openAddModal);
        document.getElementById('importGoogleSheetsBtn').addEventListener('click',importFromGoogleSheets);
        document.getElementById('importCSVBtn').addEventListener('click',()=>document.getElementById('csvFileInput').click());
        document.getElementById('csvFileInput').addEventListener('change',e=>{ if(e.target.files[0]) importCSV(e.target.files[0]); e.target.value=''; });
        document.getElementById('importPDFBtn').addEventListener('click',()=>document.getElementById('pdfFileInput').click());
        document.getElementById('pdfFileInput').addEventListener('change',e=>{ if(e.target.files[0]) importPDF(e.target.files[0]); e.target.value=''; });
        document.getElementById('exportJSONBtn').addEventListener('click',exportJSON);
        document.getElementById('exportCSVReportBtn').addEventListener('click',exportCSV);
        document.getElementById('generateReportBtn').addEventListener('click',generateReport);
        document.querySelectorAll('.close').forEach(c=>c.addEventListener('click',closeModal));
        document.querySelectorAll('.close-injection-modal').forEach(c=>c.addEventListener('click',()=>document.getElementById('injectionModal').style.display='none'));
        document.querySelectorAll('.close-appt').forEach(c=>c.addEventListener('click',()=>document.getElementById('apptEditModal').style.display='none'));
        window.addEventListener('click',e=>{ if(e.target===document.getElementById('patientModal')) closeModal(); if(e.target===document.getElementById('confirmModal')) document.getElementById('confirmModal').style.display='none'; });
        document.getElementById('patientForm').addEventListener('submit',e=>{ e.preventDefault(); savePatientModal(); });
        document.getElementById('deletePatientBtn').addEventListener('click',()=>{ if(currentEditId && confirm('Delete?')) deletePatient(currentEditId).then(()=>closeModal()); });
        document.getElementById('confirmYes').addEventListener('click',()=>{ if(pendingConfirmCallback) pendingConfirmCallback(); document.getElementById('confirmModal').style.display='none'; pendingConfirmCallback=null; });
        document.getElementById('confirmNo').addEventListener('click',()=>{ document.getElementById('confirmModal').style.display='none'; pendingConfirmCallback=null; });
        document.getElementById('confirmInjectionBtn').addEventListener('click',performInjection);
        document.getElementById('cancelInjectionBtn').addEventListener('click',()=>document.getElementById('injectionModal').style.display='none');
        document.getElementById('saveAppointmentBtn').addEventListener('click',saveAppointmentDate);
        document.getElementById('cancelAppointmentBtn').addEventListener('click',()=>document.getElementById('apptEditModal').style.display='none');
        window.openEditModal = openEditModal;
        window.openAppointmentEditor = openAppointmentEditor;
        window.exportReportToCSV = exportReportToCSV;
    });
</script>
</body>
</html>

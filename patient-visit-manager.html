<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Visit Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ── */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html{font-size:18px;-webkit-text-size-adjust:none;text-size-adjust:none;}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#f1f5f9;color:#0f172a;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
input,select,textarea,button{font-family:inherit;-webkit-appearance:none;appearance:none;}
a{text-decoration:none;color:inherit;}

/* ── LAYOUT ── */
.app-shell{display:flex;flex-direction:column;min-height:100vh;}
.header{background:#fff;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.header-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:58px;}
.logo{display:flex;align-items:center;gap:9px;}
.logo-icon{width:32px;height:32px;background:#2563eb;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-text{font-size:19px;font-weight:800;letter-spacing:-.4px;color:#0f172a;}
.logo-text span{color:#2563eb;}
.header-actions{display:flex;align-items:center;gap:8px;}
.sync-time{font-family:'JetBrains Mono',monospace;font-size:12px;color:#94a3b8;display:none;}

/* ── TABS ── */
.tabs-bar{background:#fff;border-bottom:1px solid #e2e8f0;position:sticky;top:58px;z-index:90;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tabs-bar::-webkit-scrollbar{display:none;}
.tabs-inner{display:flex;max-width:900px;margin:0 auto;padding:0 8px;min-width:max-content;}
.tab{font-size:14px;font-weight:600;color:#94a3b8;border:none;background:none;padding:16px 14px 13px;border-bottom:2.5px solid transparent;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;transition:color .15s;-webkit-tap-highlight-color:transparent;min-height:52px;}
.tab.active{color:#2563eb;border-bottom-color:#2563eb;}
.tab:hover:not(.active){color:#64748b;}
.tab-badge{font-size:12px;font-family:'JetBrains Mono',monospace;font-weight:700;padding:3px 7px;border-radius:10px;background:#f1f5f9;color:#64748b;min-width:22px;text-align:center;}
.tab.active .tab-badge{background:#eff6ff;color:#2563eb;}

/* ── SEARCH BAR ── */
.search-bar{max-width:900px;margin:0 auto;padding:14px 16px 10px;}
.search-box{display:flex;align-items:center;gap:10px;background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;padding:10px 14px;transition:border-color .15s;}
.search-box:focus-within{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.08);}
.search-box svg{color:#94a3b8;flex-shrink:0;}
.search-inp{flex:1;border:none;outline:none;font-size:16px;color:#0f172a;background:transparent;min-width:0;}
.search-inp::placeholder{color:#94a3b8;}
.search-btn{background:#2563eb;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s;flex-shrink:0;white-space:nowrap;min-height:38px;}
.search-btn:active{background:#1d4ed8;}
.search-clear{background:none;border:none;color:#94a3b8;cursor:pointer;padding:4px 6px;font-size:18px;line-height:1;display:none;}

/* ── MAIN CONTENT ── */
.main{max-width:900px;margin:0 auto;padding:10px 16px 100px;width:100%;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* ── PATIENT CARD ── */
.card{background:#fff;border-radius:14px;border:1px solid #e2e8f0;box-shadow:0 1px 2px rgba(0,0,0,.04);margin-bottom:12px;overflow:hidden;transition:box-shadow .2s;}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08);}
.card.bl-blue{border-left:4px solid #3b82f6;}
.card.bl-green{border-left:4px solid #22c55e;}
.card.bl-red{border-left:4px solid #ef4444;}
.card.bl-amber{border-left:4px solid #f59e0b;}
.card.bl-gray{border-left:4px solid #cbd5e1;}

/* ── CARD COLLAPSED ── */
.card-top{padding:16px 16px 0;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.card-name{font-size:18px;font-weight:700;color:#0f172a;line-height:1.3;}
.card-sub{font-size:13px;font-family:'JetBrains Mono',monospace;color:#94a3b8;margin-top:4px;}
.card-badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px;}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap;font-family:'JetBrains Mono',monospace;}
.bg-blue{background:#eff6ff;color:#1d4ed8;}
.bg-green{background:#f0fdf4;color:#15803d;}
.bg-red{background:#fef2f2;color:#b91c1c;}
.bg-amber{background:#fffbeb;color:#92400e;}
.bg-purple{background:#f5f3ff;color:#6d28d9;}
.bg-teal{background:#f0fdfa;color:#0f766e;}
.bg-gray{background:#f8fafc;color:#64748b;}

/* ── SPECIAL INSTRUCTIONS ── */
.card-special{display:flex;align-items:flex-start;gap:8px;background:#fffbeb;border-left:4px solid #f59e0b;border-radius:0 10px 10px 0;padding:10px 14px;margin:12px 16px 0;font-size:14px;font-weight:600;color:#92400e;line-height:1.5;}
.card-special svg{flex-shrink:0;margin-top:2px;}

/* ── COMPACT ACTION ROW ── */
.card-actions{display:flex;flex-wrap:wrap;gap:8px;padding:12px 16px 14px;align-items:center;}

/* ADDRESS - compact inline button */
.addr-btn{display:inline-flex;align-items:center;gap:6px;background:#f0fdf4;color:#15803d;border:1.5px solid #bbf7d0;border-radius:10px;padding:9px 14px;font-size:14px;font-weight:600;text-decoration:none;cursor:pointer;transition:all .15s;min-width:0;overflow:hidden;min-height:42px;}
.addr-btn:active{background:#dcfce7;}
.addr-btn span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;}

/* PHONE - compact inline buttons */
.phone-btn{display:inline-flex;align-items:center;gap:7px;background:#eff6ff;color:#1d4ed8;border:1.5px solid #bfdbfe;border-radius:10px;padding:9px 14px;font-size:15px;font-weight:600;font-family:'JetBrains Mono',monospace;text-decoration:none;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;min-height:42px;}
.phone-btn:active{background:#dbeafe;}

/* ── EXPAND TOGGLE ── */
.card-expand{display:flex;align-items:center;justify-content:center;gap:5px;padding:10px;border-top:1px solid #f1f5f9;cursor:pointer;font-size:13px;font-weight:600;color:#94a3b8;transition:color .15s;-webkit-tap-highlight-color:transparent;min-height:44px;}
.card-expand:hover{color:#64748b;background:#f8fafc;}
.card-chevron{transition:transform .2s ease;}
.card.open .card-chevron{transform:rotate(180deg);}

/* ── EXPANDED DETAIL ── */
.card-detail{display:none;border-top:1px solid #f1f5f9;background:#f8fafc;}
.card.open .card-detail{display:block;}
.det-section{padding:16px 18px;border-bottom:1px solid #f1f5f9;}
.det-section:last-child{border-bottom:none;}
.det-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#94a3b8;margin-bottom:12px;font-family:'JetBrains Mono',monospace;}
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.det-field{display:flex;flex-direction:column;gap:4px;}
.det-field.full{grid-column:1/-1;}
.fld-lbl{font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;}
.fld-val{font-size:15px;font-weight:500;color:#1e293b;line-height:1.4;}
.fld-mono{font-family:'JetBrains Mono',monospace;font-size:14px;}

/* ── FORM ELEMENTS ── */
.inp{width:100%;background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;padding:12px 14px;font-size:16px;color:#0f172a;outline:none;transition:border-color .15s;min-height:48px;}
.inp:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.08);}
.inp::placeholder{color:#94a3b8;}
.inp[type="date"]{cursor:pointer;min-height:48px;}
.inp[type="datetime-local"]{cursor:pointer;min-height:48px;}
.sel{width:100%;background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;padding:12px 14px;font-size:16px;color:#0f172a;outline:none;cursor:pointer;min-height:48px;}
.ta{width:100%;background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;padding:12px 14px;font-size:15px;color:#0f172a;outline:none;resize:vertical;min-height:80px;line-height:1.6;}
.ta:focus,.sel:focus,.inp:focus{border-color:#2563eb;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:600;padding:10px 16px;border-radius:10px;border:none;cursor:pointer;transition:all .15s ease;white-space:nowrap;line-height:1;font-family:'Inter',sans-serif;min-height:42px;}
.btn:active{transform:scale(.96);}
.btn-primary{background:#2563eb;color:#fff;}
.btn-primary:hover{background:#1d4ed8;box-shadow:0 4px 12px rgba(37,99,235,.3);}
.btn-success{background:#16a34a;color:#fff;}
.btn-success:hover{background:#15803d;}
.btn-warn{background:#d97706;color:#fff;}
.btn-warn:hover{background:#b45309;}
.btn-danger{background:#fef2f2;color:#b91c1c;border:1.5px solid #fecaca;}
.btn-danger:hover{background:#fee2e2;}
.btn-outline{background:#fff;color:#374151;border:1.5px solid #e2e8f0;}
.btn-outline:hover{background:#f8fafc;border-color:#cbd5e1;}
.btn-ghost{background:transparent;color:#64748b;}
.btn-ghost:hover{background:#f1f5f9;}
.btn-sm{padding:8px 14px;font-size:13px;min-height:38px;}
.btn-full{width:100%;justify-content:center;}
.btn-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}

/* ── SITE BUTTONS ── */
.site-btn{padding:6px 12px;border-radius:20px;border:1.5px solid #e2e8f0;background:#fff;color:#64748b;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;}
.site-btn:hover{border-color:#2563eb;color:#2563eb;}
.site-L{background:#eff6ff;color:#1d4ed8;border-color:#3b82f6;}
.site-R{background:#fffbeb;color:#92400e;border-color:#f59e0b;}
.site-G{background:#f0fdf4;color:#15803d;border-color:#22c55e;}

/* ── CONFIRM BOX ── */
.confirm-box{background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:10px;padding:14px;}
.confirm-lbl{font-size:12px;color:#374151;margin-bottom:8px;}
.confirm-lbl strong{color:#15803d;}
.confirm-inp{width:100%;background:#fff;border:1.5px solid #e2e8f0;border-radius:8px;padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:16px;letter-spacing:4px;text-transform:uppercase;outline:none;margin-bottom:8px;transition:border-color .15s;}
.confirm-inp.valid{border-color:#22c55e;background:#f0fdf4;}
.confirm-sub{opacity:.4;pointer-events:none;}
.confirm-sub.ready{opacity:1;pointer-events:all;}

/* ── ADVERSE EFFECTS ── */
.adverse-box{background:#fef2f2;border-left:3px solid #ef4444;border-radius:0 8px 8px 0;padding:10px 12px;font-size:13px;color:#b91c1c;font-weight:500;line-height:1.4;}

/* ── DATE GROUP ── */
.date-grp{display:flex;align-items:center;gap:10px;padding:14px 0 6px;margin-bottom:2px;}
.date-grp-line{flex:1;height:1px;background:#e2e8f0;}
.date-grp-lbl{font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;}

/* ── IMPORT MODAL ── */
.drop-zone{border:2px dashed #cbd5e1;border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:all .2s;}
.drop-zone:hover,.drop-zone.drag-over{border-color:#2563eb;background:#eff6ff;}
.drop-zone input[type=file]{display:none;}
.import-progress{background:#f1f5f9;border-radius:8px;padding:12px;font-size:12px;color:#64748b;margin-top:10px;display:none;}
.import-result{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px;font-size:12px;color:#15803d;margin-top:8px;display:none;}

/* ── SETUP ── */
.setup-card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:20px;margin-bottom:12px;}
.setup-title{font-size:15px;font-weight:700;color:#0f172a;margin-bottom:6px;}
.setup-desc{font-size:13px;color:#64748b;line-height:1.6;margin-bottom:14px;}
.setup-steps{background:#f8fafc;border-radius:8px;padding:12px 14px;margin-top:10px;font-size:13px;color:#64748b;line-height:2;}
.setup-steps ol{padding-left:18px;}
.code{background:#f1f5f9;border-radius:4px;padding:1px 5px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#0f172a;}
.test-result{font-size:12px;background:#f8fafc;border-radius:8px;padding:10px 12px;margin-top:8px;display:none;border:1px solid #e2e8f0;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-sheet{background:#fff;width:100%;max-width:900px;border-radius:16px 16px 0 0;max-height:94dvh;max-height:94vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 18px 40px;}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.modal-title{font-size:17px;font-weight:700;}
.modal-close{width:30px;height:30px;border-radius:50%;background:#f1f5f9;border:none;color:#64748b;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-field{display:flex;flex-direction:column;gap:5px;}
.form-field.full{grid-column:1/-1;}
.form-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#64748b;}

/* ── TOAST ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:#0f172a;color:#f8fafc;font-size:13px;font-weight:500;padding:11px 16px;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:999;opacity:0;pointer-events:none;display:flex;align-items:center;gap:10px;min-width:220px;max-width:340px;transition:opacity .25s,transform .25s;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:all;}
.toast-undo{color:#f59e0b;font-weight:700;background:none;border:none;font-size:13px;cursor:pointer;flex-shrink:0;}

/* ── FAB ── */
.fab{position:fixed;bottom:24px;right:16px;z-index:150;width:52px;height:52px;border-radius:50%;background:#2563eb;color:#fff;font-size:24px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(37,99,235,.35);transition:all .2s;}
.fab:hover{background:#1d4ed8;transform:scale(1.06);}
.fab:active{transform:scale(.94);}
.fab-import{right:76px;background:#0f172a;font-size:18px;width:44px;height:44px;bottom:29px;box-shadow:0 4px 12px rgba(0,0,0,.2);}

/* ── EMPTY ── */
.empty{text-align:center;padding:48px 20px;}
.empty-icon{font-size:40px;margin-bottom:10px;}
.empty-title{font-size:15px;font-weight:600;color:#64748b;}

/* ── NEXT PREVIEW ── */
.next-preview{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-family:'JetBrains Mono',monospace;color:#1d4ed8;background:#eff6ff;border-radius:6px;padding:5px 10px;margin-top:8px;}

/* ── PENDING FORM ── */
.pending-form{background:#fffbeb;border:1.5px solid #fed7aa;border-radius:10px;padding:12px;margin-top:8px;display:none;}

/* RESPONSIVE DESKTOP */
@media(min-width:640px){
  .header-inner{padding:0 24px;}
  .search-bar{padding:14px 24px 8px;}
  .main{padding:10px 24px 100px;}
  .sync-time{display:block;}
  .form-grid{grid-template-columns:1fr 1fr;}
  .det-grid{grid-template-columns:1fr 1fr;}
}
@media(min-width:900px){
  html{font-size:15px;}
  .form-grid{grid-template-columns:1fr 1fr 1fr;}
}
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast">
  <span id="toastMsg" style="flex:1"></span>
  <button class="toast-undo" id="toastUndo" onclick="undoAction()" style="display:none">Undo</button>
</div>

<!-- FABs -->
<button class="fab fab-import" onclick="openImportModal()" title="Import CSV / PDF">&#8679;</button>
<button class="fab" onclick="openModal(null)" title="Add patient">+</button>

<!-- MODAL (add/edit) -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-sheet" id="modalContent"></div>
</div>

<!-- IMPORT MODAL -->
<div class="modal-overlay" id="importOverlay" onclick="if(event.target===this)closeImport()">
  <div class="modal-sheet" id="importContent"></div>
</div>

<div class="app-shell">

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        </div>
        <span class="logo-text">Visit<span>.</span>Manager</span>
      </div>
      <div class="header-actions">
        <span class="sync-time" id="syncTime"></span>
        <button class="btn btn-outline btn-sm" onclick="syncWithSheet()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          Sync
        </button>
      </div>
    </div>
  </header>

  <!-- TABS -->
  <div class="tabs-bar">
    <div class="tabs-inner" id="tabsInner"></div>
  </div>

  <!-- SEARCH -->
  <div class="search-bar">
    <div class="search-box">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="searchInp" class="search-inp" type="search" placeholder="Search name, file #, phone..." oninput="onSearch()">
      <button class="search-clear" id="searchClear" onclick="clearSearch()">&#x2715;</button>
      <button class="search-btn" onclick="onSearch()">Search</button>
    </div>
  </div>

  <!-- PANELS -->
  <main class="main">
    <div id="panelSetup"     class="tab-panel"></div>
    <div id="panelToday"     class="tab-panel"></div>
    <div id="panelScheduled" class="tab-panel"></div>
    <div id="panelOverdue"   class="tab-panel"></div>
    <div id="panelQueue"     class="tab-panel"></div>
    <div id="panelPending"   class="tab-panel"></div>
    <div id="panelArchived"  class="tab-panel"></div>
  </main>
</div>

<script>
// ES5 - No template literals, no arrow functions - Apps Script compatible
var DOSE_WEEKS = {7.5:4, 22.5:12, 30:16, 45:24};
var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var SITES = ['Left Side','Right Side','Left Glute','Right Glute'];
var ASSIGN_TYPES = ['Permanent','1 Dose Only'];
var FILE_STATUSES = ['Active','Pending','Archived'];
var ANTHROPIC_KEY_STORE = 'vm_anthropic_key';

var patients = [];
var IS_GAS = window.location.href.indexOf('script.google.com/macros') >= 0;
var scriptUrl = IS_GAS ? window.location.href.split('?')[0] : (localStorage.getItem('vm_script_url') || '');
var activeTab = scriptUrl ? 'today' : 'setup';
var lastSnapshot = null;
var toastTimer = null;
var searchQ = '';

// ?? DATE UTILS ??
function todayDate() { var n=new Date(); return new Date(n.getFullYear(),n.getMonth(),n.getDate()); }
function fmtDate(d) {
  if (!d) return '';
  if (typeof d==='string') d=new Date(d);
  if (isNaN(d.getTime())) return '';
  return d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear();
}
function fmtDateTime(s) {
  if (!s) return '';
  var d=new Date(s); if (isNaN(d.getTime())) return s;
  var hh=(d.getHours()<10?'0':'')+d.getHours();
  var mm=(d.getMinutes()<10?'0':'')+d.getMinutes();
  return fmtDate(d)+' '+hh+':'+mm;
}
function parseDate(s) { if (!s) return null; var d=new Date(s); return isNaN(d.getTime())?null:d; }
function addWeeks(d,w) { var r=new Date(d); r.setDate(r.getDate()+w*7); return r; }
function isToday(d) { if(!d)return false; var t=todayDate(); return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate(); }
function getMgVal(dose) { var m=String(dose||'').match(/(\d+(?:\.\d+)?)\s*mg/i); return m?parseFloat(m[1]):0; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function normalize(p) {
  return {
    fileNumber:String(p.fileNumber||p['File number']||''),

    address:p.address||p['Address']||'',

    previousInjectionSite:p.previousInjectionSite||'',
    injectionSite:p.injectionSite||'',
    dueDate:p.dueDate||p['Due date']||'',
    appointmentDateTime:p.appointmentDateTime||p['Appointment date and time']||'',
    previousInjectionDates:p.previousInjectionDates||'',
    assignmentType:p.assignmentType||p['Assignment type']||'Permanent',

// ?? SHEETS SYNC ??
function gsCall(payload, cb) {
  if (!scriptUrl){if(cb)cb(null,'No URL');return;}
  var xhr=new XMLHttpRequest();
  xhr.open('GET',scriptUrl+'?payload='+encodeURIComponent(JSON.stringify(payload))+'&t='+Date.now(),true);
  xhr.onload=function(){
    if(xhr.status===200){try{if(cb)cb(JSON.parse(xhr.responseText),null);}catch(e){if(cb)cb(null,'Parse err');}}
    else{if(cb)cb(null,'HTTP '+xhr.status);}
  };
  xhr.onerror=function(){if(cb)cb(null,'Network error');};
  xhr.send();
}
function pushPatient(p){if(scriptUrl)gsCall({action:'upsert',patient:p},null);}
function deleteFromSheet(fn){if(scriptUrl)gsCall({action:'delete',fileNumber:fn},null);}

function syncWithSheet() {
  if(!scriptUrl){showToast('No Script URL - go to Setup');return;}
  setSyncTime('Syncing...');
  var list=patients.slice(),idx=0;
  function next(){if(idx>=list.length){loadFromSheet();return;}gsCall({action:'upsert',patient:list[idx]},function(){idx++;next();});}
  next();
}
function loadFromSheet() {
  gsCall({action:'getAll'},function(data,err){
    if(err){setSyncTime('Failed');showToast('Sync failed: '+err);return;}
    if(data&&data.error){setSyncTime('Error');showToast('Error: '+data.error);return;}
    if(Array.isArray(data)){
      patients=data.map(normalize);
      saveLocal();
      var now=new Date();
      setSyncTime((now.getHours()<10?'0':'')+now.getHours()+':'+(now.getMinutes()<10?'0':'')+now.getMinutes());
      renderAll();
      showToast('Synced '+patients.length+' patients');
    }
  });
}
function setSyncTime(t){var el=document.getElementById('syncTime');if(el)el.textContent=t;}

// ?? TAB LOGIC ??
function getTab(p) {
  if(p.fileStatus==='Archived')return 'archived';
  if(p.fileStatus==='Pending')return 'pending';
  var t=todayDate();
  var appt=p.appointmentDateTime?parseDate(p.appointmentDateTime):null;
  var due=p.dueDate?parseDate(p.dueDate):null;
  if(appt&&appt<t)return 'overdue';
  if(due&&due<t&&!appt)return 'overdue';
  if(appt&&isToday(appt))return 'today';
  if(appt&&appt>t)return 'scheduled';
  if(due&&due>=t)return 'queue';
  return 'scheduled';
}
function sortFor(list,tabId) {
  return list.slice().sort(function(a,b){
    var ad,bd;
    if(tabId==='today'||tabId==='scheduled'){
      ad=parseDate(a.appointmentDateTime)||new Date(9e15);
      bd=parseDate(b.appointmentDateTime)||new Date(9e15);
      if(ad-bd!==0)return ad-bd;
      return a.patientName.localeCompare(b.patientName);
    }
    if(tabId==='overdue'){
      ad=parseDate(a.appointmentDateTime)||parseDate(a.dueDate)||new Date(0);
      bd=parseDate(b.appointmentDateTime)||parseDate(b.dueDate)||new Date(0);
      return ad-bd;
    }
    if(tabId==='queue'||tabId==='pending'){
      ad=parseDate(a.dueDate)||new Date(9e15);
      bd=parseDate(b.dueDate)||new Date(9e15);
      return ad-bd;
    }
    if(tabId==='archived'){
      ad=parseDate(a.archivedDate)||new Date(0);
      bd=parseDate(b.archivedDate)||new Date(0);
      return bd-ad;
    }
    return a.patientName.localeCompare(b.patientName);
  });
}

// ?? SEARCH ??
function onSearch() {
  searchQ=document.getElementById('searchInp')?document.getElementById('searchInp').value.trim():'';
  var clr=document.getElementById('searchClear');
  if(clr)clr.style.display=searchQ?'block':'none';
  renderAll();
}
function clearSearch() {
  searchQ='';
  var inp=document.getElementById('searchInp');if(inp)inp.value='';
  var clr=document.getElementById('searchClear');if(clr)clr.style.display='none';
  renderAll();
}
function getFiltered() {
  if(!searchQ)return patients;
  var q=searchQ.toLowerCase();
  return patients.filter(function(p){
    return p.patientName.toLowerCase().indexOf(q)>=0||
           p.fileNumber.indexOf(q)>=0||
           p.phone1.indexOf(q)>=0||
           p.phone2.indexOf(q)>=0||
           p.address.toLowerCase().indexOf(q)>=0;
  });
}

// ?? RENDER ??
function renderAll() {
  var filtered=getFiltered();
  var tabs={today:[],scheduled:[],overdue:[],queue:[],pending:[],archived:[]};
  for(var i=0;i<filtered.length;i++){var t=getTab(filtered[i]);if(tabs[t])tabs[t].push(filtered[i]);}

  var TABS=[
    {id:'today',     label:'Today',       dot:'#3b82f6'},
    {id:'scheduled', label:'Scheduled',   dot:'#14b8a6'},
    {id:'overdue',   label:'Overdue',     dot:'#ef4444'},
    {id:'queue',     label:'All Patients',dot:'#8b5cf6'},
    {id:'pending',   label:'Pending',     dot:'#f59e0b'},
    {id:'archived',  label:'Archived',    dot:'#94a3b8'}
  ];

  var nav='';
  for(var ti=0;ti<TABS.length;ti++){
    var tc=TABS[ti],isA=activeTab===tc.id;
    nav+='<button class="tab'+(isA?' active':'')+'" onclick="switchTab(\''+tc.id+'\')">'+
         '<span style="width:6px;height:6px;border-radius:50%;background:'+tc.dot+';display:inline-block"></span>'+
         tc.label+
         '<span class="tab-badge">'+tabs[tc.id].length+'</span></button>';
  }
  document.getElementById('tabsInner').innerHTML=nav;

  for(var ti2=0;ti2<TABS.length;ti2++){renderPanel(TABS[ti2].id,sortFor(tabs[TABS[ti2].id],TABS[ti2].id));}
  if(activeTab==='setup')renderSetup();

  var pmap={setup:'panelSetup',today:'panelToday',scheduled:'panelScheduled',overdue:'panelOverdue',queue:'panelQueue',pending:'panelPending',archived:'panelArchived'};
  var ks=Object.keys(pmap);
  for(var ki=0;ki<ks.length;ki++){
    var el=document.getElementById(pmap[ks[ki]]);
    if(el){el.style.display=activeTab===ks[ki]?'block':'none';}
  }
}

function renderPanel(tabId,list) {
  var panelId='panel'+tabId.charAt(0).toUpperCase()+tabId.slice(1);
  var panel=document.getElementById(panelId);if(!panel)return;
  if(!list.length){
    var ei={today:'&#x1F4C5;',scheduled:'&#x1F5D3;',overdue:'&#x26A0;',queue:'&#x1F465;',pending:'&#x23F8;',archived:'&#x1F5C4;'};
    var em={today:'No visits today',scheduled:'No scheduled appointments',overdue:'No overdue patients',queue:'No patients found',pending:'No pending patients',archived:'No archived records'};
    panel.innerHTML='<div class="empty"><div class="empty-icon">'+(ei[tabId]||'&#x1F4CB;')+'</div><div class="empty-title">'+(em[tabId]||'Nothing here')+'</div></div>';
    return;
  }
  var html='';
  // 1-dose banners
  if(tabId==='today'){
    for(var bi=0;bi<list.length;bi++){
      if(list[bi].assignmentType==='1 Dose Only'){
        html+='<div style="display:flex;align-items:flex-start;gap:8px;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:12px;color:#92400e;font-weight:500;">'+
              '<span style="font-size:14px">&#9888;</span><span><strong>'+esc(list[bi].patientName)+'</strong> - 1 Dose Only. Confirm continuation after visit.</span></div>';
      }
    }
  }
  // Date grouping for All Patients
  if(tabId==='queue'){
    var lastDate='';
    for(var ci=0;ci<list.length;ci++){
      var dStr=fmtDate(parseDate(list[ci].dueDate))||'No Due Date';
      if(dStr!==lastDate){
        html+='<div class="date-grp"><div class="date-grp-line"></div><span class="date-grp-lbl">'+dStr+'</span><div class="date-grp-line"></div></div>';
        lastDate=dStr;
      }
      html+=renderCard(list[ci],tabId);
    }
  } else {
    for(var ci2=0;ci2<list.length;ci2++)html+=renderCard(list[ci2],tabId);
  }
  panel.innerHTML=html;
}

// ?? TOGGLE ??
function toggleCard(fn) {
  var card=document.getElementById('pcard-'+fn);
  var exp=document.getElementById('exp-'+fn);
  if(!card||!exp)return;
  var isOpen=card.classList.contains('open');
  if(isOpen){card.classList.remove('open');exp.style.display='none';}
  else{card.classList.add('open');exp.style.display='block';}
}

// ?? PATIENT ACTIONS ??
function checkDone(inp,fn){
  var v=inp.value.trim().toUpperCase()==='DONE';
  if(v)inp.classList.add('valid');else inp.classList.remove('valid');
  var btn=document.getElementById('cs-'+fn);
  if(btn){if(v)btn.classList.add('ready');else btn.classList.remove('ready');}
}
function findP(fn){for(var i=0;i<patients.length;i++){if(patients[i].fileNumber===fn)return patients[i];}return null;}

function confirmInj(fn){
  var p=findP(fn);if(!p)return;
  lastSnapshot=JSON.parse(JSON.stringify(p));
  var weeks=DOSE_WEEKS[getMgVal(p.dose)],now=new Date();
  var prev=(p.previousInjectionDates?p.previousInjectionDates.split(',').map(function(s){return s.trim();}).filter(Boolean):[]);
  prev.push(fmtDate(now));p.previousInjectionDates=prev.join(', ');
  p.previousInjectionSite=p.injectionSite||'';p.injectionSite='';
  var rl=parseInt(p.repeatsLeft)||0;if(rl>0)p.repeatsLeft=String(rl-1);
  if(weeks)p.dueDate=addWeeks(now,weeks).toISOString().slice(0,10);
  p.appointmentDateTime='';p.lastUpdated=now.toISOString();
  saveLocal();pushPatient(p);renderAll();showToast(p.patientName+' - injection confirmed',true);
  if(p.assignmentType==='1 Dose Only')setTimeout(function(){showToast('Reminder: '+p.patientName+' is 1 Dose Only');},3000);
}
function setSite(fn,site){var p=findP(fn);if(!p)return;p.injectionSite=site;saveLocal();pushPatient(p);renderAll();}
function saveAppt(fn){
  var inp=document.getElementById('appt-'+fn);if(!inp||!inp.value){showToast('Select a date and time first');return;}
  var p=findP(fn);if(!p)return;p.appointmentDateTime=inp.value;saveLocal();pushPatient(p);renderAll();showToast('Appointment confirmed: '+fmtDateTime(inp.value));
}
function clearAppt(fn){var p=findP(fn);if(!p)return;p.appointmentDateTime='';saveLocal();pushPatient(p);renderAll();showToast('Appointment cleared');}
function saveDue(fn){
  var inp=document.getElementById('due-'+fn);if(!inp||!inp.value){showToast('Select a due date first');return;}
  var p=findP(fn);if(!p)return;p.dueDate=inp.value;saveLocal();pushPatient(p);renderAll();showToast('Due date saved: '+fmtDate(parseDate(inp.value)));
}
function saveComments(fn){var p=findP(fn);if(!p)return;var ta=document.getElementById('com-'+fn);if(ta)p.comments=ta.value.trim();saveLocal();pushPatient(p);showToast('Comments saved');}
function showPendingForm(fn){var f=document.getElementById('pf-'+fn);if(f)f.style.display=f.style.display==='block'?'none':'block';}
function markPending(fn){
  var p=findP(fn);if(!p)return;
  var inp=document.getElementById('pr-'+fn);p.pendingReason=inp?inp.value.trim():'No reason given';
  p.fileStatus='Pending';p.appointmentDateTime='';saveLocal();pushPatient(p);renderAll();switchTab('pending');showToast(p.patientName+' moved to Pending');
}
function reactivate(fn){var p=findP(fn);if(!p)return;p.fileStatus='Active';p.pendingReason='';p.archivedDate='';saveLocal();pushPatient(p);renderAll();showToast(p.patientName+' reactivated');}
function archivePatient(fn){
  var p=findP(fn);if(!p)return;lastSnapshot=JSON.parse(JSON.stringify(p));
  p.fileStatus='Archived';p.archivedDate=new Date().toISOString().slice(0,10);saveLocal();pushPatient(p);renderAll();showToast(p.patientName+' archived',true);
}
function deletePatient(fn){
  if(!confirm('Permanently delete this patient?'))return;
  var idx=-1;for(var i=0;i<patients.length;i++){if(patients[i].fileNumber===fn){idx=i;break;}}
  if(idx<0)return;lastSnapshot=JSON.parse(JSON.stringify(patients[idx]));patients.splice(idx,1);saveLocal();deleteFromSheet(fn);renderAll();showToast('Patient deleted',true);
}
function undoAction(){
  if(!lastSnapshot)return;
  var found=false;for(var i=0;i<patients.length;i++){if(patients[i].fileNumber===lastSnapshot.fileNumber){patients[i]=lastSnapshot;found=true;break;}}
  if(!found)patients.push(lastSnapshot);lastSnapshot=null;saveLocal();renderAll();hideToast();
}

  html+='</div>';
  html+='<div class="btn-row" style="margin-top:18px"><button onclick="closeModal()" class="btn btn-outline">Cancel</button><button onclick="savePatient()" class="btn btn-primary" style="flex:1">Save Patient</button></div>';

function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
function getV(id){var el=document.getElementById(id);return el?el.value.trim():'';}
function savePatient(){
  var fn=getV('f-fn');if(!fn){alert('File number is required.');return;}
  if(!getV('f-name')){alert('Patient name is required.');return;}
  var p=normalize({fileNumber:fn,patientName:getV('f-name'),address:getV('f-addr'),phone1:getV('f-ph1'),phone2:getV('f-ph2'),dose:getV('f-dose'),totalDoses:getV('f-td'),repeatsLeft:getV('f-rl'),assignmentType:getV('f-atype'),fileStatus:getV('f-status'),appointmentDateTime:getV('f-appt'),dueDate:getV('f-due'),specialInstructions:getV('f-spec'),adverseEffects:getV('f-adv'),comments:getV('f-com'),lastUpdated:new Date().toISOString()});
  var found=false;
  for(var i=0;i<patients.length;i++){
    if(patients[i].fileNumber===fn){
      p.previousInjectionSite=patients[i].previousInjectionSite||'';
      p.previousInjectionDates=patients[i].previousInjectionDates||'';
      p.pendingReason=patients[i].pendingReason||'';
      p.archivedDate=patients[i].archivedDate||'';
      p.injectionSite=patients[i].injectionSite||'';
      patients[i]=p;found=true;break;
    }
  }
  if(!found)patients.push(p);
  saveLocal();pushPatient(p);closeModal();renderAll();showToast(p.patientName+' saved');
}

// CSV PARSING
function handleCsvDrop(e){e.preventDefault();document.getElementById('csvDrop').classList.remove('drag-over');var f=e.dataTransfer.files[0];if(f)parseCsvFile(f);}
function handleCsvFile(inp){if(inp.files[0])parseCsvFile(inp.files[0]);}

function parseCsvFile(file){
  var prog=document.getElementById('csvProgress');
  var res=document.getElementById('csvResult');
  prog.style.display='block';prog.textContent='Reading CSV...';
  res.style.display='none';
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var rows=parseCsv(e.target.result);
      if(rows.length<2){prog.textContent='CSV has no data rows.';return;}
      var headers=rows[0];
      var imported=0,skipped=0;
      for(var i=1;i<rows.length;i++){
        var row=rows[i];if(!row||row.length===0)continue;
        var obj={};
        for(var j=0;j<headers.length;j++) obj[headers[j]]=row[j]||'';
        var p=normalize(obj);
        if(!p.fileNumber&&!p.patientName){skipped++;continue;}
        if(!p.fileNumber)p.fileNumber='CSV-'+Date.now()+'-'+i;
        var found=false;
        for(var k=0;k<patients.length;k++){if(patients[k].fileNumber===p.fileNumber){patients[k]=p;found=true;break;}}
        if(!found)patients.push(p);
        imported++;
      }
      saveLocal();renderAll();
      prog.style.display='none';
      res.style.display='block';
      res.textContent='Imported '+imported+' patients.'+(skipped?' Skipped '+skipped+' empty rows.':'');
    }catch(err){prog.textContent='Error parsing CSV: '+err.message;}
  };
  reader.readAsText(file);
}

function parseCsv(text){
  var rows=[],cur=[],field='',inQ=false;
  for(var i=0;i<text.length;i++){
    var c=text[i];
    if(inQ){if(c==='"'&&text[i+1]==='"'){field+='"';i++;}else if(c==='"'){inQ=false;}else{field+=c;}}
    else if(c==='"'){inQ=true;}
    else if(c===','){cur.push(field.trim());field='';}
    else if(c==='\n'||c==='\r'){if(field!==''||cur.length>0){cur.push(field.trim());if(cur.some(function(v){return v!=='';}))rows.push(cur);}cur=[];field='';}
    else{field+=c;}
  }
  if(field!==''||cur.length>0){cur.push(field.trim());if(cur.some(function(v){return v!=='';}))rows.push(cur);}
  return rows;
}

// PDF AI EXTRACTION
function handlePdfDrop(e){e.preventDefault();document.getElementById('pdfDrop').classList.remove('drag-over');var f=e.dataTransfer.files[0];if(f)extractPdfWithAi(f);}
function handlePdfFile(inp){if(inp.files[0])extractPdfWithAi(inp.files[0]);}

function extractPdfWithAi(file){
  var apiKey=localStorage.getItem(ANTHROPIC_KEY_STORE)||getV('imp-apikey');
  if(!apiKey){showToast('Enter your Anthropic API key first');return;}
  var prog=document.getElementById('pdfProgress');
  var res=document.getElementById('pdfResult');
  prog.style.display='block';prog.textContent='Reading PDF...';
  res.style.display='none';

  var reader=new FileReader();
  reader.onload=function(e){
    var base64=e.target.result.split(',')[1];
    prog.textContent='Sending to AI for extraction...';

    var prompt='Extract all patient records from this medical document. Return ONLY a JSON array of patient objects. Each object should have these fields (use empty string if not found): fileNumber, patientName, address, phone1, phone2, dose, totalDoses, repeatsLeft, injectionSite, dueDate (YYYY-MM-DD format), appointmentDateTime (YYYY-MM-DDThh:mm format), assignmentType (Permanent or 1 Dose Only), specialInstructions, adverseEffects, comments. Return only the JSON array, no other text.';

    var payload=JSON.stringify({
      model:'claude-opus-4-5',
      max_tokens:4000,
      messages:[{role:'user',content:[
        {type:'document',source:{type:'base64',media_type:'application/pdf',data:base64}},
        {type:'text',text:prompt}
      ]}]
    });

    var xhr=new XMLHttpRequest();
    xhr.open('POST','https://api.anthropic.com/v1/messages',true);
    xhr.setRequestHeader('Content-Type','application/json');
    xhr.setRequestHeader('x-api-key',apiKey);
    xhr.setRequestHeader('anthropic-version','2023-06-01');
    xhr.setRequestHeader('anthropic-dangerous-direct-browser-access','true');
    xhr.onload=function(){
      try{
        var data=JSON.parse(xhr.responseText);
        if(data.error){prog.textContent='AI error: '+data.error.message;return;}
        var text=data.content&&data.content[0]?data.content[0].text:'';
        var jsonMatch=text.match(/\[[\s\S]*\]/);
        if(!jsonMatch){prog.textContent='Could not parse AI response. Try a clearer PDF.';return;}
        var extracted=JSON.parse(jsonMatch[0]);
        var imported=0;
        for(var i=0;i<extracted.length;i++){
          var p=normalize(extracted[i]);
          if(!p.patientName&&!p.fileNumber)continue;
          if(!p.fileNumber)p.fileNumber='PDF-'+Date.now()+'-'+i;
          var found=false;
          for(var k=0;k<patients.length;k++){if(patients[k].fileNumber===p.fileNumber){patients[k]=p;found=true;break;}}
          if(!found)patients.push(p);
          imported++;
        }
        saveLocal();renderAll();
        prog.style.display='none';
        res.style.display='block';
        res.textContent='AI extracted '+imported+' patients from PDF.';
      }catch(err){prog.textContent='Error processing AI response: '+err.message;}
    };
    xhr.onerror=function(){prog.textContent='Network error calling AI. Check API key and connection.';};
    xhr.send(payload);
  };
  reader.readAsDataURL(file);
}

function saveUrl(){
  var url=document.getElementById('setupUrl')?document.getElementById('setupUrl').value.trim():'';
  if(!url){alert('Enter the URL first');return;}
  if(url.indexOf('script.google.com')<0){alert('Not a valid Apps Script URL');return;}
  scriptUrl=url;localStorage.setItem('vm_script_url',url);activeTab='today';loadFromSheet();renderAll();
}
function testConn(){
  var url=document.getElementById('setupUrl')?document.getElementById('setupUrl').value.trim():'';
  var res=document.getElementById('testResult');if(!res)return;
  res.style.display='block';res.textContent='Testing...';
  if(!url||!url.endsWith('/exec')){res.textContent='URL must end in /exec';return;}
  var prev=scriptUrl;scriptUrl=url;
  var xhr=new XMLHttpRequest();
  xhr.open('GET',url+'?action=getAll&t='+Date.now(),true);
  xhr.onload=function(){
    try{var d=JSON.parse(xhr.responseText);if(d.error){res.textContent='Error: '+d.error;scriptUrl=prev;return;}if(Array.isArray(d)){res.textContent='Connected! '+d.length+' patients found.';}else{res.textContent='Unexpected response.';scriptUrl=prev;}}
    catch(e){res.textContent='Parse error.';scriptUrl=prev;}
  };
  xhr.onerror=function(){res.textContent='Network error.';scriptUrl=prev;};
  xhr.send();
}

// ?? TOAST ??
function showToast(msg,withUndo){
  clearTimeout(toastTimer);
  var t=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  var u=document.getElementById('toastUndo');
  if(u){u.style.display=withUndo?'':'none';}
  t.classList.add('show');
  toastTimer=setTimeout(hideToast,5000);
}
function hideToast(){var t=document.getElementById('toast');t.classList.remove('show');}

// VIEWPORT FIX for Apps Script iframe
function fixViewport(){
  var sw=window.screen.width||window.innerWidth;
  if(IS_GAS&&sw<900){
    var m=document.querySelector('meta[name=viewport]');
    if(m)m.setAttribute('content','width=device-width,initial-scale=1.0,maximum-scale=5.0,minimum-scale=1.0');
    // Force readable font size
    var fs=sw<=390?'17px':sw<=430?'18px':sw<=768?'17px':'16px';
    document.documentElement.style.fontSize=fs;
  } else if(!IS_GAS&&sw>=900){
    document.documentElement.style.fontSize='15px';
  }
}
fixViewport();
window.addEventListener('resize',fixViewport);

  loadLocal();
  if(scriptUrl){activeTab='today';loadFromSheet();}
  else{activeTab='setup';}
  renderAll();
}

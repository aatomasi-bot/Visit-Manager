<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Patient Dosing Tracker - Correct Dose Logic</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #f0f2f5; padding: 12px; padding-bottom: 80px; }
        .app-container { max-width: 700px; margin: 0 auto; }
        
        .header { background: white; padding: 16px; border-radius: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 10; }
        .header h1 { font-size: 20px; color: #1a1a2e; margin-bottom: 12px; }
        .sync-status { font-size: 12px; margin-top: 8px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .top-bar { display: flex; gap: 8px; flex-wrap: wrap; justify-content: space-between; }
        .search-box { flex: 1; display: flex; gap: 8px; }
        .search-box input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 25px; font-size: 15px; background: #f9f9f9; }
        .search-box button { padding: 10px 14px; border: none; border-radius: 25px; font-size: 14px; font-weight: 500; cursor: pointer; background: #007aff; color: white; }
        .header-actions { display: flex; gap: 8px; }
        .btn-secondary { padding: 10px 14px; border: none; border-radius: 25px; font-size: 14px; font-weight: 500; cursor: pointer; background: #e9ecef; color: #333; }
        .btn-primary { background: #007aff; color: white; border: none; padding: 10px 16px; border-radius: 25px; font-weight: 500; cursor: pointer; }
        .btn-danger { background: #ff3b30; color: white; border: none; padding: 10px 16px; border-radius: 25px; font-weight: 500; cursor: pointer; }
        .add-btn { width: 100%; margin-bottom: 16px; padding: 14px; font-size: 16px; border-radius: 30px; background: #007aff; color: white; border: none; font-weight: 600; cursor: pointer; }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
        .tab-btn { padding: 10px 18px; background: white; border: 1px solid #ddd; border-radius: 30px; cursor: pointer; font-size: 13px; font-weight: 500; flex-shrink: 0; }
        .tab-btn.active { background: #007aff; color: white; border-color: #007aff; }
        
        .patient-list { display: flex; flex-direction: column; gap: 12px; }
        .patient-card { background: white; border-radius: 20px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; }
        .patient-card.expanded { background: #f8f9ff; border-left: 4px solid #007aff; }
        
        .collapsed-view { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .patient-info { flex: 2; }
        .patient-name { font-size: 17px; font-weight: 600; color: #1a1a2e; }
        .patient-file { font-size: 13px; color: #666; margin-left: 8px; }
        .patient-address { font-size: 13px; color: #666; margin-top: 4px; }
        .due-date { font-size: 12px; color: #007aff; font-weight: 500; margin-top: 4px; }
        .appt-badge { font-size: 11px; background: #5856d6; color: white; padding: 2px 8px; border-radius: 20px; display: inline-block; margin-top: 4px; }
        .special-badge { display: inline-block; background: #ff3b30; color: white; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-left: 8px; }
        .dose-badge { display: inline-block; background: #5856d6; color: white; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-left: 8px; }
        .confirm-needed { background: #ff9500; color: white; font-size: 10px; padding: 2px 6px; border-radius: 12px; margin-left: 8px; }
        
        .action-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
        .action-icon { width: 40px; height: 40px; border-radius: 30px; border: none; font-size: 18px; cursor: pointer; }
        .call-icon { background: #34c759; color: white; }
        .map-icon { background: #5856d6; color: white; }
        
        .expanded-view { margin-top: 16px; padding-top: 16px; border-top: 1px solid #eee; display: none; }
        .detail-row { display: flex; padding: 8px 0; border-bottom: 1px solid #f0f0f0; flex-wrap: wrap; }
        .detail-label { width: 140px; font-weight: 600; color: #555; font-size: 13px; }
        .detail-value { flex: 1; color: #333; font-size: 13px; }
        .ins-red { color: #ff3b30; font-weight: 500; }
        
        .action-row { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; justify-content: center; }
        .action-sm { padding: 8px 12px; font-size: 13px; border-radius: 25px; border: none; font-weight: 500; cursor: pointer; }
        .inject-sm { background: #34c759; color: white; }
        .pending-sm { background: #ff9500; color: white; }
        .edit-sm { background: #007aff; color: white; }
        .delete-sm { background: #ff3b30; color: white; }
        .confirm-sm { background: #5e5ce0; color: white; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; overflow-y: auto; }
        .modal-content { background: white; max-width: 550px; margin: 40px auto; border-radius: 28px; padding: 24px; }
        .confirm-modal { max-width: 350px; text-align: center; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close { font-size: 28px; cursor: pointer; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group.full-width { grid-column: span 2; }
        .form-group label { font-weight: 500; font-size: 13px; }
        .form-group input, .form-group select, .form-group textarea { padding: 10px 12px; border: 1px solid #ddd; border-radius: 14px; font-size: 14px; font-family: inherit; }
        
        .modal-footer { margin-top: 20px; display: flex; justify-content: space-between; gap: 12px; }
        .empty-state { text-align: center; padding: 50px 20px; color: #999; }
        .loading { text-align: center; padding: 40px; color: #007aff; }
        
        @media (max-width: 600px) {
            .collapsed-view { flex-direction: column; align-items: stretch; }
            .action-buttons { justify-content: center; }
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full-width { grid-column: span 1; }
            .detail-label { width: 120px; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>💉 Patient Dosing Tracker</h1>
            <div class="top-bar">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 Search name or file...">
                    <button id="clearSearchBtn">Clear</button>
                </div>
                <div class="header-actions">
                    <button id="refreshBtn" class="btn-secondary">🔄 Load from Sheet</button>
                    <button id="exportBtn" class="btn-secondary">📥 Backup</button>
                    <button id="importBtn" class="btn-secondary">📤 Restore</button>
                    <input type="file" id="importFile" accept=".json" style="display:none">
                </div>
            </div>
            <div class="sync-status">
                <span id="syncStatus">⚡ Ready to load</span>
                <span id="recordCount"></span>
            </div>
        </div>

        <div class="tabs" id="tabsContainer">
            <button class="tab-btn active" data-tab="queue">👥 Queue</button>
            <button class="tab-btn" data-tab="today">📅 Today</button>
            <button class="tab-btn" data-tab="scheduled">📆 Scheduled</button>
            <button class="tab-btn" data-tab="overdue">⚠️ Overdue</button>
            <button class="tab-btn" data-tab="pending">⏳ Pending</button>
            <button class="tab-btn" data-tab="archived">📦 Archived</button>
        </div>

        <button id="addPatientBtn" class="add-btn">+ Add New Patient</button>

        <div id="patientList" class="patient-list">
            <div class="loading">Loading patients...</div>
        </div>
    </div>

    <!-- Patient Modal -->
    <div id="patientModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Patient</h2>
                <span class="close">&times;</span>
            </div>
            <form id="patientForm">
                <div class="form-grid">
                    <div class="form-group"><label>Patient Name *</label><input type="text" id="patientName" required></div>
                    <div class="form-group"><label>File Number *</label><input type="text" id="fileNumber" required></div>
                    <div class="form-group full-width"><label>Address</label><input type="text" id="address"></div>
                    <div class="form-group"><label>Phone 1</label><input type="tel" id="phone1"></div>
                    <div class="form-group"><label>Phone 2</label><input type="tel" id="phone2"></div>
                    <div class="form-group"><label>💊 Dose Prescribed</label>
                        <select id="dosePrescribed">
                            <option value="7.5">7.5 mg (4 weeks)</option>
                            <option value="22.5">22.5 mg (12 weeks)</option>
                            <option value="30">30 mg (16 weeks)</option>
                            <option value="45">45 mg (24 weeks)</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Total Doses</label>
                        <input type="number" id="totalDoses" value="4" min="1" onchange="updateDosesLeft()">
                    </div>
                    <div class="form-group"><label>Doses Left (Repeats)</label>
                        <input type="number" id="dosesLeft" value="3" min="0" readonly style="background:#f0f0f0;">
                        <small style="font-size:10px;color:#666;">Auto-calculated: Total Doses - 1</small>
                    </div>
                    <div class="form-group"><label>Previous Injection Site</label><input type="text" id="prevInjSite"></div>
                    <div class="form-group"><label>Injection Site</label><input type="text" id="injSite"></div>
                    <div class="form-group"><label>Due Date</label><input type="date" id="dueDate"></div>
                    <div class="form-group"><label>Appointment Date & Time</label><input type="datetime-local" id="appointmentDateTime"></div>
                    <div class="form-group full-width"><label>Previous Injection Dates</label><input type="text" id="prevInjDates"></div>
                    <div class="form-group"><label>Assignment Type</label>
                        <select id="assignmentType">
                            <option value="Permanent">Permanent</option>
                            <option value="x1 dose only">x1 dose only</option>
                        </select>
                    </div>
                    <div class="form-group full-width"><label>⚠️ Special Instructions</label><textarea id="specialInstructions" rows="2"></textarea></div>
                    <div class="form-group full-width"><label>Adverse Effects Comments</label><textarea id="adverseEffects" rows="2"></textarea></div>
                </div>
                <div class="modal-footer">
                    <button type="button" id="deletePatientBtn" class="btn-danger" style="display:none;">Delete</button>
                    <button type="submit" class="btn-primary">Save Patient</button>
                </div>
            </form>
        </div>
    </div>

    <div id="confirmModal" class="modal">
        <div class="modal-content confirm-modal">
            <h3>Confirm Action</h3>
            <p id="confirmMessage"></p>
            <div style="display: flex; gap: 12px; justify-content: center; margin-top: 20px;">
                <button id="confirmYes" class="btn-primary">Yes</button>
                <button id="confirmNo" class="btn-secondary">No</button>
            </div>
        </div>
    </div>

    <script>
        // Function to auto-calculate doses left based on total doses
        function updateDosesLeft() {
            const totalDoses = parseInt(document.getElementById('totalDoses').value) || 4;
            // Doses Left = Total Doses - 1 (first dose is the initial, repeats are extra)
            const dosesLeft = totalDoses - 1;
            document.getElementById('dosesLeft').value = dosesLeft;
        }
        
        // Call on page load for any existing value
        document.addEventListener('DOMContentLoaded', function() {
            const totalDosesInput = document.getElementById('totalDoses');
            if (totalDosesInput) {
                totalDosesInput.addEventListener('change', updateDosesLeft);
                updateDosesLeft();
            }
        });

        // ========== CONFIGURATION ==========
        const GOOGLE_SHEETS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSYgD018ww2Mbkud6ZYmZHop7EXxcm_0Zl4V9bB2AaY4r4xXTWChAW6v-gUyjD4-2Qmg4H8O0kxryCf/pub?output=csv";
        
        // ========== DATA ==========
        let patients = [];
        let currentEditFileNumber = null;
        let pendingConfirmCallback = null;
        let currentTab = 'queue';
        let searchQuery = '';

        const doseToWeeks = { '7.5': 4, '22.5': 12, '30': 16, '45': 24 };

        // ========== PRIORITY SORT FUNCTION ==========
        function prioritySort(patientsList, tabName) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            return patientsList.sort((a, b) => {
                if (tabName === 'today' || tabName === 'scheduled') {
                    const aHasConfirmedAppt = a['Appointment Date & Time'] && a['Appointment Confirmed'] === true;
                    const bHasConfirmedAppt = b['Appointment Date & Time'] && b['Appointment Confirmed'] === true;
                    
                    if (aHasConfirmedAppt && !bHasConfirmedAppt) return -1;
                    if (!aHasConfirmedAppt && bHasConfirmedAppt) return 1;
                    
                    const aTime = a['Appointment Date & Time'] ? new Date(a['Appointment Date & Time']) : new Date(8640000000000000);
                    const bTime = b['Appointment Date & Time'] ? new Date(b['Appointment Date & Time']) : new Date(8640000000000000);
                    return aTime - bTime;
                }
                
                if (tabName === 'queue') {
                    const aHasConfirmed = a['Appointment Date & Time'] && a['Appointment Confirmed'] === true;
                    const bHasConfirmed = b['Appointment Date & Time'] && b['Appointment Confirmed'] === true;
                    
                    if (aHasConfirmed && !bHasConfirmed) return -1;
                    if (!aHasConfirmed && bHasConfirmed) return 1;
                    
                    const aDue = a['Due Date'] ? new Date(a['Due Date']) : new Date(8640000000000000);
                    const bDue = b['Due Date'] ? new Date(b['Due Date']) : new Date(8640000000000000);
                    return aDue - bDue;
                }
                
                const aDue = a['Due Date'] ? new Date(a['Due Date']) : new Date(8640000000000000);
                const bDue = b['Due Date'] ? new Date(b['Due Date']) : new Date(8640000000000000);
                return aDue - bDue;
            });
        }

        // ========== LOAD FROM GOOGLE SHEETS ==========
        async function loadFromGoogleSheets() {
            document.getElementById('syncStatus').innerHTML = '🔄 Loading from Google Sheets...';
            
            try {
                const response = await fetch(GOOGLE_SHEETS_CSV_URL);
                const csvText = await response.text();
                
                const rows = csvText.split('\n');
                const headers = rows[0].split(',').map(h => h.trim().replace(/"/g, ''));
                
                const loadedPatients = [];
                for (let i = 1; i < rows.length; i++) {
                    if (!rows[i].trim()) continue;
                    
                    let values = [];
                    let inQuote = false;
                    let currentValue = '';
                    const row = rows[i];
                    
                    for (let j = 0; j < row.length; j++) {
                        const char = row[j];
                        if (char === '"') {
                            inQuote = !inQuote;
                        } else if (char === ',' && !inQuote) {
                            values.push(currentValue.trim().replace(/^"|"$/g, ''));
                            currentValue = '';
                        } else {
                            currentValue += char;
                        }
                    }
                    values.push(currentValue.trim().replace(/^"|"$/g, ''));
                    
                    const patient = {};
                    headers.forEach((header, idx) => {
                        patient[header] = values[idx] || '';
                    });
                    
                    if (patient['Patient Name'] && patient['Patient Name'] !== 'Patient Name') {
                        patient['Injection Administered'] = patient['Injection Administered'] === 'TRUE' || patient['Injection Administered'] === true;
                        patient['Appointment Confirmed'] = patient['Appointment Confirmed'] === 'TRUE' || patient['Appointment Confirmed'] === true;
                        patient['Pending'] = patient['Pending'] === 'TRUE' || patient['Pending'] === true;
                        patient['Archived'] = patient['Archived'] === 'TRUE' || patient['Archived'] === true;
                        
                        // Ensure Doses Left is correctly set based on Total Doses
                        const totalDoses = parseInt(patient['Total Doses']) || 4;
                        if (!patient['Doses Repeats Left'] || patient['Doses Repeats Left'] === '') {
                            patient['Doses Repeats Left'] = (totalDoses - 1).toString();
                        }
                        
                        loadedPatients.push(patient);
                    }
                }
                
                if (loadedPatients.length > 0) {
                    patients = loadedPatients;
                    saveToLocalStorage();
                    renderCurrentTab();
                    document.getElementById('syncStatus').innerHTML = `✅ Loaded ${patients.length} patients from Google Sheets`;
                } else {
                    document.getElementById('syncStatus').innerHTML = '⚠️ No data found in sheet';
                }
                return true;
            } catch (error) {
                console.error('Load error:', error);
                document.getElementById('syncStatus').innerHTML = '❌ Failed to load';
                return false;
            }
        }

        // ========== LOCAL STORAGE ==========
        function saveToLocalStorage() {
            localStorage.setItem('patientTrackerData', JSON.stringify(patients));
            document.getElementById('recordCount').innerHTML = `📋 ${patients.length} total patients`;
        }

        function loadFromLocalStorage() {
            const saved = localStorage.getItem('patientTrackerData');
            if (saved && saved !== '[]') {
                patients = JSON.parse(saved);
            } else {
                patients = [];
            }
            document.getElementById('recordCount').innerHTML = `📋 ${patients.length} total patients`;
            renderCurrentTab();
        }

        // ========== CORRECTED DOSING LOGIC ==========
        // Formula: Doses Left (Repeats) = Total Doses - 1
        // Each injection: Doses Left decreases by 1
        // When Doses Left = 0 → All doses complete → Archive
        
        function calculateNextDueDate(currentDueDate, dosePrescribed) {
            const weeks = doseToWeeks[dosePrescribed] || 4;
            const newDate = new Date(currentDueDate);
            newDate.setDate(newDate.getDate() + (weeks * 7));
            return newDate.toISOString().split('T')[0];
        }

        function administerInjection(fileNumber) {
            const patient = patients.find(p => p['File Number'] === fileNumber);
            if (!patient) return;

            let currentRepeatsLeft = parseInt(patient['Doses Repeats Left']) || 0;
            const totalDoses = parseInt(patient['Total Doses']) || 4;
            
            // Calculate how many injections have been given
            const injectionsGiven = totalDoses - currentRepeatsLeft;
            
            if (currentRepeatsLeft <= 0) {
                alert('No doses remaining! This patient has completed all doses and will be archived.');
                patient['Archived'] = true;
                patient['File Status'] = 'Completed';
                saveToLocalStorage();
                renderCurrentTab();
                return;
            }

            // Single dose continuation check (for x1 dose only on first injection)
            if (patient['Assignment Type'] === 'x1 dose only' && injectionsGiven === 0) {
                if (confirm('This is a single-dose patient. After administration, ask: Do you want to continue treatment?')) {
                    patient['Assignment Type'] = 'Permanent';
                }
            }

            // Record previous injection date
            const today = new Date().toISOString().split('T')[0];
            const prevDates = patient['Previous Injection Dates'] ? patient['Previous Injection Dates'].split(',').map(d => d.trim()) : [];
            prevDates.push(today);
            patient['Previous Injection Dates'] = prevDates.join(', ');

            // Update injection site tracking
            if (patient['Injection Site']) {
                patient['Previous Injection Site'] = patient['Injection Site'];
            }

            // Decrease repeats left
            const newRepeatsLeft = currentRepeatsLeft - 1;
            patient['Doses Repeats Left'] = newRepeatsLeft.toString();

            // Calculate new due date if there are more repeats left
            if (newRepeatsLeft > 0) {
                const currentDueDate = patient['Due Date'] || new Date().toISOString().split('T')[0];
                patient['Due Date'] = calculateNextDueDate(currentDueDate, patient['Dose Prescribed']);
            }

            patient['Injection Administered'] = true;

            // Archive if no repeats left (all doses completed)
            if (newRepeatsLeft === 0) {
                patient['Archived'] = true;
                patient['File Status'] = 'Completed';
                alert(`${patient['Patient Name']} has completed all ${totalDoses} doses and has been archived.`);
            }

            saveToLocalStorage();
            renderCurrentTab();
            
            const injectionsRemaining = newRepeatsLeft;
            alert(`✅ Injection administered.\n\nDoses given: ${totalDoses - newRepeatsLeft} of ${totalDoses}\nRepeats remaining: ${newRepeatsLeft}\nNew due date: ${patient['Due Date'] || 'Not set'}`);
        }

        function confirmAppointment(fileNumber) {
            const patient = patients.find(p => p['File Number'] === fileNumber);
            if (patient) {
                patient['Appointment Confirmed'] = true;
                saveToLocalStorage();
                renderCurrentTab();
                alert(`✅ Appointment confirmed for ${patient['Patient Name']}`);
            }
        }

        function markPending(fileNumber) {
            const patient = patients.find(p => p['File Number'] === fileNumber);
            if (patient) {
                patient['Pending'] = true;
                saveToLocalStorage();
                renderCurrentTab();
            }
        }

        function deletePatient(fileNumber) {
            patients = patients.filter(p => p['File Number'] !== fileNumber);
            saveToLocalStorage();
            renderCurrentTab();
        }

        // ========== FILTERING ==========
        function getFilteredPatients() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const todayStr = today.toISOString().split('T')[0];

            let filtered = patients.filter(p => {
                if (p['Archived'] && currentTab !== 'archived') return false;
                if (!p['Archived'] && currentTab === 'archived') return false;
                if (p['Pending'] && currentTab !== 'pending') return false;
                if (!p['Pending'] && currentTab === 'pending') return false;

                const dueDate = p['Due Date'] ? new Date(p['Due Date']) : null;
                const apptDate = p['Appointment Date & Time'] ? new Date(p['Appointment Date & Time']) : null;

                switch (currentTab) {
                    case 'today':
                        return apptDate && apptDate.toISOString().split('T')[0] === todayStr;
                    case 'scheduled':
                        return apptDate && apptDate > today && !p['Archived'];
                    case 'overdue':
                        return dueDate && dueDate < today && !p['Injection Administered'] && !p['Archived'] && !p['Pending'];
                    case 'queue':
                        return !p['Archived'] && !p['Pending'];
                    case 'pending':
                        return p['Pending'] && !p['Archived'];
                    case 'archived':
                        return p['Archived'];
                    default:
                        return !p['Archived'];
                }
            });

            if (searchQuery) {
                const query = searchQuery.toLowerCase();
                filtered = filtered.filter(p =>
                    (p['Patient Name'] || '').toLowerCase().includes(query) ||
                    (p['File Number'] || '').toLowerCase().includes(query)
                );
            }

            return prioritySort(filtered, currentTab);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // ========== RENDER ==========
        function renderCurrentTab() {
            const filtered = getFilteredPatients();
            const container = document.getElementById('patientList');

            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state">✨ No patients in this tab<br><br>Click "+ Add New Patient" to get started!</div>';
                return;
            }

            container.innerHTML = filtered.map(patient => {
                const dueDateStr = patient['Due Date'] ? new Date(patient['Due Date']).toLocaleDateString() : 'Not set';
                const hasSpecial = patient['Special Instructions'] && patient['Special Instructions'].trim() !== '';
                const doseMg = patient['Dose Prescribed'] ? `${patient['Dose Prescribed']}mg` : '';
                const totalDoses = parseInt(patient['Total Doses']) || 4;
                const repeatsLeft = parseInt(patient['Doses Repeats Left']) || 0;
                const dosesGiven = totalDoses - repeatsLeft;
                const hasAppointment = patient['Appointment Date & Time'];
                const isConfirmed = patient['Appointment Confirmed'] === true;
                const apptDateStr = hasAppointment ? new Date(patient['Appointment Date & Time']).toLocaleString() : 'No appointment';
                
                return `
                    <div class="patient-card" data-filenumber="${escapeHtml(patient['File Number'])}">
                        <div class="collapsed-view">
                            <div class="patient-info">
                                <div>
                                    <span class="patient-name">${escapeHtml(patient['Patient Name'])}</span>
                                    <span class="patient-file">#${escapeHtml(patient['File Number'])}</span>
                                    ${doseMg ? `<span class="dose-badge">${doseMg}</span>` : ''}
                                    ${hasSpecial ? '<span class="special-badge">⚠️</span>' : ''}
                                    ${hasAppointment && !isConfirmed ? '<span class="confirm-needed">⚠️ Needs Confirmation</span>' : ''}
                                </div>
                                <div class="patient-address">${escapeHtml(patient['Address'] || 'No address')}</div>
                                <div class="due-date">📅 Due: ${dueDateStr} | 💉 ${dosesGiven}/${totalDoses} doses given | ${repeatsLeft} repeats left</div>
                                ${hasAppointment ? `<div class="appt-badge">📆 Appt: ${apptDateStr} ${isConfirmed ? '✅' : '❌'}</div>` : ''}
                            </div>
                            <div class="action-buttons">
                                ${patient['Phone 1'] ? `<button class="action-icon call-icon" data-phone="${escapeHtml(patient['Phone 1'])}">📞</button>` : ''}
                                ${patient['Phone 2'] ? `<button class="action-icon call-icon" data-phone="${escapeHtml(patient['Phone 2'])}">📞2</button>` : ''}
                                ${patient['Address'] ? `<button class="action-icon map-icon" data-address="${escapeHtml(patient['Address'])}">🗺️</button>` : ''}
                            </div>
                        </div>
                        <div class="expanded-view">
                            <div class="detail-row"><div class="detail-label">File Number:</div><div class="detail-value">${escapeHtml(patient['File Number'])}</div></div>
                            <div class="detail-row"><div class="detail-label">💊 Dose Prescribed:</div><div class="detail-value"><strong>${doseMg} (${doseToWeeks[patient['Dose Prescribed']] || 4} weeks between doses)</strong></div></div>
                            <div class="detail-row"><div class="detail-label">Total Doses:</div><div class="detail-value">${totalDoses}</div></div>
                            <div class="detail-row"><div class="detail-label">Doses Given:</div><div class="detail-value">${dosesGiven}</div></div>
                            <div class="detail-row"><div class="detail-label">Repeats Left:</div><div class="detail-value"><strong>${repeatsLeft}</strong> (Total Doses - 1 = Repeats)</div></div>
                            <div class="detail-row"><div class="detail-label">Previous Injection Site:</div><div class="detail-value">${escapeHtml(patient['Previous Injection Site'] || 'None')}</div></div>
                            <div class="detail-row"><div class="detail-label">Injection Site:</div><div class="detail-value">${escapeHtml(patient['Injection Site'] || 'Not set')}</div></div>
                            <div class="detail-row"><div class="detail-label">Due Date:</div><div class="detail-value"><strong>${dueDateStr}</strong></div></div>
                            <div class="detail-row"><div class="detail-label">Appointment:</div><div class="detail-value">${apptDateStr}</div></div>
                            <div class="detail-row"><div class="detail-label">Appointment Confirmed:</div><div class="detail-value">${isConfirmed ? '✅ Yes' : '❌ No - Click Confirm button'}</div></div>
                            <div class="detail-row"><div class="detail-label">Assignment:</div><div class="detail-value">${escapeHtml(patient['Assignment Type'])}</div></div>
                            ${patient['Special Instructions'] ? `<div class="detail-row"><div class="detail-label ins-red">⚠️ Special Instructions:</div><div class="detail-value ins-red">${escapeHtml(patient['Special Instructions'])}</div></div>` : ''}
                            <div class="detail-row"><div class="detail-label">Adverse Effects:</div><div class="detail-value">${escapeHtml(patient['Adverse Effects Comments'] || 'None')}</div></div>
                            <div class="action-row">
                                <button class="action-sm inject-sm" data-filenumber="${escapeHtml(patient['File Number'])}" data-action="inject">💉 Inject (${repeatsLeft} repeats left)</button>
                                ${hasAppointment && !isConfirmed ? `<button class="action-sm confirm-sm" data-filenumber="${escapeHtml(patient['File Number'])}" data-action="confirm">✅ Confirm Appointment</button>` : ''}
                                ${!patient['Pending'] ? `<button class="action-sm pending-sm" data-filenumber="${escapeHtml(patient['File Number'])}" data-action="pending">⏳ Pending</button>` : ''}
                                <button class="action-sm edit-sm" data-filenumber="${escapeHtml(patient['File Number'])}" data-action="edit">✏️ Edit</button>
                                <button class="action-sm delete-sm" data-filenumber="${escapeHtml(patient['File Number'])}" data-action="delete">🗑️ Delete</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            attachEventListeners();
        }

        function attachEventListeners() {
            document.querySelectorAll('.patient-card').forEach(card => {
                const expanded = card.querySelector('.expanded-view');
                card.addEventListener('click', (e) => {
                    if (e.target.tagName === 'BUTTON') return;
                    const isExpanded = expanded.style.display === 'block';
                    expanded.style.display = isExpanded ? 'none' : 'block';
                    card.classList.toggle('expanded', !isExpanded);
                });
            });

            document.querySelectorAll('.call-icon').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const phone = btn.getAttribute('data-phone');
                    window.location.href = `tel:${phone}`;
                });
            });

            document.querySelectorAll('.map-icon').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const address = encodeURIComponent(btn.getAttribute('data-address'));
                    window.open(`https://maps.google.com/?q=${address}`, '_blank');
                });
            });

            document.querySelectorAll('[data-action="inject"]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const fileNumber = btn.getAttribute('data-filenumber');
                    const patient = patients.find(p => p['File Number'] === fileNumber);
                    const totalDoses = parseInt(patient['Total Doses']) || 4;
                    const repeatsLeft = parseInt(patient['Doses Repeats Left']) || 0;
                    const dosesGiven = totalDoses - repeatsLeft;
                    
                    showConfirmDialog(
                        `💉 ADMINISTER INJECTION\n\n` +
                        `Patient: ${patient['Patient Name']}\n` +
                        `Dose: ${patient['Dose Prescribed']}mg\n` +
                        `Doses given so far: ${dosesGiven} of ${totalDoses}\n` +
                        `Repeats remaining: ${repeatsLeft}\n\n` +
                        `Due date will advance ${doseToWeeks[patient['Dose Prescribed']] || 4} weeks.\n\n` +
                        `Proceed?`, 
                        () => {
                            administerInjection(fileNumber);
                        }
                    );
                });
            });

            document.querySelectorAll('[data-action="confirm"]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const fileNumber = btn.getAttribute('data-filenumber');
                    confirmAppointment(fileNumber);
                });
            });

            document.querySelectorAll('[data-action="pending"]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const fileNumber = btn.getAttribute('data-filenumber');
                    showConfirmDialog('Mark this patient as pending? They will move to the Pending tab.', () => {
                        markPending(fileNumber);
                    });
                });
            });

            document.querySelectorAll('[data-action="edit"]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const fileNumber = btn.getAttribute('data-filenumber');
                    openEditModal(fileNumber);
                });
            });

            document.querySelectorAll('[data-action="delete"]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const fileNumber = btn.getAttribute('data-filenumber');
                    showConfirmDialog('Permanently delete this patient? This cannot be undone.', () => {
                        deletePatient(fileNumber);
                    });
                });
            });
        }

        // ========== MODAL ==========
        function openAddModal() {
            currentEditFileNumber = null;
            document.getElementById('modalTitle').innerText = 'Add Patient';
            document.getElementById('patientForm').reset();
            document.getElementById('deletePatientBtn').style.display = 'none';
            
            // Set defaults
            const defaultTotalDoses = 4;
            document.getElementById('totalDoses').value = defaultTotalDoses;
            document.getElementById('dosesLeft').value = defaultTotalDoses - 1;
            
            const defaultDueDate = new Date();
            defaultDueDate.setDate(defaultDueDate.getDate() + 7);
            document.getElementById('dueDate').value = defaultDueDate.toISOString().split('T')[0];
            
            document.getElementById('patientModal').style.display = 'block';
        }

        function openEditModal(fileNumber) {
            const patient = patients.find(p => p['File Number'] === fileNumber);
            if (!patient) return;

            currentEditFileNumber = fileNumber;
            document.getElementById('modalTitle').innerText = 'Edit Patient';
            document.getElementById('patientName').value = patient['Patient Name'] || '';
            document.getElementById('fileNumber').value = patient['File Number'] || '';
            document.getElementById('address').value = patient['Address'] || '';
            document.getElementById('phone1').value = patient['Phone 1'] || '';
            document.getElementById('phone2').value = patient['Phone 2'] || '';
            document.getElementById('dosePrescribed').value = patient['Dose Prescribed'] || '7.5';
            document.getElementById('totalDoses').value = patient['Total Doses'] || 4;
            
            // Calculate proper doses left if needed
            let dosesLeft = patient['Doses Repeats Left'];
            if (!dosesLeft || dosesLeft === '') {
                dosesLeft = (parseInt(patient['Total Doses']) || 4) - 1;
            }
            document.getElementById('dosesLeft').value = dosesLeft;
            
            document.getElementById('prevInjSite').value = patient['Previous Injection Site'] || '';
            document.getElementById('injSite').value = patient['Injection Site'] || '';
            document.getElementById('dueDate').value = patient['Due Date'] || '';
            document.getElementById('appointmentDateTime').value = patient['Appointment Date & Time'] || '';
            document.getElementById('prevInjDates').value = patient['Previous Injection Dates'] || '';
            document.getElementById('assignmentType').value = patient['Assignment Type'] || 'Permanent';
            document.getElementById('specialInstructions').value = patient['Special Instructions'] || '';
            document.getElementById('adverseEffects').value = patient['Adverse Effects Comments'] || '';
            document.getElementById('deletePatientBtn').style.display = 'block';
            document.getElementById('patientModal').style.display = 'block';
        }

        function savePatientFromModal() {
            const fileNumber = document.getElementById('fileNumber').value.trim();
            if (!fileNumber) {
                alert('File Number is required');
                return;
            }

            if (!currentEditFileNumber && patients.find(p => p['File Number'] === fileNumber)) {
                alert('File Number already exists! Please use a unique number.');
                return;
            }

            const totalDoses = parseInt(document.getElementById('totalDoses').value) || 4;
            // Doses Left (Repeats) = Total Doses - 1 (first dose is initial)
            const calculatedDosesLeft = totalDoses - 1;
            
            const patientData = {
                'Patient Name': document.getElementById('patientName').value,
                'File Number': fileNumber,
                'Address': document.getElementById('address').value,
                'Phone 1': document.getElementById('phone1').value,
                'Phone 2': document.getElementById('phone2').value,
                'Dose Prescribed': document.getElementById('dosePrescribed').value,
                'Total Doses': totalDoses.toString(),
                'Doses Repeats Left': calculatedDosesLeft.toString(),
                'Previous Injection Site': document.getElementById('prevInjSite').value,
                'Injection Site': document.getElementById('injSite').value,
                'Due Date': document.getElementById('dueDate').value,
                'Appointment Date & Time': document.getElementById('appointmentDateTime').value,
                'Previous Injection Dates': document.getElementById('prevInjDates').value,
                'Assignment Type': document.getElementById('assignmentType').value,
                'Special Instructions': document.getElementById('specialInstructions').value,
                'Adverse Effects Comments': document.getElementById('adverseEffects').value,
                'File Status': 'Active',
                'Injection Administered': false,
                'Appointment Confirmed': false,
                'Pending': false,
                'Archived': false
            };

            if (currentEditFileNumber) {
                const index = patients.findIndex(p => p['File Number'] === currentEditFileNumber);
                if (index !== -1) {
                    patientData['Injection Administered'] = patients[index]['Injection Administered'];
                    patientData['Appointment Confirmed'] = patients[index]['Appointment Confirmed'];
                    patientData['Pending'] = patients[index]['Pending'];
                    patientData['Archived'] = patients[index]['Archived'];
                    patients[index] = patientData;
                }
            } else {
                patients.push(patientData);
            }

            saveToLocalStorage();
            closeModal();
            renderCurrentTab();
            alert(`Patient ${patientData['Patient Name']} saved successfully!\n\nTotal Doses: ${totalDoses}\nRepeats Left: ${calculatedDosesLeft} (will decrease with each injection)`);
        }

        function closeModal() {
            document.getElementById('patientModal').style.display = 'none';
            currentEditFileNumber = null;
        }

        function showConfirmDialog(message, callback) {
            document.getElementById('confirmMessage').innerText = message;
            document.getElementById('confirmModal').style.display = 'block';
            pendingConfirmCallback = callback;
        }

        function exportData() {
            const dataStr = JSON.stringify(patients, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `patient_backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importData(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        patients = imported;
                        saveToLocalStorage();
                        renderCurrentTab();
                        alert(`✅ Imported ${imported.length} patients!`);
                    } else {
                        alert('Invalid file format');
                    }
                } catch (err) {
                    alert('Error parsing file');
                }
            };
            reader.readAsText(file);
        }

        // ========== INITIALIZATION ==========
        document.addEventListener('DOMContentLoaded', () => {
            loadFromLocalStorage();

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentTab = btn.getAttribute('data-tab');
                    renderCurrentTab();
                });
            });

            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', (e) => { searchQuery = e.target.value; renderCurrentTab(); });
            document.getElementById('clearSearchBtn').addEventListener('click', () => { searchInput.value = ''; searchQuery = ''; renderCurrentTab(); });

            document.getElementById('refreshBtn').addEventListener('click', () => { loadFromGoogleSheets(); });
            document.getElementById('addPatientBtn').addEventListener('click', openAddModal);
            document.querySelectorAll('.close').forEach(close => { close.addEventListener('click', closeModal); });
            window.addEventListener('click', (e) => { if (e.target === document.getElementById('patientModal')) closeModal(); if (e.target === document.getElementById('confirmModal')) document.getElementById('confirmModal').style.display = 'none'; });

            document.getElementById('patientForm').addEventListener('submit', (e) => { e.preventDefault(); savePatientFromModal(); });
            document.getElementById('deletePatientBtn')?.addEventListener('click', () => { if (currentEditFileNumber) { showConfirmDialog('Permanently delete this patient?', () => { deletePatient(currentEditFileNumber); closeModal(); }); } });

            document.getElementById('confirmYes')?.addEventListener('click', () => { if (pendingConfirmCallback) pendingConfirmCallback(); document.getElementById('confirmModal').style.display = 'none'; pendingConfirmCallback = null; });
            document.getElementById('confirmNo')?.addEventListener('click', () => { document.getElementById('confirmModal').style.display = 'none'; pendingConfirmCallback = null; });

            document.getElementById('exportBtn')?.addEventListener('click', exportData);
            document.getElementById('importBtn')?.addEventListener('click', () => { document.getElementById('importFile').click(); });
            document.getElementById('importFile')?.addEventListener('change', (e) => { if (e.target.files[0]) importData(e.target.files[0]); e.target.value = ''; });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Patient Dosing Tracker - Advanced Features</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #f0f2f5; padding: 12px; padding-bottom: 80px; }
        .app-container { max-width: 700px; margin: 0 auto; }
        
        .header { background: white; padding: 16px; border-radius: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 10; }
        .header h1 { font-size: 20px; color: #1a1a2e; margin-bottom: 12px; }
        .sync-status { font-size: 12px; margin-top: 8px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .top-bar { display: flex; gap: 8px; flex-wrap: wrap; justify-content: space-between; }
        .search-box { flex: 1; display: flex; gap: 8px; }
        .search-box input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 25px; font-size: 15px; background: #f9f9f9; }
        .search-box button { padding: 10px 14px; border: none; border-radius: 25px; font-size: 14px; font-weight: 500; cursor: pointer; background: #007aff; color: white; }
        .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-secondary { padding: 10px 14px; border: none; border-radius: 25px; font-size: 13px; font-weight: 500; cursor: pointer; background: #e9ecef; color: #333; }
        .btn-primary { background: #007aff; color: white; border: none; padding: 10px 16px; border-radius: 25px; font-weight: 500; cursor: pointer; }
        .btn-danger { background: #ff3b30; color: white; border: none; padding: 10px 16px; border-radius: 25px; font-weight: 500; cursor: pointer; }
        .add-btn { width: 100%; margin-bottom: 16px; padding: 14px; font-size: 16px; border-radius: 30px; background: #007aff; color: white; border: none; font-weight: 600; cursor: pointer; }
        
        .report-buttons { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .report-btn { background: #5856d6; color: white; border: none; padding: 8px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
        .tab-btn { padding: 10px 18px; background: white; border: 1px solid #ddd; border-radius: 30px; cursor: pointer; font-size: 13px; font-weight: 500; flex-shrink: 0; }
        .tab-btn.active { background: #007aff; color: white; border-color: #007aff; }
        
        .patient-list { display: flex; flex-direction: column; gap: 12px; }
        .patient-card { background: white; border-radius: 20px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; }
        .patient-card.expanded { background: #f8f9ff; border-left: 4px solid #007aff; }
        
        .date-separator { background: #e9ecef; padding: 8px 16px; border-radius: 12px; margin: 8px 0; font-weight: 600; color: #1a1a2e; font-size: 14px; }
        
        .collapsed-view { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .patient-info { flex: 2; }
        .patient-name { font-size: 17px; font-family: 'Aptos', 'Segoe UI', system-ui, -apple-system, sans-serif; font-weight: 600; color: #1a1a2e; }
        .patient-file { font-size: 13px; color: #666; margin-left: 8px; font-family: system-ui; }
        .patient-address { font-size: 13px; color: #666; margin-top: 4px; }
        .due-date { font-size: 12px; color: #007aff; font-weight: 500; margin-top: 4px; }
        .appt-badge { font-size: 11px; background: #5856d6; color: white; padding: 2px 8px; border-radius: 20px; display: inline-block; margin-top: 4px; }
        .special-badge { display: inline-block; background: #ff3b30; color: white; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-top: 4px; }
        .dose-badge { display: inline-block; background: #5856d6; color: white; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-left: 8px; font-family: system-ui; }
        .warning-badge { background: #ff3b30; color: white; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-left: 8px; animation: pulse 1s infinite; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .action-buttons { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; justify-content: flex-end; }
        .action-icon { width: 40px; height: 40px; border-radius: 30px; border: none; font-size: 18px; cursor: pointer; transition: transform 0.2s; display: inline-flex; align-items: center; justify-content: center; }
        .action-icon:hover { transform: scale(1.05); }
        .call-icon { background: #34c759; color: white; }
        .nav-icon { background: #007aff; color: white; font-size: 18px; }
        
        .expanded-view { margin-top: 16px; padding-top: 16px; border-top: 1px solid #eee; display: none; }
        .detail-row { display: flex; padding: 8px 0; border-bottom: 1px solid #f0f0f0; flex-wrap: wrap; align-items: center; }
        .detail-label { width: 140px; font-weight: 600; color: #555; font-size: 13px; }
        .detail-value { flex: 1; color: #333; font-size: 13px; }
        .edit-icon { cursor: pointer; margin-left: 8px; color: #007aff; font-size: 14px; }
        .ins-red { color: #ff3b30; font-weight: 500; }
        
        .action-row { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; justify-content: center; }
        .action-sm { padding: 8px 12px; font-size: 13px; border-radius: 25px; border: none; font-weight: 500; cursor: pointer; transition: transform 0.2s; }
        .action-sm:hover { transform: scale(1.02); }
        .inject-sm { background: #34c759; color: white; }
        .pending-sm { background: #ff9500; color: white; }
        .edit-sm { background: #007aff; color: white; }
        .delete-sm { background: #ff3b30; color: white; }
        .confirm-sm { background: #5e5ce0; color: white; }
        .move-sm { background: #5856d6; color: white; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; overflow-y: auto; }
        .modal-content { background: white; max-width: 550px; margin: 40px auto; border-radius: 28px; padding: 24px; }
        .confirm-modal { max-width: 350px; text-align: center; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close { font-size: 28px; cursor: pointer; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group.full-width { grid-column: span 2; }
        .form-group label { font-weight: 500; font-size: 13px; }
        .form-group input, .form-group select, .form-group textarea { padding: 10px 12px; border: 1px solid #ddd; border-radius: 14px; font-size: 14px; font-family: inherit; }
        
        .modal-footer { margin-top: 20px; display: flex; justify-content: space-between; gap: 12px; }
        .empty-state { text-align: center; padding: 50px 20px; color: #999; }
        .loading { text-align: center; padding: 40px; color: #007aff; }
        
        .report-container { background: white; border-radius: 20px; padding: 16px; margin-top: 16px; max-height: 500px; overflow-y: auto; }
        .report-item { padding: 12px; border-bottom: 1px solid #eee; }
        .report-date { font-weight: 600; color: #007aff; margin-bottom: 8px; font-size: 14px; }
        
        @media (max-width: 600px) {
            .collapsed-view { flex-direction: column; align-items: stretch; }
            .action-buttons { justify-content: flex-start; }
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full-width { grid-column: span 1; }
            .detail-label { width: 120px; }
            .header-actions { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>💉 Patient Dosing Tracker</h1>
            <div class="top-bar">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 Search name or file...">
                    <button id="clearSearchBtn">Clear</button>
                </div>
                <div class="header-actions">
                    <button id="refreshBtn" class="btn-secondary">🔄 Load from Sheet</button>
                    <button id="importCSVBtn" class="btn-secondary">📄 Import CSV</button>
                    <button id="importPDFBtn" class="btn-secondary">📑 Import PDF</button>
                    <button id="exportBtn" class="btn-secondary">📥 Backup</button>
                    <button id="importBtn" class="btn-secondary">📤 Restore</button>
                    <input type="file" id="importFile" accept=".json" style="display:none">
                    <input type="file" id="csvFileInput" accept=".csv" style="display:none">
                    <input type="file" id="pdfFileInput" accept=".pdf" style="display:none">
                </div>
            </div>
            <div class="sync-status">
                <span id="syncStatus">⚡ Ready to load</span>
                <span id="recordCount"></span>
            </div>
        </div>

        <div class="report-buttons">
            <button class="report-btn" data-report="dueMay2026">📅 Due in May 2026</button>
            <button class="report-btn" data-report="noRepeatsLeft">⚠️ No Repeats Left</button>
            <button class="report-btn" data-report="pendingPatients">⏳ Pending Patients</button>
            <button id="closeReportBtn" class="report-btn" style="background:#ff3b30; display:none;">❌ Close Report</button>
        </div>

        <div class="tabs" id="tabsContainer">
            <button class="tab-btn active" data-tab="all">👥 All Patients</button>
            <button class="tab-btn" data-tab="today">📅 Today</button>
            <button class="tab-btn" data-tab="scheduled">📆 Scheduled</button>
            <button class="tab-btn" data-tab="overdue">⚠️ Overdue</button>
            <button class="tab-btn" data-tab="pending">⏳ Pending</button>
            <button class="tab-btn" data-tab="archived">📦 Archived</button>
        </div>

        <button id="addPatientBtn" class="add-btn">+ Add New Patient</button>

        <div id="patientList" class="patient-list">
            <div class="loading">Loading patients...</div>
        </div>
        
        <div id="reportView" style="display:none;"></div>
    </div>

    <!-- Injection Site Modal -->
    <div id="injectionSiteModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Select Injection Site</h2>
                <span class="close-injection">&times;</span>
            </div>
            <div class="form-group">
                <label>Injection Site:</label>
                <select id="injectionSiteSelect">
                    <option value="Right Side">Right Side</option>
                    <option value="Left Side">Left Side</option>
                    <option value="Right Glute">Right Glute</option>
                    <option value="Left Glute">Left Glute</option>
                </select>
            </div>
            <div class="modal-footer">
                <button id="confirmInjectionSite" class="btn-primary">Confirm & Administer</button>
                <button id="cancelInjectionSite" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <div id="confirmModal" class="modal">
        <div class="modal-content confirm-modal">
            <h3>Confirm Action</h3>
            <p id="confirmMessage"></p>
            <div style="display: flex; gap: 12px; justify-content: center; margin-top: 20px;">
                <button id="confirmYes" class="btn-primary">Yes</button>
                <button id="confirmNo" class="btn-secondary">No</button>
            </div>
        </div>
    </div>

    <div id="patientModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Patient</h2>
                <span class="close">&times;</span>
            </div>
            <form id="patientForm">
                <div class="form-grid">
                    <div class="form-group"><label>Patient Name *</label><input type="text" id="patientName" required></div>
                    <div class="form-group"><label>File Number *</label><input type="text" id="fileNumber" required></div>
                    <div class="form-group full-width"><label>Address</label><input type="text" id="address"></div>
                    <div class="form-group"><label>Phone 1</label><input type="tel" id="phone1"></div>
                    <div class="form-group"><label>Phone 2</label><input type="tel" id="phone2"></div>
                    <div class="form-group"><label>💊 Dose Prescribed</label>
                        <select id="dosePrescribed">
                            <option value="7.5">7.5 mg (4 weeks)</option>
                            <option value="22.5">22.5 mg (12 weeks)</option>
                            <option value="30">30 mg (16 weeks)</option>
                            <option value="45">45 mg (24 weeks)</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Total Doses</label>
                        <input type="number" id="totalDoses" value="4" min="1">
                    </div>
                    <div class="form-group"><label>Doses Remaining</label>
                        <input type="number" id="dosesRemaining" value="4" min="0">
                    </div>
                    <div class="form-group"><label>Previous Injection Site</label><input type="text" id="prevInjSite"></div>
                    <div class="form-group"><label>Injection Site</label>
                        <select id="injSite">
                            <option value="">Select site</option>
                            <option value="Right Side">Right Side</option>
                            <option value="Left Side">Left Side</option>
                            <option value="Right Glute">Right Glute</option>
                            <option value="Left Glute">Left Glute</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Due Date</label><input type="date" id="dueDate"></div>
                    <div class="form-group"><label>Appointment Date & Time</label><input type="datetime-local" id="appointmentDateTime"></div>
                    <div class="form-group full-width"><label>Previous Injection Dates</label><input type="text" id="prevInjDates"></div>
                    <div class="form-group"><label>Assignment Type</label>
                        <select id="assignmentType">
                            <option value="Permanent">Permanent</option>
                            <option value="Temporary">Temporary</option>
                        </select>
                    </div>
                    <div class="form-group full-width"><label>⚠️ Special Instructions</label><textarea id="specialInstructions" rows="2"></textarea></div>
                    <div class="form-group full-width"><label>Adverse Effects Comments</label><textarea id="adverseEffects" rows="2"></textarea></div>
                </div>
                <div class="modal-footer">
                    <button type="button" id="deletePatientBtn" class="btn-danger" style="display:none;">Delete</button>
                    <button type="submit" class="btn-primary">Save Patient</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ========== CONFIGURATION ==========
        const GOOGLE_SHEETS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSYgD018ww2Mbkud6ZYmZHop7EXxcm_0Zl4V9bB2AaY4r4xXTWChAW6v-gUyjD4-2Qmg4H8O0kxryCf/pub?output=csv";
        
        // ========== DATA ==========
        let patients = [];
        let currentEditFileNumber = null;
        let pendingConfirmCallback = null;
        let currentTab = 'all';
        let searchQuery = '';
        let pendingInjectionFileNumber = null;

        const doseToWeeks = { '7.5': 4, '22.5': 12, '30': 16, '45': 24 };
        const injectionSites = ['Right Side', 'Left Side', 'Right Glute', 'Left Glute'];

        // ========== REPORT GENERATION ==========
        function generateReport(reportType) {
            let filteredPatients = [];
            let title = '';
            
            switch(reportType) {
                case 'dueMay2026':
                    title = '📅 Patients Due in May 2026';
                    filteredPatients = patients.filter(p => {
                        if (!p['Due Date']) return false;
                        const dueDate = new Date(p['Due Date']);
                        return dueDate.getFullYear() === 2026 && dueDate.getMonth() === 4; // May is month 4
                    });
                    break;
                case 'noRepeatsLeft':
                    title = '⚠️ Patients with No Repeats Left';
                    filteredPatients = patients.filter(p => {
                        const dosesRemaining = parseInt(p['Doses Remaining']) || parseInt(p['Total Doses']) || 0;
                        return dosesRemaining === 0 && !p['Archived'];
                    });
                    break;
                case 'pendingPatients':
                    title = '⏳ Pending Patients';
                    filteredPatients = patients.filter(p => p['Pending'] === true && !p['Archived']);
                    break;
                default:
                    return;
            }
            
            // Group by date
            const groupedByDate = {};
            filteredPatients.forEach(p => {
                const dueDate = p['Due Date'] ? new Date(p['Due Date']).toLocaleDateString() : 'No Date';
                if (!groupedByDate[dueDate]) groupedByDate[dueDate] = [];
                groupedByDate[dueDate].push(p);
            });
            
            // Sort dates
            const sortedDates = Object.keys(groupedByDate).sort((a,b) => new Date(a) - new Date(b));
            
            let reportHtml = `<div class="report-container"><h3 style="margin-bottom:16px;">${title} (${filteredPatients.length} patients)</h3>`;
            
            for (const date of sortedDates) {
                reportHtml += `<div class="date-separator">📅 ${date}</div>`;
                for (const p of groupedByDate[date]) {
                    const dosesRemaining = parseInt(p['Doses Remaining']) || parseInt(p['Total Doses']) || 0;
                    const totalDoses = parseInt(p['Total Doses']) || 4;
                    reportHtml += `
                        <div class="report-item">
                            <strong>${escapeHtml(p['Patient Name'])}</strong> #${escapeHtml(p['File Number'])}<br>
                            💊 ${p['Dose Prescribed']}mg | 💉 ${totalDoses - dosesRemaining}/${totalDoses} doses given<br>
                            📞 ${p['Phone 1'] || 'No phone'} | 📍 ${escapeHtml(p['Address'] || 'No address')}
                        </div>
                    `;
                }
            }
            
            reportHtml += `<div style="margin-top:16px;"><button onclick="closeReport()" class="btn-secondary">Close Report</button></div></div>`;
            
            document.getElementById('patientList').style.display = 'none';
            document.getElementById('reportView').style.display = 'block';
            document.getElementById('reportView').innerHTML = reportHtml;
            document.getElementById('closeReportBtn').style.display = 'inline-block';
        }
        
        function closeReport() {
            document.getElementById('patientList').style.display = 'flex';
            document.getElementById('reportView').style.display = 'none';
            document.getElementById('closeReportBtn').style.display = 'none';
            renderCurrentTab();
        }

        // ========== CSV IMPORT ==========
        function importCSV(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const csvText = e.target.result;
                    const rows = csvText.split('\n');
                    const headers = rows[0].split(',').map(h => h.trim().replace(/"/g, ''));
                    
                    let importedCount = 0;
                    for (let i = 1; i < rows.length; i++) {
                        if (!rows[i].trim()) continue;
                        
                        const values = rows[i].split(',').map(v => v.trim().replace(/"/g, ''));
                        const patient = {};
                        headers.forEach((header, idx) => {
                            patient[header] = values[idx] || '';
                        });
                        
                        if (patient['Patient Name'] && patient['Patient Name'] !== 'Patient Name') {
                            // Check if file number already exists
                            if (!patients.find(p => p['File Number'] === patient['File Number'])) {
                                patient['Doses Remaining'] = patient['Doses Remaining'] || patient['Total Doses'] || 4;
                                patient['Injection Administered'] = false;
                                patient['Appointment Confirmed'] = false;
                                patient['Pending'] = false;
                                patient['Archived'] = false;
                                patients.push(patient);
                                importedCount++;
                            }
                        }
                    }
                    
                    saveToLocalStorage();
                    renderCurrentTab();
                    alert(`✅ Imported ${importedCount} new patients from CSV!`);
                } catch (err) {
                    alert('Error parsing CSV file');
                }
            };
            reader.readAsText(file);
        }
        
        // ========== PDF TEXT EXTRACTION (Basic) ==========
        async function importPDF(file) {
            // Note: Full PDF extraction requires a library. This is a placeholder that 
            // demonstrates the structure. For production, use pdf.js library.
            alert(`PDF Import: Please paste the extracted text from your PDF below.\n\nThis allows you to copy patient data from PDF documents.`);
            
            const text = prompt("Paste the extracted text from your PDF here:", "");
            if (text) {
                // Basic parsing - looks for patterns like "Name: John Smith" or "Patient: John Smith"
                const lines = text.split('\n');
                const newPatient = {};
                
                for (const line of lines) {
                    if (line.match(/name[:| ]/i)) {
                        newPatient['Patient Name'] = line.replace(/.*name[:| ]/i, '').trim();
                    }
                    if (line.match(/file[:| ]/i) || line.match(/id[:| ]/i)) {
                        newPatient['File Number'] = line.replace(/.*(file|id)[:| ]/i, '').trim();
                    }
                    if (line.match(/phone[:| ]/i)) {
                        if (!newPatient['Phone 1']) newPatient['Phone 1'] = line.replace(/.*phone[:| ]/i, '').trim();
                    }
                    if (line.match(/address[:| ]/i)) {
                        newPatient['Address'] = line.replace(/.*address[:| ]/i, '').trim();
                    }
                    if (line.match(/dose[:| ]/i)) {
                        const doseMatch = line.match(/(\d+\.?\d*)/);
                        if (doseMatch) newPatient['Dose Prescribed'] = doseMatch[1];
                    }
                }
                
                if (newPatient['Patient Name'] && newPatient['File Number']) {
                    if (!patients.find(p => p['File Number'] === newPatient['File Number'])) {
                        newPatient['Total Doses'] = 4;
                        newPatient['Doses Remaining'] = 4;
                        newPatient['Injection Administered'] = false;
                        newPatient['Appointment Confirmed'] = false;
                        newPatient['Pending'] = false;
                        newPatient['Archived'] = false;
                        newPatient['Assignment Type'] = 'Permanent';
                        
                        patients.push(newPatient);
                        saveToLocalStorage();
                        renderCurrentTab();
                        alert(`✅ Extracted and added patient: ${newPatient['Patient Name']}`);
                    } else {
                        alert('Patient with this File Number already exists!');
                    }
                } else {
                    alert('Could not extract patient name and file number from the text. Please check the format.');
                }
            }
        }

        // ========== PRIORITY SORT WITH DATE SEPARATORS ==========
        function renderWithDateSeparators(patientsList) {
            if (!patientsList.length) return '<div class="empty-state">✨ No patients in this tab</div>';
            
            // Group by due date
            const groupedByDate = {};
            patientsList.forEach(p => {
                const dueDate = p['Due Date'] ? new Date(p['Due Date']).toLocaleDateString() : 'No Due Date';
                if (!groupedByDate[dueDate]) groupedByDate[dueDate] = [];
                groupedByDate[dueDate].push(p);
            });
            
            // Sort dates
            const sortedDates = Object.keys(groupedByDate).sort((a,b) => {
                if (a === 'No Due Date') return 1;
                if (b === 'No Due Date') return -1;
                return new Date(a) - new Date(b);
            });
            
            let html = '';
            for (const date of sortedDates) {
                html += `<div class="date-separator">📅 ${date}</div>`;
                for (const patient of groupedByDate[date]) {
                    html += renderPatientCard(patient);
                }
            }
            return html;
        }
        
        function renderPatientCard(patient) {
            const dueDateStr = patient['Due Date'] ? new Date(patient['Due Date']).toLocaleDateString() : 'Not set';
            const specialInstructions = patient['Special Instructions'] || '';
            const doseMg = patient['Dose Prescribed'] ? `${patient['Dose Prescribed']}mg` : '';
            const totalDoses = parseInt(patient['Total Doses']) || 4;
            const dosesRemaining = parseInt(patient['Doses Remaining']) || totalDoses;
            const dosesGiven = totalDoses - dosesRemaining;
            const hasAppointment = patient['Appointment Date & Time'];
            const isConfirmed = patient['Appointment Confirmed'] === true;
            const apptDateStr = hasAppointment ? new Date(patient['Appointment Date & Time']).toLocaleString() : 'No appointment';
            const showWarning = patient['Assignment Type'] === 'Temporary' && dosesRemaining === 0;
            
            return `
                <div class="patient-card" data-filenumber="${escapeHtml(patient['File Number'])}">
                    <div class="collapsed-view">
                        <div class="patient-info">
                            <div>
                                <span class="patient-name">${escapeHtml(patient['Patient Name'])}</span>

        // ========== LOAD FROM GOOGLE SHEETS ==========
        async function loadFromGoogleSheets() {
            document.getElementById('syncStatus').innerHTML = '🔄 Loading from Google Sheets...';
            
            try {
                const response = await fetch(GOOGLE_SHEETS_CSV_URL);
                const csvText = await response.text();
                
                const rows = csvText.split('\n');
                const headers = rows[0].split(',').map(h => h.trim().replace(/"/g, ''));
                
                const loadedPatients = [];
                for (let i = 1; i < rows.length; i++) {
                    if (!rows[i].trim()) continue;
                    
                    let values = [];
                    let inQuote = false;
                    let currentValue = '';
                    const row = rows[i];
                    
                    for (let j = 0; j < row.length; j++) {
                        const char = row[j];
                        if (char === '"') {
                            inQuote = !inQuote;
                        } else if (char === ',' && !inQuote) {
                            values.push(currentValue.trim().replace(/^"|"$/g, ''));
                            currentValue = '';
                        } else {
                            currentValue += char;
                        }
                    }
                    values.push(currentValue.trim().replace(/^"|"$/g, ''));
                    
                    const patient = {};
                    headers.forEach((header, idx) => {
                        patient[header] = values[idx] || '';
                    });
                    
                    if (patient['Patient Name'] && patient['Patient Name'] !== 'Patient Name') {
                        patient['Injection Administered'] = patient['Injection Administered'] === 'TRUE' || patient['Injection Administered'] === true;
                        patient['Appointment Confirmed'] = patient['Appointment Confirmed'] === 'TRUE' || patient['Appointment Confirmed'] === true;
                        patient['Pending'] = patient['Pending'] === 'TRUE' || patient['Pending'] === true;
                        patient['Archived'] = patient['Archived'] === 'TRUE' || patient['Archived'] === true;
                        
                        loadedPatients.push(patient);
                    }
                }
                
                if (loadedPatients.length > 0) {
                    patients = loadedPatients;
                    saveToLocalStorage();
                    renderCurrentTab();
                    document.getElementById('syncStatus').innerHTML = `✅ Loaded ${patients.length} patients from Google Sheets`;
                } else {
                    document.getElementById('syncStatus').innerHTML = '⚠️ No data found in sheet';
                }
                return true;
            } catch (error) {
                console.error('Load error:', error);
                document.getElementById('syncStatus').innerHTML = '❌ Failed to load';
                return false;
            }
        }

        // ========== LOCAL STORAGE ==========
        function saveToLocalStorage() {
            localStorage.setItem('patientTrackerData', JSON.stringify(patients));
            document.getElementById('recordCount').innerHTML = `📋 ${patients.length} total patients`;
        }

        function loadFromLocalStorage() {
            const saved = localStorage.getItem('patientTrackerData');
            if (saved && saved !== '[]') {
                patients = JSON.parse(saved);
            } else {
                patients = [];
            }
            document.getElementById('recordCount').innerHTML = `📋 ${patients.length} total patients`;
            renderCurrentTab();
        }

        // ========== DOSING LOGIC ==========
        function calculateNextDueDate(currentDueDate, dosePrescribed) {
            const weeks = doseToWeeks[dosePrescribed] || 4;
            const newDate = new Date(currentDueDate);
            newDate.setDate(newDate.getDate() + (weeks * 7));
            return newDate.toISOString().split('T')[0];
        }

        function showInjectionSiteSelector(fileNumber) {
            pendingInjectionFileNumber = fileNumber;
            document.getElementById('injectionSiteModal').style.display = 'block';
        }

        function performInjectionWithSite() {
            const fileNumber = pendingInjectionFileNumber;
            const injectionSite = document.getElementById('injectionSiteSelect').value;
            if (!injectionSite) {
                alert('Please select an injection site');
                return;
            }
            
            const patient = patients.find(p => p['File Number'] === fileNumber);
            if (!patient) return;

            let dosesRemaining = parseInt(patient['Doses Remaining']) || 0;
            const totalDoses = parseInt(patient['Total Doses']) || 4;
            
            if (dosesRemaining <= 0) {
                alert('No doses remaining! This patient will be moved to Pending tab.');
                patient['Pending'] = true;
                patient['File Status'] = 'Pending - Completed';
                saveToLocalStorage();
                renderCurrentTab();
                document.getElementById('injectionSiteModal').style.display = 'none';
                pendingInjectionFileNumber = null;
                return;
            }

            // Record previous injection date and site
            const today = new Date().toISOString().split('T')[0];
            const prevDates = patient['Previous Injection Dates'] ? patient['Previous Injection Dates'].split(',').map(d => d.trim()) : [];
            prevDates.push(today);
            patient['Previous Injection Dates'] = prevDates.join(', ');

            // Update injection site tracking
            if (patient['Injection Site']) {
                patient['Previous Injection Site'] = patient['Injection Site'];
            }
            patient['Injection Site'] = injectionSite;

            // Decrease doses remaining
            const newDosesRemaining = dosesRemaining - 1;
            patient['Doses Remaining'] = newDosesRemaining.toString();

            // Calculate new due date
            if (newDosesRemaining > 0) {
                const currentDueDate = patient['Due Date'] || new Date().toISOString().split('T')[0];
                patient['Due Date'] = calculateNextDueDate(currentDueDate, patient['Dose Prescribed']);
            }

            patient['Injection Administered'] = true;
            patient['Pending'] = false;
            patient['Archived'] = false;
            patient['File Status'] = 'Active';

            if (newDosesRemaining === 0) {
                patient['Pending'] = true;
                patient['File Status'] = 'Pending - Completed';
                alert(`${patient['Patient Name']} has completed all ${totalDoses} doses and has been moved to Pending tab.`);
            } else {
                alert(`✅ Injection administered at ${injectionSite}.\n\nDoses given: ${totalDoses - newDosesRemaining} of ${totalDoses}\nDoses remaining: ${newDosesRemaining}\nNew due date: ${patient['Due Date'] || 'Not set'}`);
            }

            saveToLocalStorage();
            renderCurrentTab();
            document.getElementById('injectionSiteModal').style.display = 'none';
            pendingInjectionFileNumber = null;
        }

        function confirmAppointment(fileNumber) {
            const patient = patients.find(p => p['File Number'] === fileNumber);
            if (patient) {
                patient['Appointment Confirmed'] = true;
                saveToLocalStorage();

                alert(`✅ Appointment confirmed for ${patient['Patient Name']}. Patient moved to Scheduled tab.`);

        function markPending(fileNumber) {

        function isAppointmentOverdue(patient) {
            if (!patient['Appointment Date & Time']) return false;
            const apptDate = new Date(patient['Appointment Date & Time']);
            const today = new Date();
            return apptDate < today && !patient['Injection Administered'];
        }

        // ========== FILTERING ==========
        function getFilteredPatients() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const todayStr = today.toISOString().split('T')[0];

            let filtered = patients.filter(p => {
                if (p['Archived'] && currentTab !== 'archived') return false;
                if (!p['Archived'] && currentTab === 'archived') return false;
                if (p['Pending'] && currentTab !== 'pending') return false;
                if (!p['Pending'] && currentTab === 'pending') return false;
                
                if (currentTab === 'all' && (p['Archived'] || p['Pending'])) return false;

                const dueDate = p['Due Date'] ? new Date(p['Due Date']) : null;
                const apptDate = p['Appointment Date & Time'] ? new Date(p['Appointment Date & Time']) : null;
                const isOverdue = isAppointmentOverdue(p);

                switch (currentTab) {
                    case 'today':
                        return apptDate && apptDate.toISOString().split('T')[0] === todayStr && p['Appointment Confirmed'];
                    case 'scheduled':
                        return apptDate && apptDate > today && p['Appointment Confirmed'] === true && !p['Archived'] && !p['Pending'] && !isOverdue;
                    case 'overdue':
                        return isOverdue && !p['Archived'] && !p['Pending'];
                    case 'all':
                        return !p['Archived'] && !p['Pending'];
                    case 'pending':
                        return p['Pending'] && !p['Archived'];
                    case 'archived':
                        return p['Archived'];
                    default:
                        return !p['Archived'];
                }
            });

            if (searchQuery) {
                const query = searchQuery.toLowerCase();
                filtered = filtered.filter(p =>
                    (p['Patient Name'] || '').toLowerCase().includes(query) ||
                    (p['File Number'] || '').toLowerCase().includes(query)
                );
            }

            return filtered.sort((a, b) => {
                const aDue = a['Due Date'] ? new Date(a['Due Date']) : new Date(8640000000000000);
                const bDue = b['Due Date'] ? new Date(b['Due Date']) : new Date(8640000000000000);
                return aDue - bDue;
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // ========== RENDER ==========

            const filtered = getFilteredPatients();
            const container = document.getElementById('patientList');
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state">✨ No patients in this tab<br><br>Click "+ Add New Patient" to get started!</div>';
                return;
            }
            
            container.innerHTML = renderWithDateSeparators(filtered);
            attachEventListeners();
        }

        function savePatientFromModal() {
            const fileNumber = document.getElementById('fileNumber').value.trim();
            if (!fileNumber) {
                alert('File Number is required');
                return;
            }

            if (!currentEditFileNumber && patients.find(p => p['File Number'] === fileNumber)) {
                alert('File Number already exists! Please use a unique number.');
                return;
            }

            const patientData = {
                'Patient Name': document.getElementById('patientName').value,
                'File Number': fileNumber,
                'Address': document.getElementById('address').value,
                'Phone 1': document.getElementById('phone1').value,
                'Phone 2': document.getElementById('phone2').value,
                'Dose Prescribed': document.getElementById('dosePrescribed').value,
                'Total Doses': document.getElementById('totalDoses').value,
                'Doses Remaining': document.getElementById('dosesRemaining').value,
                'Previous Injection Site': document.getElementById('prevInjSite').value,
                'Injection Site': document.getElementById('injSite').value,

                'Appointment Date & Time': document.getElementById('appointmentDateTime').value,
                'Previous Injection Dates': document.getElementById('prevInjDates').value,
                'Assignment Type': document.getElementById('assignmentType').value,
                'Special Instructions': document.getElementById('specialInstructions').value,

                'File Status': 'Active',
                'Injection Administered': false,
                'Appointment Confirmed': false,
                'Pending': false,
                'Archived': false
            };

            if (currentEditFileNumber) {
                const index = patients.findIndex(p => p['File Number'] === currentEditFileNumber);
                if (index !== -1) {
                    patientData['Injection Administered'] = patients[index]['Injection Administered'];
                    patientData['Appointment Confirmed'] = patients[index]['Appointment Confirmed'];
                    patientData['Pending'] = patients[index]['Pending'];

            } else {
                patients.push(patientData);
            }

            saveToLocalStorage();
            closeModal();
            renderCurrentTab();
            alert(`Patient ${patientData['Patient Name']} saved successfully!`);

            const a = document.createElement('a');
            a.href = url;
            a.download = `patient_backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importData(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        patients = imported;
                        saveToLocalStorage();
                        renderCurrentTab();
                        alert(`✅ Imported ${imported.length} patients!`);
                    } else {
                        alert('Invalid file format');
                    }
                } catch (err) {
                    alert('Error parsing file');
                }
            };
            reader.readAsText(file);
        }

            window.addEventListener('click', (e) => { 
                if (e.target === document.getElementById('patientModal')) closeModal(); 
                if (e.target === document.getElementById('confirmModal')) document.getElementById('confirmModal').style.display = 'none';
                if (e.target === document.getElementById('injectionSiteModal')) document.getElementById('injectionSiteModal').style.display = 'none';
            });

            document.getElementById('patientForm').addEventListener('submit', (e) => { e.preventDefault(); savePatientFromModal(); });
            document.getElementById('deletePatientBtn')?.addEventListener('click', () => { if (currentEditFileNumber) { showConfirmDialog('Permanently delete this patient?', () => { deletePatient(currentEditFileNumber); closeModal(); }); } });

            document.getElementById('confirmYes')?.addEventListener('click', () => { if (pendingConfirmCallback) pendingConfirmCallback(); document.getElementById('confirmModal').style.display = 'none'; pendingConfirmCallback = null; });
            document.getElementById('confirmNo')?.addEventListener('click', () => { document.getElementById('confirmModal').style.display = 'none'; pendingConfirmCallback = null; });

            document.getElementById('confirmInjectionSite')?.addEventListener('click', () => { performInjectionWithSite(); });
            document.getElementById('cancelInjectionSite')?.addEventListener('click', () => { document.getElementById('injectionSiteModal').style.display = 'none'; pendingInjectionFileNumber = null; });

            document.getElementById('exportBtn')?.addEventListener('click', exportData);
            document.getElementById('importBtn')?.addEventListener('click', () => { document.getElementById('importFile').click(); });
            document.getElementById('importFile')?.addEventListener('change', (e) => { if (e.target.files[0]) importData(e.target.files[0]); e.target.value = ''; });
            
            window.openEditModal = openEditModal;
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Patient Dosing Tracker | Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';</script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #eef2f6 100%); min-height: 100vh; padding: 20px; padding-bottom: 80px; }
        .app-container { max-width: 800px; margin: 0 auto; }
        
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 24px; border-radius: 32px; margin-bottom: 24px; box-shadow: 0 20px 35px -10px rgba(102,126,234,0.4); position: relative; overflow: hidden; }
        .header::before { content: ''; position: absolute; top: -50%; right: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%); pointer-events: none; }
        .header h1 { font-size: 28px; color: white; margin-bottom: 16px; font-weight: 700; letter-spacing: -0.5px; position: relative; }
        .status-bar { font-size: 13px; margin-top: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; color: rgba(255,255,255,0.9); font-weight: 500; position: relative; }
        .top-bar { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; justify-content: space-between; }
        .search-wrapper { display: flex; gap: 8px; flex: 2; min-width: 220px; }
        .search-wrapper input { flex: 1; padding: 12px 16px; border: 2px solid rgba(255,255,255,0.2); border-radius: 28px; font-size: 14px; background: rgba(255,255,255,0.95); transition: all 0.3s ease; font-weight: 500; }
        .search-wrapper input:focus { outline: none; border-color: white; box-shadow: 0 0 0 3px rgba(255,255,255,0.2); background: white; }
        
        .btn-sm { padding: 10px 18px; border: none; border-radius: 28px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
        .btn-primary { background: white; color: #667eea; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        .btn-secondary { background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3); }
        .btn-secondary:hover { background: rgba(255,255,255,0.3); transform: translateY(-2px); }
        .btn-outline { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); }
        .btn-outline:hover { background: rgba(255,255,255,0.25); }
        .btn-danger { background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%); color: white; box-shadow: 0 4px 15px rgba(244,63,94,0.3); }
        .btn-danger:hover { transform: translateY(-2px); }
        .add-btn { width: 100%; margin-bottom: 24px; padding: 14px; font-size: 16px; border-radius: 40px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; font-weight: 700; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(102,126,234,0.4); }
        .add-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102,126,234,0.5); }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 24px; overflow-x: auto; scrollbar-width: thin; }
        .tab-btn { padding: 10px 20px; background: white; border: 2px solid #e2e8f0; border-radius: 40px; cursor: pointer; font-size: 13px; font-weight: 600; flex-shrink: 0; color: #475569; transition: all 0.3s ease; }
        .tab-btn.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-color: transparent; box-shadow: 0 4px 15px rgba(102,126,234,0.3); }
        
        .patient-list { display: flex; flex-direction: column; gap: 16px; }
        .patient-card { background: white; border-radius: 24px; padding: 18px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid rgba(226,232,240,0.8); transition: all 0.3s ease; }
        .patient-card:hover { transform: translateY(-4px); box-shadow: 0 20px 35px -10px rgba(0,0,0,0.15); border-color: #cbd5e1; }
        .patient-card.expanded { background: #fafcff; border-left: 4px solid #667eea; }
        .date-separator { background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%); padding: 8px 16px; border-radius: 20px; margin: 12px 0; font-weight: 600; color: #4c51bf; font-size: 13px; display: inline-block; border: 1px solid #e2e8f0; }
        .collapsed-view { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .patient-info { flex: 2; }
        .patient-name { font-size: 18px; font-weight: 700; color: #1e293b; }
        .patient-file { font-size: 12px; color: #64748b; margin-left: 8px; font-weight: 500; }
        .patient-address { font-size: 13px; color: #64748b; margin-top: 4px; line-height: 1.4; }
        .due-date { font-size: 12px; color: #667eea; font-weight: 600; margin-top: 4px; }
        .special-badge { display: inline-block; background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%); color: #dc2626; font-size: 11px; padding: 3px 10px; border-radius: 20px; margin-top: 4px; font-weight: 600; }
        .dose-badge { display: inline-block; background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%); color: #4f46e5; font-size: 11px; padding: 3px 8px; border-radius: 12px; margin-left: 8px; font-weight: 600; }
        .action-buttons { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
        .action-icon { width: 38px; height: 38px; border-radius: 50%; border: none; font-size: 16px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: all 0.3s ease; }
        .action-icon:hover { transform: scale(1.08); }
        .call-icon { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; box-shadow: 0 2px 8px rgba(16,185,129,0.3); }
        .nav-icon { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; box-shadow: 0 2px 8px rgba(59,130,246,0.3); }
        .expanded-view { margin-top: 16px; padding-top: 16px; border-top: 2px solid #f1f5f9; display: none; }
        .detail-row { display: flex; padding: 8px 0; border-bottom: 1px solid #f1f5f9; flex-wrap: wrap; align-items: center; }
        .detail-label { width: 140px; font-weight: 600; color: #475569; font-size: 13px; }
        .detail-value { flex: 1; color: #1e293b; font-size: 13px; font-weight: 500; }
        .edit-icon { cursor: pointer; margin-left: 8px; color: white; font-size: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 5px 12px; border-radius: 20px; display: inline-flex; align-items: center; gap: 6px; transition: all 0.3s ease; font-weight: 600; }
        .edit-icon:hover { transform: scale(1.05); }
        .ins-red { color: #dc2626; font-weight: 600; }
        .action-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; justify-content: center; }
        .action-sm { padding: 8px 18px; font-size: 13px; border-radius: 30px; border: none; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
        .action-sm:hover { transform: translateY(-2px); }
        .inject-sm { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; box-shadow: 0 2px 8px rgba(16,185,129,0.3); }
        .pending-sm { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: white; }
        .edit-sm { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; }
        .delete-sm { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); color: white; }
        .move-sm { background: linear-gradient(135deg, #64748b 0%, #475569 100%); color: white; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 1000; overflow-y: auto; }
        .modal-content { background: white; max-width: 550px; margin: 60px auto; border-radius: 32px; padding: 28px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .modal-header h2 { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .close { font-size: 32px; cursor: pointer; color: #94a3b8; transition: all 0.3s ease; }
        .close:hover { color: #475569; transform: scale(1.1); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group.full-width { grid-column: span 2; }
        .form-group label { font-weight: 600; font-size: 13px; color: #475569; }
        .form-group input, .form-group select, .form-group textarea { padding: 12px 14px; border: 2px solid #e2e8f0; border-radius: 16px; font-size: 14px; transition: all 0.3s ease; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        .modal-footer { margin-top: 24px; display: flex; justify-content: flex-end; gap: 12px; }
        .empty-state { text-align: center; padding: 60px 20px; color: #94a3b8; font-weight: 500; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 20px; z-index: 10000; }
        .loading-spinner { width: 60px; height: 60px; border: 4px solid rgba(255,255,255,0.2); border-top: 4px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { color: white; font-size: 16px; font-weight: 600; }
        @media (max-width: 600px) { .collapsed-view { flex-direction: column; align-items: stretch; } .action-buttons { justify-content: flex-start; } .form-grid { grid-template-columns: 1fr; } .form-group.full-width { grid-column: span 1; } .top-bar { flex-direction: column; align-items: stretch; } .search-wrapper { width: 100%; } }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>💉 Patient Dosing Tracker</h1>
            <div class="top-bar">
                <div class="search-wrapper"><input type="text" id="searchInput" placeholder="Search name or file..."><button id="clearSearchBtn" class="btn-sm btn-outline">Clear</button></div>
                <button id="refreshBtn" class="btn-sm btn-primary">⟳ Refresh</button>
            </div>
            <div class="status-bar"><span id="syncStatus">🔄 Connecting...</span><span id="recordCount"></span></div>
        </div>
        <div class="tabs" id="tabsContainer">
            <button class="tab-btn active" data-tab="all">All Patients</button>
            <button class="tab-btn" data-tab="today">Today</button>
            <button class="tab-btn" data-tab="scheduled">Scheduled</button>
            <button class="tab-btn" data-tab="overdue">Overdue</button>
            <button class="tab-btn" data-tab="pending">Pending</button>
            <button class="tab-btn" data-tab="archived">Archived</button>
            <button class="tab-btn" data-tab="report">Generate Report</button>
        </div>
        <button id="addPatientBtn" class="add-btn">+ Add New Patient</button>
        <div id="patientList" class="patient-list"><div class="empty-state">Loading...</div></div>
        <div id="reportView" style="display:none;">
            <div class="report-section" style="padding:8px">
                <div style="font-weight:700;font-size:20px;margin-bottom:20px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent">📊 Data Management & Reports</div>
                <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px">
                    <button id="importGoogleSheetsBtn" class="btn-sm btn-primary" style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white">📊 Import from Google Sheets</button>
                    <button id="importCSVBtn" class="btn-sm btn-secondary" style="background:#e2e8f0;color:#475569">📄 Import CSV</button>
                    <button id="importPDFBtn" class="btn-sm btn-secondary" style="background:#e2e8f0;color:#475569">📑 Import PDF</button>
                    <button id="exportJSONBtn" class="btn-sm btn-secondary" style="background:#e2e8f0;color:#475569">📥 Export Backup</button>
                    <button id="exportCSVReportBtn" class="btn-sm btn-secondary" style="background:#e2e8f0;color:#475569">📊 Export All to CSV</button>
                    <input type="file" id="csvFileInput" accept=".csv" style="display:none"><input type="file" id="pdfFileInput" accept=".pdf" style="display:none">
                </div>
                <div style="font-weight:700;font-size:18px;margin:20px 0 16px">📋 Custom Report</div>
                <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px">
                    <select id="reportField" style="flex:1;padding:12px;border-radius:28px;border:2px solid #e2e8f0;background:white;font-weight:500"><option value="due_date">Due Date</option><option value="dose_prescribed">Dose Prescribed</option><option value="assignment_type">Assignment Type</option><option value="doses_remaining">Doses Remaining</option><option value="patient_name">Patient Name</option><option value="file_number">File Number</option></select>
                    <select id="reportCondition" style="flex:1;padding:12px;border-radius:28px;border:2px solid #e2e8f0;background:white;font-weight:500"><option value="equals">Equals</option><option value="contains">Contains</option><option value="greater">Greater Than</option><option value="less">Less Than</option></select>
                    <input type="text" id="reportValue" placeholder="Value" style="flex:1;padding:12px;border-radius:28px;border:2px solid #e2e8f0">
                    <button id="generateReportBtn" class="btn-sm btn-primary" style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white">Generate</button>
                </div>
                <div class="quick-reports" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px">
                    <button class="quick-btn" data-quick="dueToday" style="padding:8px 16px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;border-radius:28px;cursor:pointer;font-weight:600">📅 Due Today</button>
                    <button class="quick-btn" data-quick="noRepeatsLeft" style="padding:8px 16px;background:#f1f5f9;border:none;border-radius:28px;cursor:pointer;font-weight:600">⚠️ No Repeats Left</button>
                    <button class="quick-btn" data-quick="pendingPatients" style="padding:8px 16px;background:#f1f5f9;border:none;border-radius:28px;cursor:pointer;font-weight:600">⏳ Pending</button>
                    <button class="quick-btn" data-quick="tempPatients" style="padding:8px 16px;background:#f1f5f9;border:none;border-radius:28px;cursor:pointer;font-weight:600">📋 Temporary</button>
                </div>
                <div id="reportOutput"><div class="empty-state">Select criteria and click Generate</div></div>
            </div>
        </div>
    </div>
    <div id="loadingOverlay" class="loading-overlay" style="display:none"><div class="loading-spinner"></div><div class="loading-text">Syncing...</div></div>

    <!-- Modals -->
    <div id="injectionModal" class="modal"><div class="modal-content"><div class="modal-header"><h2>💉 Confirm Injection</h2><span class="close-injection-modal">&times;</span></div><div id="injectionPatientName" style="margin-bottom:16px;padding:12px;background:#f8fafc;border-radius:16px;font-weight:600"></div><div id="injectionCurrentInfo" style="margin-bottom:16px;padding:8px;background:#e0e7ff;border-radius:12px;font-size:13px;color:#4f46e5"></div><div class="form-group"><label>Injection Site *</label><select id="injectionSiteSelect"><option value="">Select...</option><option value="Right Side">Right Side</option><option value="Left Side">Left Side</option><option value="Right Glute">Right Glute</option><option value="Left Glute">Left Glute</option></select></div><div class="form-group"><label>📝 Special Instructions</label><textarea id="injectionSpecialInstructions" rows="2"></textarea></div><div class="form-group"><label>⚠️ Adverse Events</label><textarea id="injectionAdverseEvents" rows="2"></textarea></div><div class="form-group"><label>💬 Comments / Notes</label><textarea id="injectionComments" rows="2" placeholder="Additional notes..."></textarea></div><div class="modal-footer"><button id="cancelInjectionBtn" class="btn-sm btn-secondary">Cancel</button><button id="confirmInjectionBtn" class="btn-sm btn-primary" style="background:#10b981;color:white">Confirm</button></div></div></div>
    <div id="apptEditModal" class="modal"><div class="modal-content"><div class="modal-header"><h2>📅 Edit Appointment</h2><span class="close-appt">&times;</span></div><input type="datetime-local" id="appointmentDateInput" style="width:100%;padding:12px;border-radius:16px;border:2px solid #e2e8f0;margin:16px 0"><div class="modal-footer"><button id="saveAppointmentBtn" class="btn-sm btn-primary">Save & Confirm</button><button id="cancelAppointmentBtn" class="btn-sm btn-secondary">Cancel</button></div></div></div>
    <div id="confirmModal" class="modal"><div class="modal-content confirm-modal" style="max-width:380px;text-align:center"><h3 style="margin-bottom:16px">Confirm</h3><p id="confirmMessage" style="margin:16px 0;color:#475569"></p><div style="display:flex;gap:12px;justify-content:center"><button id="confirmYes" class="btn-sm btn-primary">Yes</button><button id="confirmNo" class="btn-sm btn-secondary">No</button></div></div></div>
    <div id="patientModal" class="modal"><div class="modal-content"><div class="modal-header"><h2 id="modalTitle">Add Patient</h2><span class="close">&times;</span></div><form id="patientForm"><div class="form-grid"><div class="form-group"><label>Patient Name *</label><input type="text" id="patientName" required></div><div class="form-group"><label>File Number *</label><input type="text" id="fileNumber" required></div><div class="form-group full-width"><label>Address</label><input type="text" id="address"></div><div class="form-group"><label>Phone 1</label><input type="tel" id="phone1"></div><div class="form-group"><label>Phone 2</label><input type="tel" id="phone2"></div><div class="form-group"><label>💊 Dose Prescribed</label><select id="dosePrescribed"><option value="7.5">7.5 mg (4 weeks)</option><option value="22.5">22.5 mg (12 weeks)</option><option value="30">30 mg (16 weeks)</option><option value="45">45 mg (24 weeks)</option></select></div><div class="form-group"><label>Total Doses</label><input type="number" id="totalDoses" value="4" min="1"></div><div class="form-group"><label>Doses Remaining</label><input type="number" id="dosesRemaining" value="4" min="0"></div><div class="form-group"><label>Previous Injection Site</label><input type="text" id="prevInjSite"></div><div class="form-group"><label>Injection Site</label><select id="injSite"><option value="">Select</option><option value="Right Side">Right Side</option><option value="Left Side">Left Side</option><option value="Right Glute">Right Glute</option><option value="Left Glute">Left Glute</option></select></div><div class="form-group"><label>Due Date</label><input type="date" id="dueDate"></div><div class="form-group"><label>Appointment Date & Time</label><input type="datetime-local" id="appointmentDateTime"></div><div class="form-group full-width"><label>Previous Injection Dates</label><input type="text" id="prevInjDates"></div><div class="form-group"><label>Assignment Type</label><select id="assignmentType"><option value="Permanent">Permanent</option><option value="Temporary">Temporary</option></select></div><div class="form-group full-width"><label>⚠️ Special Instructions</label><textarea id="specialInstructions" rows="2"></textarea></div><div class="form-group full-width"><label>Adverse Effects Comments</label><textarea id="adverseEffects" rows="2"></textarea></div></div><div class="modal-footer"><button type="button" id="deletePatientBtn" class="btn-sm btn-danger" style="display:none">Delete</button><button type="submit" class="btn-sm btn-primary">Save</button></div></form></div></div>

    <script>
        // ========== SUPABASE CONFIG ==========
        const SUPABASE_URL = "https://YOUR_PROJECT_ID.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_YOUR_KEY_HERE";
        const GOOGLE_SHEETS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSYgD018ww2Mbkud6ZYmZHop7EXxcm_0Zl4V9bB2AaY4r4xXTWChAW6v-gUyjD4-2Qmg4H8O0kxryCf/pub?output=csv";
        
        let _supabase = null, patients = [], currentEditId = null, pendingConfirmCallback = null, currentTab = 'all', searchQuery = '', pendingInjectionId = null, pendingAppointmentId = null;
        const doseToWeeks = { '7.5': 4, '22.5': 12, '30': 16, '45': 24 };
        const columnMapping = {
            'Patient Name': 'patient_name', 'File Number': 'file_number', 'Address': 'address', 'Phone 1': 'phone1', 'Phone 2': 'phone2',
            'Dose Prescribed': 'dose_prescribed', 'Total Doses': 'total_doses', 'Doses Remaining': 'doses_remaining',
            'Previous Injection Site': 'previous_injection_site', 'Injection Site': 'injection_site', 'Due Date': 'due_date',
            'Appointment Date & Time': 'appointment_date_time', 'Previous Injection Dates': 'previous_injection_dates',
            'Assignment Type': 'assignment_type', 'Special Instructions': 'special_instructions', 'Adverse Effects Comments': 'adverse_effects_comments',
            'File Status': 'file_status', 'Injection Administered': 'injection_administered', 'Appointment Confirmed': 'appointment_confirmed',
            'Pending': 'pending', 'Archived': 'archived'
        };

        // ========== DATE FUNCTIONS (NO TIMEZONE SHIFT) ==========
        function getTodayLocal() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }
        function addWeeksToDateStr(dateStr, weeks) {
            if (!dateStr) return getTodayLocal();
            const [year, month, day] = dateStr.split('-').map(Number);
            const date = new Date(year, month-1, day);
            date.setDate(date.getDate() + (weeks * 7));
            return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
        }
        function formatDisplayDate(dateStr) {
            if (!dateStr) return 'Not set';
            const d = new Date(dateStr);
            return d.toLocaleDateString();
        }

        // ========== SUPABASE ==========
        async function initSupabase() {
            if (SUPABASE_URL === "https://YOUR_PROJECT_ID.supabase.co") { document.getElementById('syncStatus').innerHTML = '⚠️ Configure Supabase'; return false; }
            try {
                _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                await _supabase.from('patients').select('count', { count: 'exact', head: true });
                document.getElementById('syncStatus').innerHTML = '✅ Connected';
                return true;
            } catch(e) { console.error(e); document.getElementById('syncStatus').innerHTML = '❌ Failed'; return false; }
        }
        async function loadPatients() {
            if (!_supabase) return;
            document.getElementById('loadingOverlay').style.display = 'flex';
            try {
                const { data, error } = await _supabase.from('patients').select('*').order('created_at', { ascending: false });
                if (error) throw error;

                document.getElementById('loadingOverlay').style.display = 'none';
                let name=null, fileNo=null, dose=null, addr=null, phone1=null, phone2=null, injDate=null;

                if (nMatch) name = nMatch[1].trim().replace(/\s+/g,' ');
                const fMatch = fullText.match(/MEDICUM\s*#:\s*(\d+)/i);
                if (fMatch) fileNo = fMatch[1];
                const dMatch = fullText.match(/(\d+\.?\d*)\s*mg/i);
                if (dMatch && [7.5,22.5,30,45].includes(parseFloat(dMatch[1]))) dose = parseFloat(dMatch[1]).toString();
                let addrParts = [];

                if (street) addrParts.push(street[1].trim());
                const city = fullText.match(/CITY\/VILLE\s*([A-Za-zÀ-ÿ\s.'-]+(?:,?\s*[A-Z]{2})?)/i);
                if (city) addrParts.push(city[1].trim());
                const postal = fullText.match(/\b([A-Z]\d[A-Z]\s?\d[A-Z]\d)\b/i);
                if (postal && !addrParts.some(p=>p.includes(postal[1]))) addrParts.push(postal[1].trim());
                if (addrParts.length) addr = addrParts.join(', ').replace(/\s+/g,' ').trim();
                const p1 = fullText.match(/TELEPHONE\/TELEPHONE\s*(\d{3}\s?\d{3}\s?\d{4})/i);
                if (p1) phone1 = p1[1].replace(/\s/g,'');
                else { const pStd = fullText.match(/TELEPHONE\s*(\d{3}\s?\d{3}\s?\d{4})/i); if(pStd) phone1 = pStd[1].replace(/\s/g,''); }
                const pSec = fullText.match(/SECONDARY CONTACT[^0-9]*(\d{3}\s?\d{3}\s?\d{4})/i);
                if (pSec) phone2 = pSec[1].replace(/\s/g,'');

                if (name && fileNo && confirm(`Add: ${name} (${fileNo})?`)) {
                    await addPatient({ 'Patient Name':name, 'File Number':fileNo, 'Address':addr||'', 'Phone 1':phone1||'', 'Phone 2':phone2||'', 'Dose Prescribed':dose||'7.5', 'Total Doses':'4', 'Doses Remaining':'4', 'Previous Injection Site':'', 'Injection Site':'', 'Due Date':getTodayLocal(), 'Appointment Date & Time':injDate||null, 'Previous Injection Dates':'', 'Assignment Type':'Permanent', 'Special Instructions':'', 'Adverse Effects Comments':'', 'File Status':'Active', 'Injection Administered':false, 'Appointment Confirmed':!!injDate, 'Pending':false, 'Archived':false });
                    alert('Patient added');
                } else alert('Could not extract required data');
            } catch(e) { alert('PDF error: '+e.message); } finally { document.getElementById('loadingOverlay').style.display = 'none'; }

        // ========== GOOGLE SHEETS IMPORT ==========
        async function importFromGoogleSheets() {
            if (!confirm('Import from Google Sheets?')) return;
            document.getElementById('loadingOverlay').style.display = 'flex';
            try {
                const resp = await fetch(GOOGLE_SHEETS_CSV_URL);
                const csv = await resp.text();
                const rows = csv.split('\n');
                const headers = rows[0].split(',').map(h=>h.trim().replace(/"/g,''));
                let imported=0, dup=0;
                for (let i=1; i<rows.length; i++) {
                    if (!rows[i].trim()) continue;
                    let vals=[], inQ=false, cur='';
                    for (let ch of rows[i]) { if (ch==='"') inQ=!inQ; else if (ch===',' && !inQ) { vals.push(cur.trim().replace(/^"|"$/g,'')); cur=''; } else cur+=ch; }
                    vals.push(cur.trim().replace(/^"|"$/g,''));
                    const p={}; headers.forEach((h,idx)=>p[h]=vals[idx]||'');
                    if (p['Patient Name'] && !patients.find(ex=>ex['File Number']===p['File Number'])) {
                        await addPatient({ 'Patient Name':p['Patient Name'], 'File Number':p['File Number'], 'Address':p['Address']||'', 'Phone 1':p['Phone 1']||'', 'Phone 2':p['Phone 2']||'', 'Dose Prescribed':p['Dose Prescribed']||'7.5', 'Total Doses':p['Total Doses']||'4', 'Doses Remaining':p['Doses Remaining']||'4', 'Previous Injection Site':'', 'Injection Site':'', 'Due Date':getTodayLocal(), 'Appointment Date & Time':null, 'Previous Injection Dates':'', 'Assignment Type':'Permanent', 'Special Instructions':'', 'Adverse Effects Comments':'', 'File Status':'Active', 'Injection Administered':false, 'Appointment Confirmed':false, 'Pending':false, 'Archived':false });
                        imported++;
                    } else dup++;
                }
                alert(`Imported ${imported}, skipped ${dup}`);
                await loadPatients();
            } catch(e) { alert('Import error: '+e.message); }
            finally { document.getElementById('loadingOverlay').style.display = 'none'; }
        }

        // ========== DOSING LOGIC (NO DATE SHIFT) ==========
        function getReferenceDateForDueDate(p) {
            const today = getTodayLocal();
            const apptOnly = p['Appointment Date & Time'] ? p['Appointment Date & Time'].split('T')[0] : null;
            if (p['Appointment Confirmed'] && !p['Injection Administered'] && apptOnly && apptOnly < today) return apptOnly;
            return today;
        }
        function calculateNextDueDate(_, dose, ref) { return addWeeksToDateStr(ref, doseToWeeks[dose] || 4); }

        // ========== INJECTION FLOW ==========
        function showInjectionModal(id) {
            pendingInjectionId = id;
            const p = patients.find(p=>p.id===id);
            if (!p) return;
            document.getElementById('injectionPatientName').innerHTML = `<strong>${escapeHtml(p['Patient Name'])}</strong> (${p['Dose Prescribed']}mg, ${p['Doses Remaining']} left)`;
            document.getElementById('injectionCurrentInfo').innerHTML = `Next due: +${doseToWeeks[p['Dose Prescribed']]} weeks`;
            document.getElementById('injectionSiteSelect').value = '';
            document.getElementById('injectionSpecialInstructions').value = '';
            document.getElementById('injectionAdverseEvents').value = '';
            document.getElementById('injectionComments').value = '';
            document.getElementById('injectionModal').style.display = 'block';
        }
        async function performInjection() {
            const site = document.getElementById('injectionSiteSelect').value;
            if (!site) { alert('Select injection site'); return; }
            const spec = document.getElementById('injectionSpecialInstructions').value;
            const adverse = document.getElementById('injectionAdverseEvents').value;
            const comments = document.getElementById('injectionComments').value;
            const id = pendingInjectionId;
            const p = patients.find(p=>p.id===id);
            let left = parseInt(p['Doses Remaining']) || 0;
            const total = parseInt(p['Total Doses']) || 4;
            if (left <= 0) { alert('No doses left'); closeInjModal(); return; }
            const today = getTodayLocal();
            let prev = p['Previous Injection Dates'] ? p['Previous Injection Dates'].split(',') : [];
            prev.push(today);
            p['Previous Injection Dates'] = prev.join(', ');
            if (p['Injection Site']) p['Previous Injection Site'] = p['Injection Site'];
            p['Injection Site'] = site;
            if (spec) p['Special Instructions'] = (p['Special Instructions']?p['Special Instructions']+' | ':'') + `[${today}] ${spec}`;
            if (adverse) p['Adverse Effects Comments'] = (p['Adverse Effects Comments']?p['Adverse Effects Comments']+' | ':'') + `[${today}] ${adverse}`;
            if (comments) p['Special Instructions'] = (p['Special Instructions']?p['Special Instructions']+' | ':'') + `[${today}] 💬 ${comments}`;
            const newLeft = left-1;
            p['Doses Remaining'] = newLeft;
            const ref = getReferenceDateForDueDate(p);
            p['Due Date'] = calculateNextDueDate(p['Due Date'], p['Dose Prescribed'], ref);
            p['Injection Administered'] = true;
            p['Appointment Confirmed'] = false;
            p['Appointment Date & Time'] = null;
            p['Pending'] = (newLeft === 0);
            await updatePatientInDB(id, p);
            await loadPatients();
            closeInjModal();
            alert(`Injection recorded. ${newLeft} doses left. Next due: ${p['Due Date']}`);
        }
        function closeInjModal() { document.getElementById('injectionModal').style.display = 'none'; pendingInjectionId = null; }

        // ========== FILTER & RENDER ==========
        function getFilteredPatients() {
            const today = getTodayLocal();
            return patients.filter(p => {
                if (p['Archived'] && currentTab !== 'archived') return false;
                if (!p['Archived'] && currentTab === 'archived') return false;
                if (p['Pending'] && currentTab !== 'pending') return false;
                if (!p['Pending'] && currentTab === 'pending') return false;
                if (currentTab === 'all') return !p['Archived'] && !p['Pending'] && !p['Appointment Confirmed'];
                const apptOnly = p['Appointment Date & Time'] ? p['Appointment Date & Time'].split('T')[0] : null;
                const confirmed = p['Appointment Confirmed'] === true;
                const isToday = apptOnly === today;
                const isFuture = apptOnly && apptOnly > today;
                const overdue = apptOnly && apptOnly < today && !p['Injection Administered'] && confirmed;
                if (currentTab === 'today') return isToday && confirmed && !overdue;
                if (currentTab === 'scheduled') return isFuture && confirmed;
                if (currentTab === 'overdue') return overdue;
                return false;
            }).filter(p => !searchQuery || p['Patient Name'].toLowerCase().includes(searchQuery) || p['File Number'].toLowerCase().includes(searchQuery))
              .sort((a,b)=> (a['Due Date']||'').localeCompare(b['Due Date']||''));
        }

 (${left})</button>${currentTab==='pending'||currentTab==='archived'?`<button class="action-sm move-sm" data-id="${p.id}" data-action="move">⟳ Move</button>`:`<button class="action-sm pending-sm" data-id="${p.id}" data-action="pending">⏳ Pending</button>`}<button class="action-sm edit-sm" data-id="${p.id}" data-action="edit">✎ Edit</button><button class="action-sm delete-sm" data-id="${p.id}" data-action="delete">🗑 Delete</button></div></div></div>`;

        function exportCSV() { if(!patients.length) return; const headers=['Patient Name','File Number','Address','Phone 1','Phone 2','Dose Prescribed','Total Doses','Doses Remaining','Due Date','Assignment Type','Special Instructions']; const rows=[headers.join(',')]; patients.forEach(p=>{ rows.push(headers.map(h=>{ let v=p[h]||''; if(v.includes(',')) v=`"${v}"`; return v; }).join(',')); }); const blob=new Blob([rows.join('\n')],{type:'text/csv'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`patients_${new Date().toISOString().split('T')[0]}.csv`; a.click(); alert('Exported'); }
        function importCSV(file) { const r=new FileReader(); r.onload=async e=>{ const rows=e.target.result.split('\n'); const headers=rows[0].split(',').map(h=>h.trim().replace(/"/g,'')); let cnt=0; for(let i=1;i<rows.length;i++){ if(!rows[i].trim()) continue; const vals=rows[i].split(',').map(v=>v.trim().replace(/"/g,'')); const p={}; headers.forEach((h,idx)=>p[h]=vals[idx]||''); if(p['Patient Name'] && !patients.find(ex=>ex['File Number']===p['File Number'])){ await addPatient({ 'Patient Name':p['Patient Name'], 'File Number':p['File Number'], 'Address':p['Address']||'', 'Phone 1':p['Phone 1']||'', 'Phone 2':p['Phone 2']||'', 'Dose Prescribed':p['Dose Prescribed']||'7.5', 'Total Doses':p['Total Doses']||'4', 'Doses Remaining':p['Doses Remaining']||'4', 'Due Date':getTodayLocal(), 'Assignment Type':'Permanent', 'Special Instructions':'', 'Adverse Effects Comments':'', 'File Status':'Active', 'Injection Administered':false, 'Appointment Confirmed':false, 'Pending':false, 'Archived':false }); cnt++; } } alert(`Imported ${cnt}`); }; r.readAsText(file); }
        function generateReport() { const field=document.getElementById('reportField').value; const cond=document.getElementById('reportCondition').value; const val=document.getElementById('reportValue').value.toLowerCase(); let filtered=patients.filter(p=>{ let fv=p[field]; if(field==='due_date'){ if(!fv) return false; if(cond==='equals') return fv===val; if(cond==='greater') return fv>val; if(cond==='less') return fv<val; } else if(field==='dose_prescribed'){ if(cond==='equals') return fv===val; if(cond==='greater') return parseFloat(fv)>parseFloat(val); if(cond==='less') return parseFloat(fv)<parseFloat(val); } else if(field==='doses_remaining'){ const rem=parseInt(fv)||0; const v=parseInt(val); if(cond==='equals') return rem===v; if(cond==='greater') return rem>v; if(cond==='less') return rem<v; } else { fv=String(fv||'').toLowerCase(); if(cond==='equals') return fv===val; if(cond==='contains') return fv.includes(val); } return false; }); if(!filtered.length){ document.getElementById('reportOutput').innerHTML='<div class="empty-state">No matches</div>'; return; } let html=`<div style="background:white;border-radius:20px;padding:20px"><strong>${filtered.length} found</strong><button onclick="exportReportToCSV()" class="btn-sm btn-secondary" style="margin-left:12px">📥 Export</button>`; const grouped={}; filtered.forEach(p=>{ const d=formatDisplayDate(p['Due Date']); if(!grouped[d]) grouped[d]=[]; grouped[d].push(p); }); Object.keys(grouped).sort().forEach(date=>{ html+=`<div class="date-separator" style="margin-top:16px">📅 ${date}</div>`; grouped[date].forEach(p=>{ html+=`<div style="padding:14px;border-bottom:1px solid #e2e8f0;cursor:pointer" onclick="openEditModal(${p.id})"><strong>${escapeHtml(p['Patient Name'])}</strong> #${escapeHtml(p['File Number'])}<div style="font-size:12px;color:#64748b">💊 ${p['Dose Prescribed']}mg</div></div>`; }); }); html+=`</div>`; document.getElementById('reportOutput').innerHTML=html; window.lastReport=filtered; }
        function exportReportToCSV() { if(!window.lastReport||!window.lastReport.length) return; const headers=['Patient Name','File Number','Phone 1','Address','Dose Prescribed','Doses Remaining','Due Date']; const rows=[headers.join(',')]; window.lastReport.forEach(p=>{ rows.push(headers.map(h=>{ let v=p[h]||''; if(v.includes(',')) v=`"${v}"`; return v; }).join(',')); }); const blob=new Blob([rows.join('\n')],{type:'text/csv'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`report.csv`; a.click(); }
        function quickReport(type) { let field,cond,val; if(type==='dueToday'){ field='due_date'; cond='equals'; val=getTodayLocal(); } else if(type==='noRepeatsLeft'){ field='doses_remaining'; cond='equals'; val='0'; } else if(type==='pendingPatients'){ field='pending'; cond='equals'; val='true'; } else if(type==='tempPatients'){ field='assignment_type'; cond='equals'; val='Temporary'; } else return; document.getElementById('reportField').value=field; document.getElementById('reportCondition').value=cond; document.getElementById('reportValue').value=val; generateReport(); }
        function escapeHtml(s){ if(!s) return ''; return String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

        // ========== INIT ==========
        document.addEventListener('DOMContentLoaded', async () => {
            const ok = await initSupabase();
            if (ok) await loadPatients();
            document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>{ document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); currentTab=btn.dataset.tab; renderCurrentTab(); }));
            document.getElementById('refreshBtn').addEventListener('click',()=>loadPatients());
            document.getElementById('clearSearchBtn').addEventListener('click',()=>{ document.getElementById('searchInput').value=''; searchQuery=''; renderCurrentTab(); });
            document.getElementById('searchInput').addEventListener('input',e=>{ if(currentTab!=='report'){ searchQuery=e.target.value.toLowerCase(); renderCurrentTab(); } });
            document.getElementById('addPatientBtn').addEventListener('click',openAddModal);
            document.getElementById('importGoogleSheetsBtn').addEventListener('click',importFromGoogleSheets);
            document.getElementById('importCSVBtn').addEventListener('click',()=>document.getElementById('csvFileInput').click());
            document.getElementById('csvFileInput').addEventListener('change',e=>{ if(e.target.files[0]) importCSV(e.target.files[0]); e.target.value=''; });
            document.getElementById('importPDFBtn').addEventListener('click',()=>document.getElementById('pdfFileInput').click());
            document.getElementById('pdfFileInput').addEventListener('change',e=>{ if(e.target.files[0]) importPDF(e.target.files[0]); e.target.value=''; });
            document.getElementById('exportJSONBtn').addEventListener('click',exportJSON);
            document.getElementById('exportCSVReportBtn').addEventListener('click',exportCSV);
            document.getElementById('generateReportBtn').addEventListener('click',generateReport);
            document.querySelectorAll('.quick-btn').forEach(btn=>btn.addEventListener('click',()=>quickReport(btn.dataset.quick)));
            document.querySelectorAll('.close').forEach(c=>c.addEventListener('click',closeModal));
            document.querySelectorAll('.close-injection-modal').forEach(c=>c.addEventListener('click',closeInjModal));
            document.querySelectorAll('.close-appt').forEach(c=>c.addEventListener('click',()=>document.getElementById('apptEditModal').style.display='none'));
            window.addEventListener('click',e=>{ if(e.target===document.getElementById('patientModal')) closeModal(); if(e.target===document.getElementById('confirmModal')) document.getElementById('confirmModal').style.display='none'; if(e.target===document.getElementById('apptEditModal')) document.getElementById('apptEditModal').style.display='none'; if(e.target===document.getElementById('injectionModal')) closeInjModal(); });
            document.getElementById('patientForm').addEventListener('submit',e=>{ e.preventDefault(); savePatientModal(); });
            document.getElementById('deletePatientBtn').addEventListener('click',()=>{ if(currentEditId && confirm('Delete?')) deletePatient(currentEditId).then(()=>closeModal()); });
            document.getElementById('confirmYes').addEventListener('click',()=>{ if(pendingConfirmCallback) pendingConfirmCallback(); document.getElementById('confirmModal').style.display='none'; pendingConfirmCallback=null; });
            document.getElementById('confirmNo').addEventListener('click',()=>{ document.getElementById('confirmModal').style.display='none'; pendingConfirmCallback=null; });
            document.getElementById('confirmInjectionBtn').addEventListener('click',performInjection);
            document.getElementById('cancelInjectionBtn').addEventListener('click',closeInjModal);
            document.getElementById('saveAppointmentBtn').addEventListener('click',saveAppointmentDate);
            document.getElementById('cancelAppointmentBtn').addEventListener('click',()=>document.getElementById('apptEditModal').style.display='none');
            window.openEditModal = openEditModal;
            window.openAppointmentEditor = openAppointmentEditor;
            window.exportReportToCSV = exportReportToCSV;
        });
    </script>
</body>
</html>
